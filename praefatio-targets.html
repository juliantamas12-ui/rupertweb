.target-name.s-research{color:var(--ink-soft)}
.target-name.s-drafting{color:var(--accent);font-style:italic}
.target-name.s-sent{color:var(--sage);font-style:italic}
.target-name.s-replied{color:var(--accent);font-weight:700}
.target-name.s-declined{color:var(--ink-mute);text-decoration:line-through;opacity:0.5}
.target-name .co{color:var(--ink-mute);font-size:0.55em;font-style:italic;font-weight:400;margin-left:4px;line-height:1}
.target-name.size-s{font-size:24px}
.target-name.size-m{font-size:38px}
.target-name.size-l{font-size:56px;font-style:italic}
.target-name.size-xl{font-size:78px;font-style:italic;font-weight:600;color:var(--ink);letter-spacing:-2px}
@media(max-width:900px){.target-name.size-s{font-size:18px}.target-name.size-m{font-size:26px}.target-name.size-l{font-size:36px}.target-name.size-xl{font-size:48px}}
.target-name .status-dot-inline{display:inline-block;width:9px;height:9px;border-radius:50%;margin-left:8px;opacity:0.85;vertical-align:0.3em;flex-shrink:0}
.target-name.s-research .status-dot-inline{background:var(--ink-mute);opacity:0.4}
.target-name.s-drafting .status-dot-inline{background:var(--accent)}
.target-name.s-sent .status-dot-inline{background:var(--sage)}
.target-name.s-replied .status-dot-inline{background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
.target-name.s-declined .status-dot-inline{background:var(--ink-mute);opacity:0.4}

.target-tip{position:fixed;background:#0A0807;color:var(--ink);padding:10px 14px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;pointer-events:none;opacity:0;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,0.4);white-space:nowrap;font-weight:600;transition:opacity 0.12s;border:1px solid var(--rule-strong)}
.target-tip.show{opacity:1}

.legend{display:flex;justify-content:center;gap:28px;flex-wrap:wrap;margin-top:48px;padding-top:24px;border-top:1px solid var(--rule-soft);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-mute)}
.legend .item{display:inline-flex;align-items:center;gap:8px}
.legend .dot{width:8px;height:8px;border-radius:50%}
.legend .dot.research{background:var(--ink-mute);opacity:0.4}

<script src="/praefatio.js"></script>
<script>
const TARGETS = [
  { name:'Patrick Collison',     co:'Stripe',         status:'research' },
  { name:'Howard Marks',         co:'Oaktree',        status:'research' },
  { name:'Daniel Ek',            co:'Spotify',        status:'research' },
  { name:'Brian Chesky',         co:'Airbnb',         status:'research' },
  { name:'Naval Ravikant',       co:'AngelList',      status:'research' },
  { name:'Tobi Lütke',           co:'Shopify',        status:'research' },
  { name:'Melanie Perkins',      co:'Canva',          status:'research' },
  { name:'Drew Houston',         co:'Dropbox',        status:'research' },
  { name:'Stewart Butterfield',  co:'Slack',          status:'research' },
  { name:'Demis Hassabis',       co:'DeepMind',       status:'research' },
  { name:'Whitney Wolfe Herd',   co:'Bumble',         status:'research' },
  { name:'Tom Blomfield',        co:'Monzo',          status:'research' },
];
const STATUS_LABELS = {
  research: 'In research',
  drafting: 'Drafting',
  sent:     'Sent',
  replied:  'Replied',
  declined: 'Declined',
};
function escapeHtml(s){return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

const sizes = ['size-m','size-xl','size-s','size-l','size-m','size-xl','size-s','size-l','size-m','size-s','size-xl','size-m','size-l','size-s'];
const wall = document.getElementById('wall');
wall.innerHTML = TARGETS.map((t,i)=>{
  const sz = sizes[i % sizes.length];
  return `<span class="target-name ${sz} s-${t.status}" data-status="${STATUS_LABELS[t.status]||t.status}">${escapeHtml(t.name)}<span class="co"> · ${escapeHtml(t.co)}</span><span class="status-dot-inline" aria-hidden="true"></span></span>`;
}).join('');

const tip = document.getElementById('targetTip');
function placeTipAt(clientX, clientY){
  const rect = tip.getBoundingClientRect();
  // Center horizontally under the cursor
  let x = clientX - rect.width / 2;
  let y = clientY + 18;
  // Keep on screen
  if (x < 8) x = 8;
  if (x + rect.width > window.innerWidth - 8) x = window.innerWidth - rect.width - 8;
  if (y + rect.height > window.innerHeight - 10) y = clientY - rect.height - 18;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}
wall.addEventListener('mousemove', (e) => {
  const target = e.target.closest('.target-name');
  if (target) {
    const status = target.dataset.status;
    if (status) {
      if (tip.textContent !== status) tip.textContent = status;
      placeTipAt(e.clientX, e.clientY);
      tip.classList.add('show');
      return;
    }
  }
  tip.classList.remove('show');
});
wall.addEventListener('mouseleave', () => tip.classList.remove('show'));
</script>
