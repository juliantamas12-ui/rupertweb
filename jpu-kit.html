<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Juan Pelotes Darwin FC — 2026/27 Kit</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #111416;
  min-height: 100vh;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 20px 80px;
}
.brand { text-align: center; margin-bottom: 52px; }
.brand-name { font-size: 10px; letter-spacing: 7px; color: #c8a020; text-transform: uppercase; margin-bottom: 5px; }
.brand-sub  { font-size: 9px;  letter-spacing: 3px; color: rgba(255,255,255,0.2); }

.kits { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; }

.kit-card {
  background: #1a1d22;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 32px 28px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 260px;
  transition: border-color 0.2s;
}
.kit-card:hover { border-color: rgba(200,160,32,0.3); }

.kit-name { font-size: 9px; letter-spacing: 4px; color: rgba(255,255,255,0.3); text-transform: uppercase; }

/* Jersey canvas */
.jersey-wrap { position: relative; width: 200px; height: 230px; filter: drop-shadow(0 24px 48px rgba(0,0,0,0.6)); }

/* Swatch strip */
.swatches { display: flex; gap: 6px; }
.swatch { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.15); }
</style>
</head>
<body>

  <div class="brand-sub">2026 / 27 Official Kit Collection — Isabela Island, Galápagos</div>
