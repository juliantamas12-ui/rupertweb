<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Juan Pelotes Darwin FC — Official Kit</title>
<style>
  body { background: #0a0f1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Arial', sans-serif; color: #fff; margin: 0; }
  h1 { font-size: 13px; letter-spacing: 4px; color: #c8a020; text-transform: uppercase; margin-bottom: 4px; }
  h2 { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.4); margin-bottom: 40px; }
  .kits { display: flex; gap: 60px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
  .kit-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .kit-label { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
  svg { filter: drop-shadow(0 8px 24px rgba(0,0,0,0.6)); }
</style>
</head>
<body>

<h1>Juan Pelotes Darwin FC</h1>
<h2>Isabela Island · Galápagos · Est. 2001</h2>

<div class="kits">

  <!-- HOME KIT -->
  <div class="kit-wrap">
    <svg width="200" height="260" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Tortoise shell hex pattern -->
        <pattern id="hex-home" x="0" y="0" width="24" height="28" patternUnits="userSpaceOnUse">
          <polygon points="12,2 22,8 22,20 12,26 2,20 2,8" fill="none" stroke="rgba(200,160,32,0.18)" stroke-width="1"/>
          <polygon points="24,16 34,22 34,34 24,40 14,34 14,22" fill="none" stroke="rgba(200,160,32,0.18)" stroke-width="1"/>
        </pattern>
        <clipPath id="shirt-clip">
          <path d="M60,20 L30,60 L50,70 L50,220 L150,220 L150,70 L170,60 L140,20 L120,10 Q100,0 80,10 Z"/>
        </clipPath>
        <clipPath id="shorts-clip">
          <rect x="55" y="220" width="90" height="50"/>
        </clipPath>
      </defs>

      <!-- SHIRT body -->
      <path d="M60,20 L30,60 L50,70 L50,220 L150,220 L150,70 L170,60 L140,20 L120,10 Q100,0 80,10 Z"
            fill="#0d2044"/>
      <!-- Hex pattern overlay -->
      <rect x="0" y="0" width="200" height="260" fill="url(#hex-home)" clip-path="url(#shirt-clip)"/>

      <!-- Gold side panels -->
      <path d="M50,70 L50,220 L72,220 L72,70 Z" fill="#c8a020" opacity="0.9"/>
      <path d="M128,70 L128,220 L150,220 L150,70 Z" fill="#c8a020" opacity="0.9"/>

      <!-- Gold collar -->
      <path d="M80,10 Q100,0 120,10 L124,22 Q100,14 76,22 Z" fill="#c8a020"/>
      <!-- Collar V -->
      <path d="M88,18 L100,34 L112,18" fill="none" stroke="#c8a020" stroke-width="3"/>

      <!-- Sleeve stripes -->
      <path d="M60,20 L30,60 L38,64 L66,26 Z" fill="#c8a020" opacity="0.9"/>
      <path d="M140,20 L170,60 L162,64 L134,26 Z" fill="#c8a020" opacity="0.9"/>

      <!-- Crest placeholder -->
      <circle cx="82" cy="85" r="18" fill="#c8a020" opacity="0.15" stroke="#c8a020" stroke-width="1"/>
      <text x="82" y="80" text-anchor="middle" font-size="8" fill="#c8a020" font-weight="bold">UIJP</text>
      <text x="82" y="91" text-anchor="middle" font-size="6" fill="#c8a020">DARWIN FC</text>

      <!-- Sponsor -->
      <rect x="72" y="110" width="56" height="20" rx="2" fill="rgba(200,160,32,0.08)" stroke="rgba(200,160,32,0.3)" stroke-width="0.5"/>
      <text x="100" y="124" text-anchor="middle" font-size="8" fill="rgba(200,160,32,0.7)" font-weight="bold" letter-spacing="1">PELOTES</text>

      <!-- Number on back placeholder -->
      <text x="100" y="175" text-anchor="middle" font-size="36" fill="rgba(200,160,32,0.2)" font-weight="bold">7</text>

      <!-- SHORTS -->
      <path d="M55,220 L55,270 L97,270 L100,250 L103,270 L145,270 L145,220 Z" fill="#0d1428"/>
      <!-- Shorts gold stripe -->
      <path d="M55,220 L55,270 L65,270 L65,220 Z" fill="#c8a020" opacity="0.8"/>
      <path d="M135,220 L135,270 L145,270 L145,220 Z" fill="#c8a020" opacity="0.8"/>
      <!-- Shorts hex pattern -->
      <rect x="55" y="220" width="90" height="50" fill="url(#hex-home)" opacity="0.4"/>
    </svg>
    <div class="kit-label">Home Kit</div>
  </div>

  <!-- AWAY KIT -->
  <div class="kit-wrap">
    <svg width="200" height="260" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="wave-away" x="0" y="0" width="40" height="20" patternUnits="userSpaceOnUse">
          <path d="M0,10 Q10,0 20,10 Q30,20 40,10" fill="none" stroke="rgba(13,32,68,0.25)" stroke-width="1.5"/>
        </pattern>
        <clipPath id="shirt-clip2">
          <path d="M60,20 L30,60 L50,70 L50,220 L150,220 L150,70 L170,60 L140,20 L120,10 Q100,0 80,10 Z"/>
        </clipPath>
      </defs>

      <!-- SHIRT body — white/light -->
      <path d="M60,20 L30,60 L50,70 L50,220 L150,220 L150,70 L170,60 L140,20 L120,10 Q100,0 80,10 Z"
            fill="#e8f0f8"/>
      <!-- Wave pattern -->
      <rect x="0" y="0" width="200" height="260" fill="url(#wave-away)" clip-path="url(#shirt-clip2)"/>

      <!-- Navy blue side panels -->
      <path d="M50,70 L50,220 L72,220 L72,70 Z" fill="#0d2044" opacity="0.9"/>
      <path d="M128,70 L128,220 L150,220 L150,70 Z" fill="#0d2044" opacity="0.9"/>

      <!-- Navy collar -->
      <path d="M80,10 Q100,0 120,10 L124,22 Q100,14 76,22 Z" fill="#0d2044"/>
      <path d="M88,18 L100,34 L112,18" fill="none" stroke="#c8a020" stroke-width="3"/>

      <!-- Sleeve stripes -->
      <path d="M60,20 L30,60 L38,64 L66,26 Z" fill="#0d2044" opacity="0.9"/>
      <path d="M140,20 L170,60 L162,64 L134,26 Z" fill="#0d2044" opacity="0.9"/>

      <!-- Crest -->
      <circle cx="82" cy="85" r="18" fill="#0d2044" opacity="0.15" stroke="#0d2044" stroke-width="1"/>
      <text x="82" y="80" text-anchor="middle" font-size="8" fill="#0d2044" font-weight="bold">UIJP</text>
      <text x="82" y="91" text-anchor="middle" font-size="6" fill="#0d2044">DARWIN FC</text>

      <!-- Sponsor -->
      <rect x="72" y="110" width="56" height="20" rx="2" fill="rgba(13,32,68,0.08)" stroke="rgba(13,32,68,0.3)" stroke-width="0.5"/>
      <text x="100" y="124" text-anchor="middle" font-size="8" fill="rgba(13,32,68,0.7)" font-weight="bold" letter-spacing="1">PELOTES</text>

      <text x="100" y="175" text-anchor="middle" font-size="36" fill="rgba(13,32,68,0.12)" font-weight="bold">7</text>

      <!-- SHORTS — navy -->
      <path d="M55,220 L55,270 L97,270 L100,250 L103,270 L145,270 L145,220 Z" fill="#0d2044"/>
      <path d="M55,220 L55,270 L65,270 L65,220 Z" fill="#c8a020" opacity="0.8"/>
      <path d="M135,220 L135,270 L145,270 L145,220 Z" fill="#c8a020" opacity="0.8"/>
    </svg>
    <div class="kit-label">Away Kit</div>
  </div>

  <!-- KEEPER KIT -->
  <div class="kit-wrap">
    <svg width="200" height="260" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="check-gk" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
          <rect x="0" y="0" width="8" height="8" fill="rgba(0,0,0,0.15)"/>
          <rect x="8" y="8" width="8" height="8" fill="rgba(0,0,0,0.15)"/>
        </pattern>
        <clipPath id="shirt-clip3">
          <path d="M60,20 L30,60 L50,70 L50,220 L150,220 L150,70 L170,60 L140,20 L120,10 Q100,0 80,10 Z"/>
        </clipPath>
      </defs>

      <path d="M60,20 L30,60 L50,70 L50,220 L150,220 L150,70 L170,60 L140,20 L120,10 Q100,0 80,10 Z"
            fill="#1a6640"/>
      <rect x="0" y="0" width="200" height="260" fill="url(#check-gk)" clip-path="url(#shirt-clip3)"/>

      <path d="M50,70 L50,220 L72,220 L72,70 Z" fill="#0f4428" opacity="0.9"/>
      <path d="M128,70 L128,220 L150,220 L150,70 Z" fill="#0f4428" opacity="0.9"/>

      <path d="M80,10 Q100,0 120,10 L124,22 Q100,14 76,22 Z" fill="#c8a020"/>
      <path d="M88,18 L100,34 L112,18" fill="none" stroke="#fff" stroke-width="3"/>

      <path d="M60,20 L30,60 L38,64 L66,26 Z" fill="#0f4428" opacity="0.9"/>
      <path d="M140,20 L170,60 L162,64 L134,26 Z" fill="#0f4428" opacity="0.9"/>

      <circle cx="82" cy="85" r="18" fill="rgba(200,160,32,0.15)" stroke="#c8a020" stroke-width="1"/>
      <text x="82" y="80" text-anchor="middle" font-size="8" fill="#c8a020" font-weight="bold">UIJP</text>
      <text x="82" y="91" text-anchor="middle" font-size="6" fill="#c8a020">DARWIN FC</text>

      <rect x="72" y="110" width="56" height="20" rx="2" fill="rgba(0,0,0,0.1)" stroke="rgba(200,160,32,0.3)" stroke-width="0.5"/>
      <text x="100" y="124" text-anchor="middle" font-size="8" fill="rgba(200,160,32,0.8)" font-weight="bold" letter-spacing="1">PELOTES</text>

      <text x="100" y="175" text-anchor="middle" font-size="36" fill="rgba(200,160,32,0.15)" font-weight="bold">1</text>

      <path d="M55,220 L55,270 L97,270 L100,250 L103,270 L145,270 L145,220 Z" fill="#0f4428"/>
      <path d="M55,220 L55,270 L65,270 L65,220 Z" fill="#c8a020" opacity="0.8"/>
      <path d="M135,220 L135,270 L145,270 L145,220 Z" fill="#c8a020" opacity="0.8"/>
    </svg>
    <div class="kit-label">Goalkeeper Kit</div>
  </div>

</div>

<div style="font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.2);text-align:center;margin-top:10px;">
  JUAN PELOTES DARWIN FC &bull; ISABELA ISLAND, GALÁPAGOS &bull; EST. 2001
</div>

</body>
</html>
