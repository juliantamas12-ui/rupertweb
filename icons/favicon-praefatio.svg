<!-- THE PRAEFATIO · cypher - italic R and J (J dropped, period diagonal off J foot), thin double ring -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="The Praefatio">
  <rect width="200" height="200" fill="#2B1F25"/>
  <circle cx="100" cy="100" r="76" fill="none" stroke="#D4A156" stroke-width="2"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="#D4A156" stroke-width="0.8" opacity="0.55"/>
  <!-- R sits on the baseline -->
  <text x="78" y="124" font-family="'URW Bookman','Liberation Serif',Georgia,serif" font-style="italic" font-weight="500" font-size="76" fill="#D4A156" text-anchor="middle">R</text>
  <!-- J dropped a touch and offset right -->
  <text x="124" y="140" font-family="'URW Bookman','Liberation Serif',Georgia,serif" font-style="italic" font-weight="500" font-size="76" fill="#D4A156" text-anchor="middle">J</text>
  <!-- Period diagonal-down-right from the J's foot -->
  <circle cx="142" cy="160" r="3" fill="#D4A156"/>
</svg>
