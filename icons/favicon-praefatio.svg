<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: cream paper -->
  <rect width="64" height="64" fill="#E8E4D9"/>
  <!-- Outer seal ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#3F5945" stroke-width="2.5"/>
  <!-- Inner faint ring for that pressed-wax depth -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="#3F5945" stroke-width="0.6" opacity="0.4"/>
  <!-- R + J monogram, intertwined italic serif -->
  <text x="22" y="42" font-family="Fraunces, Georgia, serif" font-style="italic" font-size="28" font-weight="600" fill="#3F5945" letter-spacing="-2">R</text>
  <text x="36" y="42" font-family="Fraunces, Georgia, serif" font-style="italic" font-size="28" font-weight="600" fill="#3F5945" letter-spacing="-2">J</text>
  <!-- Tiny center bullet -->
  <circle cx="32" cy="49" r="0.9" fill="#3F5945"/>
</svg>
