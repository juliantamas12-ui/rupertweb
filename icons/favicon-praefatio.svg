<!-- THE PRAEFATIO · Hand-pressed wax seal monogram - thick uneven rim like real wax -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="The Praefatio">
  <rect width="200" height="200" fill="#2B1F25"/>

  <defs>
    <filter id="waxblur" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="0.35"/>
    </filter>
  </defs>

  <!--
    Wax-pressed rim. Two stacked paths:
    - A thick outer "wax body" with translucent gold (the bulk of the wax)
    - A thinner inner darker line where the wax meets the impression (the press edge)
    Both paths are irregular blob outlines mimicking how wax actually spreads.
  -->

  <!-- Thick outer wax body - the chunky organic rim -->
  <path d="M 100 11
           C 124 11, 146 19, 163 36
           C 180 53, 189 76, 188 100
           C 189 124, 180 146, 164 163
           C 147 180, 124 189, 100 188
           C 76 189, 53 180, 36 164
           C 19 147, 11 124, 12 100
           C 11 76, 20 53, 36 36
           C 53 19, 76 11, 100 11 Z"
        fill="none"
        stroke="#D4A156"
        stroke-width="6"
        opacity="0.85"
        stroke-linejoin="round"
        filter="url(#waxblur)"/>

  <!-- Inner highlight ring where the press impression meets the wax surface -->
  <path d="M 100 19
           C 121 19, 141 26, 156 41
           C 172 57, 180 77, 180 99
           C 181 121, 173 141, 158 157
           C 142 173, 121 181, 100 180
           C 79 181, 58 173, 43 157
           C 27 141, 19 121, 20 99
           C 19 77, 27 57, 43 42
           C 58 27, 79 19, 100 19 Z"
        fill="none"
        stroke="#E8B870"
        stroke-width="1.2"
        opacity="0.9"
        stroke-linejoin="round"/>

  <!-- Italic R + J cypher layered -->
  <g font-family="'URW Bookman','Liberation Serif',Georgia,serif" font-style="italic" font-weight="400">
    <text x="118" y="138" font-size="96" fill="#D4A156" opacity="0.78" text-anchor="middle" letter-spacing="-2">J</text>
    <text x="85" y="128" font-size="100" fill="#D4A156" text-anchor="middle" letter-spacing="-2">R</text>
  </g>

  <!-- Period mark -->
  <circle cx="100" cy="168" r="1.4" fill="#D4A156"/>
</svg>
