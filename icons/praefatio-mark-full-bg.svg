<!-- THE PRAEFATIO · Clean wax-seal monogram - chunky solid ring, italic R+J cypher -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="The Praefatio">
  <rect width="200" height="200" fill="#2B1F25"/>

  <!-- Single chunky solid ring (no hairline, no double border, no wax bulge) -->
  <circle cx="100" cy="100" r="76" fill="none" stroke="#D4A156" stroke-width="3.5"/>

  <!-- Italic R + J cypher layered (J behind, R in front) -->
  <g font-family="'URW Bookman','Liberation Serif',Georgia,serif" font-style="italic" font-weight="500">
    <text x="118" y="128" font-size="84" fill="#D4A156" opacity="0.85" text-anchor="middle" letter-spacing="-2">J</text>
    <text x="86" y="120" font-size="88" fill="#D4A156" text-anchor="middle" letter-spacing="-2">R</text>
  </g>

  <!-- Tiny period dot below the cypher -->
  <circle cx="100" cy="148" r="1.6" fill="#D4A156"/>
</svg>
