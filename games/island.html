function startChopMinigame(obj) {
  state.minigame = {
    type: 'chop', target: obj,
    indicatorPos: 0, indicatorDir: 1,
    progress: 0, maxProgress: 2, // 2 hits to fell tree
    result: null, timer: 0,
    speed: 0.018
  };
}

function startMineMinigame(obj) {
  const zones = [];
  for (let i = 0; i < 5; i++) {
    zones.push({x: 30+Math.random()*280, y: 60+Math.random()*40, hit:false});
  }
  state.minigame = {
    type: 'mine', target: obj,
    zones, currentZone: 0,
    zoneTimer: 180, progress:0,
    autoTimer: 600, // 10 second auto-complete
    result: null
  };
}

function startFishMinigame() {
  state.minigame = {
    type: 'fish_wait',
    timer: (2+Math.random()*6)*60,
    tension: 0,
    phase: 'wait' // wait -> bite -> reel -> result
  };
}

function updateMinigame(canvas) {
  const mg = state.minigame;
  if (!mg) return;

  if (mg.type === 'chop') {
    mg.indicatorPos += mg.indicatorDir * mg.speed;
    if (mg.indicatorPos > 1) { mg.indicatorPos = 1; mg.indicatorDir = -1; }
    if (mg.indicatorPos < 0) { mg.indicatorPos = 0; mg.indicatorDir = 1; }
    if (mg.result) {
      mg.resultTimer = (mg.resultTimer||40) - 1;
      if (mg.resultTimer <= 0) mg.result = null;
    }
  }

  if (mg.type === 'mine') {
    mg.zoneTimer--;
    mg.autoTimer = (mg.autoTimer||600) - 1;
    if (mg.zoneTimer <= 0 && mg.currentZone < mg.zones.length) {
      mg.currentZone = Math.min(mg.currentZone, mg.zones.filter(z=>!z.hit).length);
      mg.zoneTimer = 180;
    }
    // Auto-complete after 10 seconds
    if (mg.autoTimer <= 0) {
      state.player.inv.stone += 1;
      showMsg('+1 STONE', '#888899');
      SFX.pickup();
      state.objects = state.objects.filter(o => o !== mg.target);
      state.minigame = null;
    }
  }

  if (mg.type === 'fish_wait') {
    mg.timer--;
    if (mg.timer <= 0) {
      mg.type = 'fish_bite';
      mg.biteTimer = 120;
      showMsg('FISH BITING! PRESS F!', '#4a9ab4');
    }
  }

  if (mg.type === 'fish_bite') {
    mg.biteTimer--;
    if (mg.biteTimer <= 0) {
      showMsg('THE FISH GOT AWAY...', '#888');
      state.minigame = null;
      state.fishing = null;
    }
  }

  if (mg.type === 'fish_reel') {
    if (keys['f'] || keys[' ']) {
      mg.tension = Math.min(1, mg.tension + 0.02);
    } else {
      mg.tension = Math.max(0, mg.tension - 0.015);
    }
    if (mg.tension >= 0.6 && mg.tension <= 0.85) {
      mg.inZone = (mg.inZone||0) + 1;
      if (mg.inZone > 60) {
        // Caught! High tide gives bonus fish
        const bonusFish = state.tideLevel > 0.7 ? 1 : 0;
        state.player.inv.fish += 1 + bonusFish;
        showMsg(bonusFish ? 'FISH CAUGHT! (High tide bonus +1)' : 'FISH CAUGHT!', '#4a9ab4');
        spawnParticles(state.player.x, state.player.y, '#4a9ab4',4);
        if (state.runStats) { state.runStats.fishCaught += 1 + bonusFish; }
        state.minigame = null;
        state.fishing = null;
      }
    } else {
      mg.inZone = 0;
      if (mg.tension >= 1) {
        showMsg('LINE SNAPPED!', '#e74c3c');
        state.minigame = null;
        state.fishing = null;
      }
    }
  }
}

function drawMinigame(ctx) {
  const mg = state.minigame;
  if (!mg) return;
  const cw = ctx.canvas.width, ch = ctx.canvas.height;
  const bx = cw/2 - 180, by = ch - 180, bw = 360, bh = 120;

  ctx.fillStyle = 'rgba(61,32,16,0.96)';
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = '#8B6020';
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.strokeStyle = '#5c3a10';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx+3, by+3, bw-6, bh-6);

  ctx.font = '11px "Courier New"';
  ctx.fillStyle = '#f0d890';
  ctx.textAlign = 'center';

  if (mg.type === 'chop') {
    ctx.fillText('AXE EQUIPPED: 2 hits needed — PRESS SPACE IN THE GREEN ZONE', cw/2, by+18);
    const barX = bx+20, barY = by+35, barW = bw-40, barH = 24;
    // Bar background
    ctx.fillStyle = '#cc2222'; ctx.fillRect(barX, barY, barW, barH);
    // Yellow zones
    ctx.fillStyle = '#ccaa00';
    ctx.fillRect(barX + barW*0.25, barY, barW*0.15, barH);
    ctx.fillRect(barX + barW*0.6, barY, barW*0.15, barH);
    // Green zone
    ctx.fillStyle = '#22aa22';
    ctx.fillRect(barX + barW*0.35, barY, barW*0.25, barH);
    // Indicator
    ctx.fillStyle = '#fff';
    ctx.fillRect(barX + mg.indicatorPos*(barW-8), barY-4, 8, barH+8);
    // Progress trees
    ctx.fillStyle = '#aaa';
    for (let i = 0; i < mg.maxProgress; i++) {
      ctx.fillStyle = i < mg.progress ? '#c8f135' : '#333';
      ctx.fillRect(bx+20+i*30, by+72, 20, 20);
    }
    if (mg.result) {
      ctx.fillStyle = mg.result === 'green' ? '#22ff22' : mg.result === 'yellow' ? '#ffaa00' : '#ff2222';
      ctx.fillText(mg.result === 'green' ? 'PERFECT!' : mg.result === 'yellow' ? 'GOOD' : 'MISS!', cw/2, by+100);
    }
  }

  if (mg.type === 'mine') {
    ctx.fillText('MINING — CLICK THE GLOWING WEAK POINTS IN ORDER', cw/2, by+18);
    // Draw rock face
    ctx.fillStyle = '#555'; ctx.fillRect(bx+20, by+28, bw-40, 80);
    mg.zones.forEach((z, i) => {
      if (z.hit) { ctx.fillStyle = '#333'; }
      else if (i === mg.currentZone) {
        const pulse = 0.5 + Math.sin(state.frameCount*0.2)*0.5;
        ctx.fillStyle = `rgba(255,${Math.round(200*pulse)},0,${0.7+pulse*0.3})`;
      } else { ctx.fillStyle = '#888'; }
      ctx.fillRect(bx+20+z.x-12, by+28+z.y-60, 24, 24);
      if (!z.hit && i === mg.currentZone) {
        ctx.fillStyle = '#fff';
        ctx.font = '9px Courier New';
        ctx.fillText(i+1, bx+20+z.x, by+28+z.y-46);
      }
    });
    // Timer bar
    ctx.fillStyle = '#333'; ctx.fillRect(bx+20, by+108, bw-40, 6);
    ctx.fillStyle = mg.zoneTimer > 60 ? '#22aa22' : '#cc4400';
    ctx.fillRect(bx+20, by+108, (bw-40)*mg.zoneTimer/180, 6);
  }

  if (mg.type === 'fish_wait') {
    ctx.fillText('FISHING — WAIT FOR A BITE...', cw/2, by+18);
    // Animated fish line
    const lineX = cw/2;
    ctx.strokeStyle = '#c8a060';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(lineX, by+30);
    for (let i = 0; i < 60; i++) {
      ctx.lineTo(lineX + Math.sin(i*0.3+state.frameCount*0.05)*8, by+30+i);
    }
    ctx.stroke();
    // Bobber
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(lineX-5, by+85, 10, 10);
    ctx.fillStyle = '#fff';
    ctx.fillRect(lineX-5, by+85, 10, 5);
  }

  if (mg.type === 'fish_bite') {
    ctx.fillStyle = '#4a9ab4';
    ctx.fillText('FISH BITING! PRESS F TO REEL IN!', cw/2, by+50);
    const pulse = Math.sin(state.frameCount*0.3)*3;
    ctx.font = `${20+pulse}px Courier New`;
    ctx.fillStyle = '#ffff00';
    ctx.fillText('><>', cw/2, by+85);
  }

  if (mg.type === 'fish_reel') {
    ctx.fillText('REEL IN — HOLD F/SPACE TO TENSION, KEEP IN GREEN', cw/2, by+18);
    const barX = bx+40, barY = by+40, barW = bw-80, barH = 28;
    ctx.fillStyle = '#cc2222'; ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = '#22aa22'; ctx.fillRect(barX+barW*0.6, barY, barW*0.25, barH);
    ctx.fillStyle = '#ffaa00'; ctx.fillRect(barX+barW*0.85, barY, barW*0.15, barH);
    // Tension indicator
    ctx.fillStyle = '#fff';
    ctx.fillRect(barX + mg.tension*(barW-6), barY-4, 6, barH+8);
    ctx.fillStyle = '#aaa';
    ctx.font = '10px Courier New';
    ctx.fillText('SLACK                    SWEET SPOT              SNAP', cw/2, by+88);
  }

  ctx.textAlign = 'left';
}

function handleMinigameKey(key) {
  const mg = state.minigame;
  if (!mg) return;

  if (mg.type === 'chop' && key === ' ') {
    const pos = mg.indicatorPos;
    let result;
    if (pos >= 0.35 && pos <= 0.6) result = 'green';
    else if ((pos >= 0.25 && pos < 0.35) || (pos > 0.6 && pos <= 0.75)) result = 'yellow';
    else result = 'miss';
    mg.result = result;
    mg.resultTimer = 40;

    const prog = result === 'green' ? 2 : result === 'yellow' ? 1 : 0;
    mg.progress += prog;
    if (result !== 'miss') {
      spawnParticles(mg.target.x, mg.target.y, '#5c3d1e',4);
      SFX.chop();
    }

    if (mg.progress >= mg.maxProgress) {
      const yield_ = 3; // always 3 wood (improved feel)
      const p2 = state.player;
      p2.inv.wood += yield_;
      const tx = mg.target.x, ty = mg.target.y;
      // Axe durability
      if (p2.toolDurability && p2.toolDurability.axe > 0) {
        p2.toolDurability.axe--;
        if (p2.toolDurability.axe <= 0) { p2.inv.axe = 0; showMsg('AXE BROKE — craft a new one', '#e74c3c'); updateUI(); }
      }
      // Big floating "+3 WOOD"
      addFloatingText(tx, ty - 30, '+3 WOOD', '#c8a060');
      showMsg(`+${yield_} WOOD`, '#8B6914');
      SFX.pickup();
      // Wood fly-out particles (brown rectangles scatter)
      for (let wi = 0; wi < 4; wi++) {
        state.particles.push({x:tx, y:ty, vx:(Math.random()-0.5)*5, vy:-2-Math.random()*3, color:'#8B6914', life:40, maxLife:40, size:5});
      }
      spawnParticles(tx, ty, '#5c3d1e',4);
      // Track tree chop stat
      if (state.runStats) state.runStats.treesChopped++;
      // Tree shake: store shake target, replace with fallen log decor, then remove
      mg.target._shaking = true; mg.target._shakeTimer = 9;
      const capTarget = mg.target;
      setTimeout(() => {
        // Replace with fallen log decor for 10 seconds
        const logObj = {type:'fallen_log', x:capTarget.x, y:capTarget.y, decor:true, _lifeTimer:600};
        state.objects.push(logObj);
        state.objects = state.objects.filter(o => o !== capTarget);
        setTimeout(() => { state.objects = state.objects.filter(o => o !== logObj); }, 10000);
      }, 150);
      state.minigame = null;
    }
  }

  if (mg.type === 'fish_bite' && (key === 'f')) {
    mg.type = 'fish_reel';
    mg.tension = 0.3;
    mg.inZone = 0;
  }
}

function handleMineClick(wx, wy) {
  const mg = state.minigame;
  if (!mg || mg.type !== 'mine') return;
  const cw = window.innerWidth, ch = window.innerHeight;
  const bx = cw/2 - 180, by = ch - 180;
  // Zone positions: drawn at bx+20+z.x-12, by+28+z.y-60, size 24x24
  const z = mg.zones[mg.currentZone];
  if (!z || z.hit) return;
  const zx = bx + 20 + z.x - 12;
  const zy = by + 28 + z.y - 60;
  if (wx >= zx && wx <= zx+24 && wy >= zy && wy <= zy+24) {
    z.hit = true;
    // Spark particles on each hit
    const numSparks = 4 + Math.floor(Math.random()*3);
    for (let si = 0; si < numSparks; si++) {
      const sColor = Math.random() < 0.5 ? '#ffff88' : '#ffffff';
      state.particles.push({x:mg.target.x, y:mg.target.y, vx:(Math.random()-0.5)*5, vy:-2-Math.random()*3, color:sColor, life:12+Math.floor(Math.random()*8), maxLife:20, size:2});
    }
    spawnParticles(mg.target.x, mg.target.y, '#666677',3);
    SFX.chop();
    mg.currentZone++;
    mg.zoneTimer = 180;
    if (mg.currentZone >= mg.zones.length) {
      const perfect = mg.zones.every(z2=>z2.hit);
      const p3 = state.player;
      // Obsidian pickaxe: 5 stone per hit, indestructible
      const hasObsidian = (p3.inv.obsidian_pickaxe || 0) > 0;
      const yield_ = hasObsidian ? 5 : (perfect ? 3 : 2);
      const wasZeroStone = (state.player.inv.stone||0) === 0;
      state.player.inv.stone += yield_;
      // Pickaxe durability (obsidian doesn't lose durability)
      if (!hasObsidian && p3.toolDurability && p3.toolDurability.pickaxe > 0) {
        p3.toolDurability.pickaxe--;
        if (p3.toolDurability.pickaxe <= 0) { p3.inv.pickaxe = 0; showMsg('PICKAXE BROKE — craft a new one', '#e74c3c'); updateUI(); }
      }
      // Grey scatter particles
      for (let gi = 0; gi < 5; gi++) {
        state.particles.push({x:mg.target.x, y:mg.target.y, vx:(Math.random()-0.5)*4, vy:-1.5-Math.random()*2, color:'#888899', life:30, maxLife:30, size:4});
      }
      addFloatingText(mg.target.x, mg.target.y - 30, '+'+yield_+' STONE', '#888899');
      showMsg(`+${yield_} STONE${perfect?' (PERFECT!)':''}`, '#888899');
      SFX.pickup();
      if (wasZeroStone && !state.tutorials.stoneHint) {
        state.tutorials.stoneHint = true;
        setTimeout(() => showMsg('Craft tools at the WORKBENCH (C key)', '#c8f135'), 1500);
      }
      state.objects = state.objects.filter(o => o !== mg.target);
      state.minigame = null;
    }
  }
}

// ============================================================
// WEB AUDIO — PROCEDURAL SOUND EFFECTS
// ============================================================

const SFX = (() => {
  let ctx = null;
  let unlocked = false;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  // Unlock audio on first user interaction
  function unlock() {
    if (unlocked) return;
    unlocked = true;
    getCtx();
  }

  function _osc(type, freq, gain, dur, freqEnd) {
    try {
      const c = getCtx();
      const osc = c.createOscillator();
      const gainNode = c.createGain();
      osc.connect(gainNode);
      gainNode.connect(c.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime);
      if (freqEnd !== undefined) osc.frequency.exponentialRampToValueAtTime(freqEnd, c.currentTime + dur);
      gainNode.gain.setValueAtTime(gain, c.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      osc.start(c.currentTime);
      osc.stop(c.currentTime + dur);
    } catch(e) {}
  }

  function _noise(gainVal, dur, filterFreq) {
    try {
      const c = getCtx();
      const bufSz = Math.ceil(c.sampleRate * dur);
      const buf = c.createBuffer(1, bufSz, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) data[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource();
      src.buffer = buf;
      const filter = c.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = filterFreq || 800;
      filter.Q.value = 0.5;
      const gainNode = c.createGain();
      gainNode.gain.setValueAtTime(gainVal, c.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      src.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(c.destination);
      src.start();
      src.stop(c.currentTime + dur);
    } catch(e) {}
  }

  return {
    unlock,

    // Attack swing — short airy whoosh
    swing() {
      _noise(0.12, 0.09, 2400);
      _osc('sine', 220, 0.04, 0.09, 110);
    },

    // Hit landed on enemy — sharp impact
    hit() {
      _noise(0.22, 0.06, 600);
      _osc('square', 180, 0.08, 0.07, 60);
    },

    // Enemy death — descending crunch
    enemyDie() {
      _osc('sawtooth', 260, 0.12, 0.25, 40);
      _noise(0.18, 0.12, 300);
    },

    // Player hurt — dull thud + low grunt
    hurt() {
      _osc('sine', 100, 0.18, 0.18, 50);
      _noise(0.15, 0.1, 200);
    },

    // Chop / mine click
    chop() {
      _noise(0.2, 0.07, 1200);
      _osc('triangle', 300, 0.06, 0.05, 200);
    },

    // Item pickup — quick ascending sparkle
    pickup() {
      _osc('sine', 440, 0.07, 0.06, 660);
      setTimeout(() => _osc('sine', 660, 0.05, 0.06, 880), 60);
    },

    // Jump — brief bounce
    jump() {
      _osc('sine', 280, 0.06, 0.1, 420);
    },

    // Thunder — low rumble during storm
    thunder() {
      _noise(0.35, 1.2, 80);
      _osc('sine', 55, 0.15, 1.0, 30);
    },

    // Campfire crackle — brief noise burst
    crackle() {
      _noise(0.08, 0.15, 1800);
    },

    // Crafting complete — ascending major chord hit
    craft() {
      _osc('sine', 330, 0.07, 0.15, 330);
      setTimeout(() => _osc('sine', 415, 0.06, 0.12, 415), 60);
      setTimeout(() => _osc('sine', 495, 0.07, 0.18, 495), 120);
    },

    // Victory sting
    victory() {
      [523, 659, 784, 1047].forEach((f, i) => {
        setTimeout(() => _osc('sine', f, 0.1, 0.3), i * 100);
      });
    },

    // Metal sword clang
    swordClang() {
      _osc('square', 440, 0.1, 0.08, 220);
      _noise(0.15, 0.05, 4000);
    },

    // Bow release whoosh
    bowRelease() {
      _noise(0.12, 0.08, 3000);
      _osc('sawtooth', 600, 0.06, 0.07, 150);
    },

    // Fire crackle (bottle explode)
    fireExplode() {
      _noise(0.3, 0.2, 800);
      _osc('sawtooth', 200, 0.15, 0.25, 40);
    },

    // Volcano deep rumble — low sub-bass throb
    rumble() {
      _noise(0.4, 1.8, 60);
      _osc('sine', 38, 0.22, 1.8, 25);
      _osc('sine', 52, 0.12, 1.4, 35);
    },

    // Lava bomb impact — heavy thud + sizzle
    lavaBoom() {
      _noise(0.35, 0.35, 150);
      _osc('sine', 75, 0.28, 0.4, 20);
      _osc('sawtooth', 320, 0.1, 0.15, 60);
    }
  };
})();

// ============================================================
// PLAYER UPDATE, INPUT, INTERACTION
// ============================================================

let keys = {};
let mx = 0, my = 0;
let mouseDown = false;

// Bow fire on mouseup
document.addEventListener('mousedown', () => { mouseDown = true; });
document.addEventListener('mouseup', () => {
  mouseDown = false;
  const p = state.player;
  if (p && p.bowCharging && (p.bowCharge||0) >= 15) {
    // Fire arrow
    const camX2 = state.cam.x, camY2 = state.cam.y;
    const wx2 = mx + camX2, wy2 = my + camY2;
    const dx2 = wx2 - p.x, dy2 = wy2 - p.y;
    const dist2 = Math.sqrt(dx2*dx2+dy2*dy2);
    const speed = 10 + (p.bowCharge/30) * 4;
    if ((p.inv.arrows||0) > 0) {
      p.inv.arrows--;
      state.projectiles.push({
        type:'player_arrow', x:p.x, y:p.y,
        vx:dist2>0?dx2/dist2*speed:speed, vy:dist2>0?dy2/dist2*speed:0,
        life:80, damage:12
      });
      SFX.bowRelease();
      addFloatingText(p.x, p.y-24, 'ARROW!', '#c8a060');
    } else {
      showMsg('NO ARROWS — craft more', '#888');
    }
  }
  if (p) { p.bowCharging = false; p.bowCharge = 0; }
});

function getTile(x, y) {
  const tx = Math.floor(x/TSIZE), ty = Math.floor(y/TSIZE);
  if (ty < 0 || ty >= MSIZE || tx < 0 || tx >= MSIZE) return T.DEEP_OCEAN;
  return state.map[ty][tx];
}

function checkCollisions(nx, ny) {
  const playerR = 8;
  for (const obj of state.objects) {
    if (obj.placed && obj.type !== 'wall') continue;
    if (!['tree','rock','palm','vol_rock','wall'].includes(obj.type)) continue;
    if (obj.placed && obj.type === 'wall') {
      if (nx > obj.x - 12 && nx < obj.x + 12 && ny > obj.y - 12 && ny < obj.y + 12) return true;
    } else {
      const r = obj.type === 'tree' ? 10 : 8;
      const dx = nx - obj.x, dy = ny - obj.y;
      if (dx*dx + dy*dy < (r + playerR) * (r + playerR)) return true;
    }
  }
  return false;
}

function updatePlayer() {
  const p = state.player;
  if (state.paused || state.minigame || state.dialogue || state.collapsing || state.inWreck) return;

  // Movement
  const sprinting = keys['shift'] && p.stamina > 0;
  const tile = getTile(p.x, p.y);
  const inWater = tile === T.SHALLOW_WATER;
  const inDeepOcean = tile === T.DEEP_OCEAN;
  const inDarkJungle = tile === T.JUNGLE_DARK;
  const inDense = inDarkJungle; // slowed in dark jungle

  let spd = 2.0;
  if (sprinting) spd = 2.8;
  if (inWater) spd *= 0.5;
  if (inDeepOcean) spd *= 0.6;
  if (inDense) spd *= 0.6;
  if (p.stamina <= 0) spd *= 0.8;

  const moving = keys['w']||keys['s']||keys['a']||keys['d']||keys['arrowup']||keys['arrowdown']||keys['arrowleft']||keys['arrowright'];

  let nx = p.x, ny = p.y;
  if (keys['w']||keys['arrowup']) ny -= spd;
  if (keys['s']||keys['arrowdown']) ny += spd;
  if (keys['a']||keys['arrowleft']) nx -= spd;
  if (keys['d']||keys['arrowright']) nx += spd;

  // Clamp to world
  nx = Math.max(TSIZE, Math.min(WORLD_W-TSIZE, nx));
  ny = Math.max(TSIZE, Math.min(WORLD_H-TSIZE, ny));

  // Track distance traveled
  if (state.runStats && moving) {
    const _mvdx = nx - p.x, _mvdy = ny - p.y;
    if (_mvdx !== 0 || _mvdy !== 0) state.runStats.distanceTraveled += Math.hypot(_mvdx, _mvdy);
  }
  // Track highest day
  if (state.runStats) state.runStats.highestDayReached = Math.max(state.runStats.highestDayReached, state.day);

  // Tile collision (lava, deep ocean, impassable volcanic walls)
  const newTile = getTile(nx, ny);
  if (newTile === T.LAVA || newTile === T.VOLCANIC) {
    p.hp = Math.max(0, p.hp - 5);
    state.lastDamageCause = 'lava';
    if (state.runStats) state.runStats.damageTaken += 5;
    showMsg('LAVA! GET BACK!', '#ff4400');
    nx = p.x; ny = p.y;
  } else if (newTile === T.DEEP_OCEAN) {
    // Allow movement underwater; air system handles danger
    if (p.jumping || !checkCollisions(nx, ny)) {
      p.x = nx; p.y = ny;
    } else {
      if (p.jumping || !checkCollisions(nx, p.y)) { p.x = nx; }
      else if (p.jumping || !checkCollisions(p.x, ny)) { p.y = ny; }
    }
  } else {
    // Object collision with sliding — skip when jumping
    if (p.jumping || !checkCollisions(nx, ny)) {
      p.x = nx; p.y = ny;
    } else {
      if (p.jumping || !checkCollisions(nx, p.y)) { p.x = nx; }
      else if (p.jumping || !checkCollisions(p.x, ny)) { p.y = ny; }
    }
  }

  // ── ZONE GATES ──
  const ptx = Math.floor(p.x / TSIZE);
  const pty = Math.floor(p.y / TSIZE);
  const gateMsg = (state._gateMsg || 0);
  const canShowGateMsg = gateMsg <= 0;

  // Gate 1: Jungle wall - can't enter until Oonga quest done
  if (pty < 145 && state.zoneUnlocked < 1) {
    p.y = 145 * TSIZE;
    if (canShowGateMsg) { showMsg("Talk to OONGA first — press E near him on the beach", '#c8a060'); state._gateMsg = 180; }
  }
  // Gate 2: Inner jungle (y < 120) requires zone 2 (unlocked by Mara quest)
  else if (pty < 120 && state.zoneUnlocked < 2) {
    p.y = 120 * TSIZE;
    if (canShowGateMsg) { showMsg("The deep jungle blocks your path. Complete Mara's quest first.", '#888'); state._gateMsg = 180; }
  }
  // Gate 3: Volcanic approach (within 60 tiles of volcano centre at ~150,78) requires zone 3
  else {
    const volcX = 150, volcY = 78;
    const distFromVolcano = Math.hypot(ptx - volcX, pty - volcY);
    if (distFromVolcano < 60 && state.zoneUnlocked < 3) {
      const angle = Math.atan2(pty - volcY, ptx - volcX);
      p.x = (volcX + Math.cos(angle) * 62) * TSIZE;
      p.y = (volcY + Math.sin(angle) * 62) * TSIZE;
      if (canShowGateMsg) { showMsg("FELIX: 'I wouldn't go near that mountain without proper preparation.'", '#7ca0b0'); state._gateMsg = 180; }
    }
    // Gate 4: Village area (within 20 tiles of ~209,114) requires zone 4
    const distFromVillage = Math.hypot(ptx - 209, pty - 114);
    if (distFromVillage < 20 && state.zoneUnlocked < 4) {
      const ang = Math.atan2(pty - 114, ptx - 209);
      p.x = (209 + Math.cos(ang) * 22) * TSIZE;
      p.y = (114 + Math.sin(ang) * 22) * TSIZE;
      if (canShowGateMsg) { showMsg("KONA: 'You are not ready to face my brother. Find me first.'", '#c87050'); state._gateMsg = 180; }
    }
  }
  if (state._gateMsg > 0) state._gateMsg--;

  // Attack cooldown tick
  if (p.attackCooldown > 0) p.attackCooldown--;
  if (p.attackFlash > 0) p.attackFlash--;
  if (p.hitFlash > 0) p.hitFlash--;
  if (p.spearVisTimer > 0) p.spearVisTimer--;
  if (p.slashVisTimer > 0) p.slashVisTimer--;
  // Sword combo timer
  if (p.swordComboTimer > 0) {
    p.swordComboTimer--;
    if (p.swordComboTimer <= 0) { p.swordComboCount = 0; p.swordComboReady = false; }
  }
  // Bow charge
  if (p.bowCharging && mouseDown) {
    p.bowCharge = Math.min(30, (p.bowCharge||0) + 1);
  }
  // Fire tiles update
  if (state.fireTiles) {
    state.fireTiles = state.fireTiles.filter(ft => {
      ft.timer--;
      // Damage player if standing in fire
      const ftx = Math.floor(ft.x / TSIZE), fty = Math.floor(ft.y / TSIZE);
      const px2 = Math.floor(p.x / TSIZE), py2 = Math.floor(p.y / TSIZE);
      if (Math.abs(px2 - ftx) <= 1 && Math.abs(py2 - fty) <= 1) {
        if (state.frameCount % 60 === 0) {
          p.hp = Math.max(0, p.hp - 5);
          addFloatingText(p.x, p.y - 20, '-5', '#ff6600');
          if (navigator.vibrate) navigator.vibrate([50,20,50]);
        }
      }
      // Damage enemies in fire
      [...state.enemies, ...(state.chief?[state.chief]:[])].forEach(e => {
        const ex = Math.floor(e.x / TSIZE), ey = Math.floor(e.y / TSIZE);
        if (Math.abs(ex - ftx) <= 1 && Math.abs(ey - fty) <= 1) {
          if (state.frameCount % 60 === 0) {
            e.hp -= 5;
            addFloatingText(e.x, e.y - 20, '-5', '#ff6600');
          }
        }
      });
      return ft.timer > 0;
    });
  }

  // Creature soft push (animals nudge the player)
  state.creatures.forEach(c => {
    const cdx = p.x - c.x, cdy = p.y - c.y;
    const cdist = Math.sqrt(cdx*cdx + cdy*cdy);
    if (cdist > 0 && cdist < 16) {
      p.x += (cdx/cdist) * 0.5;
      p.y += (cdy/cdist) * 0.5;
    }
  });

  // Pit check in dark jungle (without torch)
  const tx = Math.floor(p.x/TSIZE), ty2 = Math.floor(p.y/TSIZE);
  if (state.pits.has(ty2*MSIZE+tx) && !p.torch && !p.inv.torch) {
    p.hp = 0;
    state.lastDamageCause = 'pit trap';
  showMsg('YOU FELL INTO A PIT!', '#e74c3c');
  }

  // Spike trap check
  if (state.traps) {
    for (let i = state.traps.length-1; i >= 0; i--) {
      const trap = state.traps[i];
      if (trap.triggered) continue;
      if (Math.hypot(p.x-trap.x, p.y-trap.y) < 12) {
        trap.triggered = true;
        state.traps.splice(i, 1);
        p.hp = Math.max(0, p.hp - 15);
        state.lastDamageCause = 'spike trap';
        if (state.runStats) state.runStats.damageTaken += 15;
        state.trapFlash = 2; // brief red flash frames
        showMsg('SPIKE TRAP!', '#e74c3c');
        spawnParticles(p.x, p.y, '#e74c3c',4);
      }
    }
  }

  // Water effects
  if (inWater && moving) {
    if (Math.random() < 0.2) spawnParticle(p.x+(Math.random()-0.5)*20, p.y+8, (Math.random()-0.5)*1.5, -1, '#aaddff', 20);
  }

  // Air / underwater mechanics
  if (inDeepOcean) {
    // Deplete air ~1 per second (60fps)
    state._airTimer = (state._airTimer||0) + 1;
    if (state._airTimer >= 60) { state._airTimer = 0; p.air = Math.max(0, p.air - 1); }
    // Bubble particles occasionally
    if (Math.random() < 0.05) spawnParticle(p.x+(Math.random()-0.5)*8, p.y-4, (Math.random()-0.5)*0.3, -0.8, 'rgba(160,230,255,0.7)', 40);
    if (p.air <= 0) {
      // Drowning: drain health fast
      if (state.frameCount % 12 === 0) {
        p.hp = Math.max(0, p.hp - 5);
        addFloatingText(p.x, p.y-20, '-5', '#0088cc');
      }
    } else if (p.air <= 20) {
      if (state.frameCount % 120 === 0) showMsg('LOW AIR!', '#40d8f0');
    }
  } else if (tile === T.BEACH || tile === T.SHALLOW_WATER) {
    state._airTimer = 0;
    p.air = Math.min(p.maxAir, p.air + 3);
    if (p.air > p.maxAir) p.air = p.maxAir;
  }

  // Stamina
  if (sprinting && moving) p.stamina = Math.max(0, p.stamina - 0.4);
  else p.stamina = Math.min(p.maxStamina, p.stamina + 0.3);

  // Walk animation
  if (moving) {
    p.walkTimer++;
    p.walkFrame = Math.floor(p.walkTimer/6) % 8;
    // Dirt particle trail
    if (p.walkTimer % 8 === 0 && p.onGround) {
      const tileUnder = getTile(p.x, p.y);
      let dirtColor = null;
      if (tileUnder === T.BEACH) dirtColor = '#c8b060';
      else if (tileUnder === T.JUNGLE_LIGHT || tileUnder === T.JUNGLE_DARK) dirtColor = '#3a6a1a';
      if (dirtColor) {
        const n = 2 + Math.floor(Math.random()*2);
        for (let di = 0; di < n; di++) {
          const dp = {
            x: p.x + (Math.random()-0.5)*6,
            y: p.y + 8,
            vx: (Math.random()-0.5)*1.2,
            vy: -0.3 - Math.random()*0.5,
            color: dirtColor,
            life: 20, maxLife: 20, size: 2
          };
          state.particles.push(dp);
        }
      }
    }
  } else {
    p.walkFrame = 0;
  }

  // Survival timers
  state.waterDecay = (state.waterDecay||0) + 1;
  state.foodDecay = (state.foodDecay||0) + 1;
  const waterRate = state.objects.find(o=>o.placed&&o.type==='smoker') ? 400 : 240;
  const foodRate = state.objects.find(o=>o.placed&&o.type==='smoker') ? 600 : 360;

  if (state.waterDecay > waterRate) { state.waterDecay=0; p.water=Math.max(0,p.water-1); }
  if (state.foodDecay > foodRate) { state.foodDecay=0; p.food=Math.max(0,p.food-1); }
  if (p.water <= 0) p.hp = Math.max(0, p.hp - 0.05);
  if (p.food <= 0) p.hp = Math.max(0, p.hp - 0.05);
  if (p.sick > 0) { p.sick--; p.hp = Math.max(0, p.hp - 0.1); }
  if (p.poison > 0) { p.poison--; p.hp = Math.max(0, p.hp - 0.5); }

  // Torch auto-equip
  // torch toggled manually via hotbar

  // Volcano proximity tint
  const vcx2 = 150*TSIZE, vcy2 = 78*TSIZE;
  const vd = Math.sqrt((p.x-vcx2)**2 + (p.y-vcy2)**2);
  state.volcanoTint = Math.max(0, Math.min(0.35, (120*TSIZE - vd) / (120*TSIZE)));

  // Weather effects
  if (state.weatherRain) {
    p.water = Math.min(p.maxWater, p.water + 0.005);
    if (Math.random() < 0.3) {
      spawnParticle(
        p.x + (Math.random()-0.5)*700,
        p.y - 300,
        0, 8, '#aaddff', 30
      );
    }
  }

  // Jump — simplified arc
  if (p.jumping) {
    p.jumpTimer--;
    p.jumpOffset = -Math.abs(Math.sin(p.jumpTimer / 20 * Math.PI)) * 48;
    if (p.jumpTimer <= 0) {
      p.jumping = false;
      p.jumpOffset = 0;
      p.onGround = true;
    }
  } else {
    p.jumpOffset = 0;
  }

  // Sync survey_data from wreckItems to inventory (for craft cost checks)
  if (state.wreckItems.survey_data && !(p.inv.survey_data)) {
    p.inv.survey_data = 5; // grant 5 copies for deep-sea crafting
  }

  // Tech tier unlocks
  if (state.craftingTier === 0 && (p.inv.volcanic_stone || 0) >= 5) {
    state.craftingTier = 1;
    showMsg('VOLCANIC AGE UNLOCKED — new recipes available', '#ff6600');
  }
  if (state.craftingTier === 1 && state.wreckItems.survey_data) {
    state.craftingTier = 2;
    showMsg('DEEP SEA AGE UNLOCKED — advanced crafting available', '#3dd6d0');
  }

  // Tribal brew timer tick
  if (state._tribalBrewTimer > 0) state._tribalBrewTimer--;

  // Volcanic armor: boost maxHp when first equipped
  if ((p.inv.volcanic_armor || 0) > 0 && !state._volcanicArmorActive) {
    state._volcanicArmorActive = true;
    p.maxHp = Math.min(p.maxHp + 50, 350);
    p.hp = Math.min(p.maxHp, p.hp + 50);
    showMsg('VOLCANIC ARMOR equipped — max HP +50, damage reduced 30%', '#ff6600');
  }
  if ((p.inv.volcanic_armor || 0) === 0 && state._volcanicArmorActive) {
    state._volcanicArmorActive = false;
    p.maxHp = Math.max(100, p.maxHp - 50);
    p.hp = Math.min(p.maxHp, p.hp);
  }

  // Pressure suit: triple air capacity when equipped
  if ((p.inv.pressure_suit || 0) > 0 && !state._pressureSuitActive) {
    state._pressureSuitActive = true;
    p.maxAir = Math.min(p.maxAir * 3, 900);
    showMsg('PRESSURE SUIT equipped — underwater time tripled', '#3dd6d0');
  }
  if ((p.inv.pressure_suit || 0) === 0 && state._pressureSuitActive) {
    state._pressureSuitActive = false;
    p.maxAir = Math.max(100, Math.round(p.maxAir / 3));
    p.air = Math.min(p.maxAir, p.air);
  }
}

function throwCoconut() {
  const p = state.player;
  // Q key: throw stone knife if equipped, else coconut
  const tool = getActiveTool ? getActiveTool() : null;
  if (tool === 'stone_knife' && (p.inv.stone_knife||0) > 0) {
    if ((p.knifeThrows||0) <= 0) { showMsg('KNIFE WORN OUT — craft a new one', '#888'); p.inv.stone_knife = 0; updateUI(); return; }
    const camX = state.cam.x, camY = state.cam.y;
    const wx = mx + camX, wy = my + camY;
    const dx = wx - p.x, dy = wy - p.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    state.projectiles.push({
      type:'knife_throw', x:p.x, y:p.y,
      vx:dist>0?dx/dist*9:9, vy:dist>0?dy/dist*9:0,
      life:50, damage:10
    });
    p.knifeThrows = (p.knifeThrows||3) - 1;
    if (p.knifeThrows <= 0) { p.inv.stone_knife = 0; showMsg('KNIFE BROKE!', '#888'); updateUI(); }
    return;
  }
  if ((p.inv.coconut||0) <= 0) { showMsg('NO COCONUT TO THROW', '#888'); return; }
  p.inv.coconut--;
  // Velocity toward mouse (in world coords)
  const camX = state.cam.x, camY = state.cam.y;
  const wx = mx + camX, wy = my + camY;
  const dx = wx - p.x, dy = wy - p.y;
  const dist = Math.sqrt(dx*dx+dy*dy);
  const speed = 8;
  state.projectiles.push({
    type: 'coconut_throw',
    x: p.x, y: p.y,
    vx: dist>0 ? dx/dist*speed : speed,
    vy: dist>0 ? dy/dist*speed : 0,
    life: 60, damage: 15
  });
  showMsg('COCONUT THROWN!', '#5c3d1e');
}

function handleInteract() {
  const p = state.player;
  const reach = 40;

  // Death pack pickup
  for (let i = state.objects.length-1; i >= 0; i--) {
    const obj = state.objects[i];
    if (obj.type === 'death_pack') {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < reach) {
        // Recover items
        for (const [k,v] of Object.entries(obj.inv)) {
          p.inv[k] = (p.inv[k]||0) + v;
        }
        state.objects.splice(i, 1);
        showMsg('PACK RECOVERED! YOUR ITEMS ARE BACK.', '#c8f135');
        spawnParticles(obj.x, obj.y, '#ffffff',4);
        return;
      }
    }
  }

  // NPC interaction
  for (let npc of state.npcs) {
    const d = Math.hypot(p.x-npc.x, p.y-npc.y);
    if (d < reach) {
      startDialogue(npc);
      return;
    }
  }

  // Lore stones
  for (let stone of state.loreStones) {
    const d = Math.hypot(p.x-stone.x, p.y-stone.y);
    if (d < reach && !stone.read) {
      stone.read = true;
      state.dialogue = {
        type: 'lore',
        text: stone.text,
        timer: 0,
        displayed: '',
      };
      return;
    }
  }

  // Forge — repair all tools with 1 stone
  for (let fobj of state.objects) {
    if (fobj.placed && fobj.type === 'forge') {
      const fd = Math.hypot(p.x-fobj.x, p.y-fobj.y);
      if (fd < reach) {
        if ((p.inv.stone||0) >= 1) {
          p.inv.stone--;
          const maxDur = {axe:20,pickaxe:15,sword:25,spear:20,fire_axe:20,fire_spear:15,stone_knife:10,bow:30};
          if (!p.toolDurability) p.toolDurability = {};
          Object.keys(maxDur).forEach(k => { if ((p.inv[k]||0) > 0) p.toolDurability[k] = maxDur[k]; });
          p.knifeThrows = 3;
          showMsg('TOOLS REPAIRED! (used 1 stone)', '#c8f135');
          spawnParticles(fobj.x, fobj.y, '#ffaa00',4);
        } else {
          showMsg('NEED 1 STONE to repair tools at Forge', '#888');
        }
        return;
      }
    }
  }

  // Bed sleep
  for (let obj of state.objects) {
    if (obj.placed && obj.type === 'bed') {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < reach) {
        if (!state.isNight) { showMsg('NOT DARK ENOUGH TO SLEEP', '#888'); return; }
        const nearEnemy = state.enemies.some(e => Math.hypot(p.x-e.x,p.y-e.y) < 200);
        if (nearEnemy) { showMsg('ENEMIES TOO CLOSE TO SLEEP', '#e74c3c'); return; }
        sleepToMorning();
        return;
      }
    }
    // Campfire cook
    if (obj.placed && obj.type === 'campfire') {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < reach) {
        if (p.inv.fish > 0) { p.inv.fish--; p.inv.fish_cooked++; state.cookedFoodDay = state.day; showMsg('COOKED FISH', '#e67e22'); return; }
        if (p.inv.fruit > 0) { p.inv.fruit--; p.inv.fruit_cooked++; state.cookedFoodDay = state.day; showMsg('COOKED FRUIT', '#e67e22'); return; }
        showMsg('NOTHING TO COOK', '#888');
        return;
      }
    }
    // Chest
    if (obj.placed && obj.type === 'chest') {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < reach) { openChest(obj); return; }
    }
  }

  // Wreck interior navigation
  if (state.inWreck) {
    const wreckItemDefs = ['captains_log','crew_manifest','survey_data','medicine_chest','signal_flare'];
    const idx = state.wreckCursor;
    const key = wreckItemDefs[idx];
    if (!state.wreckItems[key]) {
      state.wreckItems[key] = true;
      if (key === 'captains_log') {
        state.dialogue = { type:'lore', text:"CAPTAIN'S LOG: 'We sail under false charts. The Colonial Trading Company paid our voyage. True mission: survey this island for mineral rights, timber, and subjugation potential. The crew does not know. God forgive me.'", displayed:'', timer:0, charIdx:0 };
        state.storyChoices.learnedTruth = true;
      } else if (key === 'crew_manifest') {
        state.dialogue = { type:'lore', text:"CREW MANIFEST: Aldric Voss, Bo Chen, Piet Janssen, Samuel Grey, Yusuf al-Rashid, Noa Kaleo, Elara Vance, [your name]. Seven names are struck through in dark ink. One remains.", displayed:'', timer:0, charIdx:0 };
      } else if (key === 'survey_data') {
        state.dialogue = { type:'lore', text:"SURVEY DATA: Detailed charts. Timber estimates. A note reads: 'Tribe population manageable. Recommend pacification in Phase 2. Island designation: Colony Site 7-A.'", displayed:'', timer:0, charIdx:0 };
      } else if (key === 'medicine_chest') {
        p.maxHp = Math.min(200, p.maxHp + 50);
        p.hp = Math.min(p.maxHp, p.hp + 50);
        showMsg('MEDICINE CHEST: +50 MAX HEALTH', '#40ff88');
        spawnParticles(p.x, p.y-20, '#40ff88', 5);
      } else if (key === 'signal_flare') {
        p.inv.signal_flare = 1;
        showMsg('SIGNAL FLARE collected — use it on the beach to call for rescue', '#ff8840');
      }
    } else {
      showMsg('Already taken.', '#888');
    }
    return;
  }

  // Underwater wreck — enter interior
  for (let obj of state.objects) {
    if (obj.type === 'underwater_wreck') {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < 60) {
        state.inWreck = true;
        state.wreckCursor = 0;
        showMsg("ENTERING THE WRECK — W/S to navigate, E to take, ESC to exit", '#40d8d0');
        return;
      }
    }
  }

  // Signal flare on beach
  if ((p.inv.signal_flare||0) > 0) {
    const flTile = getTile(p.x, p.y);
    if (flTile === T.BEACH) {
      p.inv.signal_flare = 0;
      updateUI();
      // Trigger rescue ending
      state.cutscenesSeen.delete('ending_rescue');
      const csDef = CUTSCENES['ending_rescue'];
      if (csDef) {
        csDef.onComplete = () => {
          // Choice: warn tribe or stay silent
          state.dialogue = {
            type: 'choice',
            text: "A rescue ship approaches. You carry the truth about the Colonial Trading Company's plans for this island. Do you warn the tribe before you leave?",
            displayed: "A rescue ship approaches. You carry the truth about the Colonial Trading Company's plans for this island. Do you warn the tribe before you leave?",
            charIdx: 999,
            timer: 0,
            options: ['WARN THE TRIBE', 'STAY SILENT'],
            optionNext: null,
            onChoice: (choiceIdx) => {
              const warned = choiceIdx === 0;
              const title = warned ? 'RESCUE — TRUTH TOLD' : 'RESCUE — SILENCE';
              const text = warned
                ? 'You sent runners to the village. Kona\'s eyes met yours as the ship departed. He understood. The Colonial Trading Company\'s plans died with the Meridian\'s manifest. The island endures.'
                : 'The ship took you home. You said nothing. Somewhere behind you, surveyors were already being dispatched. You live with what you knew. The island will not.';
              document.getElementById('win-title').textContent = title;
              document.getElementById('win-text').textContent = text;
              document.getElementById('win-screen').style.display = 'flex';
              state.running = false;
              SFX.victory();
              animateYacht();
            }
          };
        };
      }
      playCutscene('ending_rescue');
      return;
    } else {
      showMsg('Use the flare on the BEACH to signal rescue', '#ff8840');
      return;
    }
  }

  // Waterfall interaction
  for (let obj of state.objects) {
    if (obj.type === 'waterfall' && !obj.decor) {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < 50) {
        p.water = Math.min(p.maxWater, p.water + 50);
        showMsg('DRANK FROM WATERFALL', '#3dd6d0');
        spawnParticles(obj.x, obj.y, '#55aaee',4);
        return;
      }
    }
  }

  // Cave interaction
  for (let obj of state.objects) {
    if (obj.type === 'cave' && !obj.opened) {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < 40) {
        obj.opened = true;
        // Give random loot
        p.inv.stone = (p.inv.stone||0) + 3;
        p.inv.wood = (p.inv.wood||0) + 3;
        p.inv.volcanic_stone = (p.inv.volcanic_stone||0) + 1;
        p.inv.fish = (p.inv.fish||0) + 2;
        p.inv.coconut = (p.inv.coconut||0) + 2;
        showMsg('TIDAL CAVE: STONE x3, WOOD x3, VOLCANIC STONE x1, FISH x2, COCONUT x2', '#c8a060');
        spawnParticles(obj.x, obj.y, '#c8f135',4);
        return;
      }
    }
  }

  // Altar interaction
  for (let obj of state.objects) {
    if (obj.type === 'altar') {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < 40 && !state.altarUsed) {
        state.altarUsed = true;
        p.maxHp += 20;
        p.hp = Math.min(p.maxHp, p.hp + 20);
        showMsg('THE ISLAND BLESSES YOU. +20 MAX HEALTH', '#ffee44');
        spawnParticles(obj.x, obj.y, '#ffaa00',4);
        return;
      }
    }
  }

  // Bottle interaction
  const bottleMsgs = [
    "The volcano holds great power. Those who reach its peak find more than fire.",
    "The tribe fears nothing except the mask of their ancestors. Find it on their chief.",
    "There is a lagoon to the north. The warriors never go there. I know not why."
  ];
  for (let obj of state.objects) {
    if (obj.type === 'bottle' && !obj.read) {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < 40) {
        obj.read = true;
        const msg = bottleMsgs[obj.msgIdx % bottleMsgs.length];
        state.dialogue = { type:'lore', text: msg, displayed:'', timer:0, charIdx:0 };
        return;
      }
    }
  }

  // Fishing
  const tile2 = getTile(p.x, p.y);
  const nearWater2 = [T.SHALLOW_WATER, T.BEACH].includes(tile2);
  if (nearWater2 && !state.minigame) {
    if (p.inv.fishing_rod <= 0) { showMsg('NEED A FISHING ROD TO FISH', '#e74c3c'); return; }
    startFishMinigame();
    return;
  }
}


// Get currently equipped tool from hotbar
function getActiveTool() {
  const p = state.player;
  // Build tool list: same order as hotbar (excluding fishing_rod from hotbar — use F key)
  const tools = [
    {id:'axe'}, {id:'fire_axe'}, {id:'obsidian_pickaxe'}, {id:'pickaxe'}, {id:'sword'},
    {id:'spear'}, {id:'fire_spear'}, {id:'lava_blade'}, {id:'depth_spear'},
    {id:'stone_knife'}, {id:'bow'},
    {id:'fire_bottle'}, {id:'lava_bomb'}, {id:'signal_mirror'}, {id:'torch'}, {id:'coconut'}
  ].filter(t => (p.inv[t.id]||0) > 0);
  if (!state.activeSlot) state.activeSlot = 1;
  const slot = tools[state.activeSlot - 1];
  return slot ? slot.id : null;
}
function handleClick(sx, sy) {
  if (state.cutscenePlaying) { advanceCutscene(); return; }
  if (!state.running) return;
  const p = state.player;

  // Minigame mine click
  if (state.minigame?.type === 'mine') {
    handleMineClick(sx, sy);
    return;
  }

  if (state.minigame) return;

  // Dialogue click
  if (state.dialogue) {
    const d = state.dialogue;
    // Check if clicking an option button
    if (d.charIdx >= d.text.length && d.options && d.options.length > 0 && d._optRects) {
      for (let i = 0; i < d._optRects.length; i++) {
        const r = d._optRects[i];
        if (sx >= r.x && sx <= r.x+r.w && sy >= r.y && sy <= r.y+r.h) {
          selectDialogueOption(i);
          return;
        }
      }
      // Clicked outside options — do nothing (wait for choice)
      return;
    }
    advanceDialogue();
    return;
  }

  if (state.buildMode) {
    placeBuildItem(sx, sy);
    return;
  }

  const camX = state.cam.x, camY = state.cam.y;
  const wx = sx + camX, wy = sy + camY;
  const reach = 80; // generous reach for tree/rock interaction

  const tool = getActiveTool();

  // ── WEAPON TOOLS: attack nearest enemy ──
  const isWeapon = tool === 'sword' || tool === 'spear' || tool === 'fire_spear' || tool === 'fire_axe' || tool === 'stone_knife' || tool === 'lava_blade' || tool === 'depth_spear';
  if (isWeapon) {
    if (p.attackCooldown > 0) {
      showMsg('WEAPON COOLING DOWN...', '#888');
      return;
    }
    // Cooldown and range per weapon
    const cooldownMap = {sword:20, spear:30, fire_spear:45, fire_axe:25, stone_knife:15, lava_blade:22, depth_spear:28};
    const dmgMap = {sword:15, spear:18, fire_spear:30, fire_axe:22, stone_knife:8, lava_blade:35, depth_spear:50};
    const rangeMap = {sword:48, spear:80, fire_spear:64, fire_axe:56, stone_knife:36, lava_blade:52, depth_spear:72};
    const combatColor = (tool==='fire_spear'||tool==='fire_axe'||tool==='lava_blade') ? '#ff6600' : (tool==='depth_spear' ? '#3dd6d0' : '#e74c3c');
    const attackReach = rangeMap[tool] || 56;
    let combatDmg = dmgMap[tool] || 8;
    // Tribal brew strength boost
    if (state._tribalBrewTimer > 0) combatDmg *= 2;
    // Volcanic armor damage reduction applied when taking damage (handled below)
    p.attackCooldown = cooldownMap[tool] || 30;
    p.attackFlash = 6;

    // Sword combo system
    if (tool === 'sword') {
      if (p.swordComboReady) {
        combatDmg *= 2;
        p.swordComboReady = false;
        p.swordComboCount = 0;
        addFloatingText(p.x, p.y - 30, 'COMBO x2!', '#ffff00');
      }
      SFX.swordClang();
      // Slash visual
      p.slashVisTimer = 8;
      const camX2 = state.cam.x, camY2 = state.cam.y;
      p.slashAngle = Math.atan2((my + camY2) - p.y, (mx + camX2) - p.x);
    } else {
      SFX.swing();
    }

    // Spear visual
    if (tool === 'spear' || tool === 'fire_spear') {
      p.spearVisTimer = 5;
      const camX2 = state.cam.x, camY2 = state.cam.y;
      p.slashAngle = Math.atan2((my + camY2) - p.y, (mx + camX2) - p.x);
    }

    // Durability check
    if (p.toolDurability && p.toolDurability[tool] !== undefined) {
      p.toolDurability[tool]--;
      if (p.toolDurability[tool] <= 0) {
        p.inv[tool] = 0;
        p.toolDurability[tool] = 0;
        showMsg(tool.toUpperCase().replace('_',' ') + ' BROKE — craft a new one', '#e74c3c');
        updateUI();
        return;
      }
    }

    let hit = false;
    const allTargets = [...state.enemies, ...(state.chief?[state.chief]:[])];

    if (tool === 'spear' || tool === 'fire_spear' || tool === 'depth_spear') {
      // Spear: hit up to 2 enemies in a line (sorted by distance)
      let hitCount = 0;
      const maxSpearHits = 2;
      allTargets.sort((a,b) => Math.hypot(p.x-a.x,p.y-a.y) - Math.hypot(p.x-b.x,p.y-b.y));
      for (const e of allTargets) {
        if (hitCount >= maxSpearHits) break;
        if (Math.hypot(p.x-e.x, p.y-e.y) < attackReach) {
          e.hp -= combatDmg;
          e.hitFlash = 6;
          // Knockback
          const knockAngle = Math.atan2(e.y - p.y, e.x - p.x);
          e.x += Math.cos(knockAngle) * 20;
          e.y += Math.sin(knockAngle) * 20;
          addFloatingText(e.x, e.y - 20, '-'+combatDmg, combatColor);
          spawnParticles(e.x, e.y, combatColor,4);
          // Fire spear burn
          if (tool === 'fire_spear') {
            e.burning = 90;
            spawnParticles(e.x, e.y, '#ff6600',4);
          }
          SFX.hit();
          if (e.hp <= 0) SFX.enemyDie();
          hit = true; hitCount++;
          if (navigator.vibrate) navigator.vibrate(30);
        }
      }
    } else {
      // Sword / fire_axe / stone_knife / lava_blade: hit enemies in range
      for (const e of allTargets) {
        if (Math.hypot(p.x-e.x, p.y-e.y) < attackReach) {
          e.hp -= combatDmg;
          e.hitFlash = 6;
          // Knockback
          const knockAngle = Math.atan2(e.y - p.y, e.x - p.x);
          e.x += Math.cos(knockAngle) * 20;
          e.y += Math.sin(knockAngle) * 20;
          addFloatingText(e.x, e.y - 20, '-'+combatDmg, combatColor);
          spawnParticles(e.x, e.y, combatColor,4);
          // Lava blade ignite
          if (tool === 'lava_blade') {
            e.burning = 120;
            spawnParticles(e.x, e.y, '#ff4400',4);
          }
          SFX.hit();
          if (e.hp <= 0) SFX.enemyDie();
          hit = true;
          if (navigator.vibrate) navigator.vibrate(30);
        }
      }
      // Sword combo tracking
      if (tool === 'sword' && hit) {
        p.swordComboCount = (p.swordComboCount||0) + 1;
        p.swordComboTimer = 180; // reset 3s window
        if (p.swordComboCount >= 3) {
          p.swordComboReady = true;
          p.swordComboCount = 0;
          addFloatingText(p.x, p.y - 40, 'COMBO READY!', '#ffcc00');
        }
      }
    }

    // Also hit creatures
    for (let i = state.creatures.length-1; i >= 0; i--) {
      const c = state.creatures[i];
      if (c.type === 'crab') continue;
      if (Math.hypot(p.x-c.x, p.y-c.y) < attackReach) {
        c.hp -= combatDmg;
        c.hitFlash = 6;
        const knockAngle = Math.atan2(c.y - p.y, c.x - p.x);
        c.x += Math.cos(knockAngle) * 20;
        c.y += Math.sin(knockAngle) * 20;
        addFloatingText(c.x, c.y - 20, '-'+combatDmg, combatColor);
        spawnParticles(c.x, c.y, '#22cc44',4);
        SFX.hit();
        if (c.hp <= 0) {
          SFX.enemyDie();
          if (c.type === 'spider') { p.inv.wood++; addFloatingText(c.x, c.y-20, '+1 WOOD', '#8B6914'); showMsg('+1 WOOD (SPIDER WEB)', '#8B6914'); }
          if (c.type === 'shark') { p.inv.fish = (p.inv.fish||0)+2; addFloatingText(c.x, c.y-20, '+2 FISH', '#3dd6d0'); showMsg('+2 FISH (SHARK)', '#e67e22'); }
          state.creatures.splice(i, 1);
        }
        hit = true;
        break;
      }
    }
    if (!hit) showMsg('NO ENEMIES IN RANGE', '#888');
    return;
  }

  // ── BOW: hold to charge, release fires ──
  if (tool === 'bow') {
    if ((p.inv.arrows||0) <= 0) { showMsg('NO ARROWS — craft more (1 stone + 1 wood = 5)', '#888'); return; }
    // On click: start charging
    p.bowCharging = true;
    p.bowCharge = 0;
    return;
  }

  // ── FIRE BOTTLE: thrown on click ──
  if (tool === 'fire_bottle') {
    if ((p.inv.fire_bottle||0) <= 0) return;
    p.inv.fire_bottle--;
    const camX2 = state.cam.x, camY2 = state.cam.y;
    const wx2 = sx + camX2, wy2 = sy + camY2;
    const dx2 = wx2 - p.x, dy2 = wy2 - p.y;
    const dist2 = Math.sqrt(dx2*dx2+dy2*dy2);
    state.projectiles.push({
      type:'fire_bottle', x:p.x, y:p.y,
      vx:dist2>0?dx2/dist2*7:7, vy:dist2>0?dy2/dist2*7:0,
      life:60, damage:20
    });
    SFX.swing();
    updateUI();
    return;
  }

  // ── LAVA BOMB: thrown on click, AoE 40 dmg ──
  if (tool === 'lava_bomb') {
    if ((p.inv.lava_bomb||0) <= 0) return;
    p.inv.lava_bomb--;
    const camLB = state.cam.x, camLBY = state.cam.y;
    const wxLB = sx + camLB, wyLB = sy + camLBY;
    const dxLB = wxLB - p.x, dyLB = wyLB - p.y;
    const distLB = Math.sqrt(dxLB*dxLB+dyLB*dyLB);
    state.projectiles.push({
      type:'lava_bomb', x:p.x, y:p.y,
      vx:distLB>0?dxLB/distLB*6:6, vy:distLB>0?dyLB/distLB*6:0,
      life:60, damage:40, aoe:true
    });
    SFX.swing();
    updateUI();
    return;
  }

  // ── SIGNAL MIRROR: stuns nearest enemy for 3s ──
  if (tool === 'signal_mirror') {
    if ((p.inv.signal_mirror||0) <= 0) return;
    const allEnems = [...state.enemies, ...(state.chief?[state.chief]:[])];
    const nearest = allEnems.reduce((best, e) => {
      const d = Math.hypot(p.x-e.x, p.y-e.y);
      return (!best || d < best.d) ? {e, d} : best;
    }, null);
    if (nearest && nearest.d < 200) {
      nearest.e.stunTimer = 180; // 3 seconds at 60fps
      nearest.e.hitFlash = 10;
      addFloatingText(nearest.e.x, nearest.e.y - 20, 'BLINDED!', '#ffffaa');
      spawnParticles(nearest.e.x, nearest.e.y, '#ffffaa', 6);
      showMsg('SIGNAL MIRROR — enemy blinded!', '#ffffaa');
    } else {
      showMsg('No enemy in range (need <200px)', '#888');
    }
    return;
  }

  // ── HEARTY MEAL: use from hotbar ──
  if (tool === 'hearty_meal') {
    if ((p.inv.hearty_meal||0) <= 0) return;
    p.inv.hearty_meal--;
    p.food = Math.min(p.maxFood, p.food + 40);
    p.hp = Math.min(p.maxHp, p.hp + 20);
    addFloatingText(p.x, p.y-30, '+40 FOOD +20 HP', '#ffcc80');
    showMsg('HEARTY MEAL — well fed and healing', '#ffcc80');
    updateUI();
    return;
  }

  // ── AXE TOOL: click on tree ──
  if (tool === 'axe') {
    // find nearest tree within 80px of WORLD click position
    let nearest = null, nearestDist = 80;
    for (const obj of state.objects) {
      if (obj.placed) continue;
      const isTree = ['tree','breadfruit','mape','purau','pandanus','filao','hutu','palm'].includes(obj.type);
      if (!isTree) continue;
      const d = Math.hypot(wx-obj.x, wy-obj.y);
      if (d < nearestDist) { nearest = obj; nearestDist = d; }
    }
    if (nearest) {
      startChopMinigame(nearest);
    } else {
      showMsg('No tree in range — click closer to a tree', '#888');
    }
    return;
  }

  // ── FIRE AXE: instant chop ──
  if (tool === 'fire_axe') {
    // fire_axe also attacks enemies (handled in weapon block above)
    // here: click on tree for instant chop
    let nearest = null, nearestDist = 80;
    for (const obj of state.objects) {
      if (obj.placed) continue;
      const isTree = ['tree','breadfruit','mape','purau','pandanus','filao','hutu','palm'].includes(obj.type);
      if (!isTree) continue;
      const d = Math.hypot(wx-obj.x, wy-obj.y);
      if (d < nearestDist) { nearest = obj; nearestDist = d; }
    }
    if (nearest) {
      // Instant chop, 3 wood
      const yield_ = 3;
      p.inv.wood = (p.inv.wood||0) + yield_;
      state.objects = state.objects.filter(o => o !== nearest);
      showMsg(`+${yield_} WOOD (FIRE AXE)`, '#ff6600');
      spawnParticles(nearest.x, nearest.y, '#ff6600',4);
      // +WOOD floating particle
      spawnParticle(nearest.x, nearest.y-20, 0, -1.2, '#c8f135', 60);
      SFX.chop(); SFX.pickup();
    } else {
      // No tree: treat as weapon attack (already handled above via isWeapon check)
      showMsg('No tree in range — or equip to attack enemies', '#888');
    }
    return;
  }

  // ── PICKAXE TOOL: click on rock ──
  if (tool === 'pickaxe') {
    let nearest = null, nearestDist = 80;
    for (const obj of state.objects) {
      if (obj.placed) continue;
      if (obj.type !== 'rock' && obj.type !== 'vol_rock') continue;
      const d = Math.hypot(wx-obj.x, wy-obj.y);
      if (d < nearestDist) { nearest = obj; nearestDist = d; }
    }
    if (nearest) {
      startMineMinigame(nearest);
    } else {
      showMsg('No rock in range — click closer to a rock', '#888');
    }
    return;
  }

  // ── FISHING ROD: click on shallow water tile ──
  if (tool === 'fishing_rod') {
    const clickTile = getTile(wx, wy);
    if (clickTile === 1) { // SHALLOW_WATER
      if (!state.minigame) startFishMinigame();
    } else {
      showMsg('Click on shallow water to fish (F key also works)', '#3dd6d0');
    }
    return;
  }

  // ── TORCH: toggle on/off (also handled by hotbar key) ──
  if (tool === 'torch') {
    p.torch = !p.torch;
    showMsg(p.torch ? 'TORCH ON — reveals pit traps in dark jungle' : 'TORCH OFF', p.torch ? '#ffaa00' : '#888');
    return;
  }

  // ── COCONUT: throw toward click ──
  if (tool === 'coconut') {
    throwCoconut();
    return;
  }

  // (unarmed tree check removed)

  // Unarmed attacks (very weak)
  let hit = false;
  const combatDmg = 4;
  const attackReach = 56;
  SFX.swing();
  [...state.enemies, ...(state.chief?[state.chief]:[])].forEach(e => {
    if (Math.hypot(p.x-e.x, p.y-e.y) < attackReach) {
      e.hp -= combatDmg;
      e.hitFlash = 6;
      spawnParticles(e.x, e.y, '#e74c3c',4);
      SFX.hit();
      if (e.hp <= 0) SFX.enemyDie();
      hit = true;
    }
  });
  if (hit) return;

  // Harvest objects - find nearest to CLICK POSITION, then check player is in reach
  // First find nearest object to where player clicked
  let nearestObj = null, nearestClickDist = 64; // 8 tiles click radius
  for (let i = state.objects.length-1; i >= 0; i--) {
    const obj = state.objects[i];
    if (obj.placed || obj.type === 'death_pack' || obj.type === 'shipwreck') continue;
    const clickDist = Math.hypot(wx-obj.x, wy-obj.y); // click proximity
    const playerDist = Math.hypot(p.x-obj.x, p.y-obj.y); // player proximity
    if (clickDist < nearestClickDist && playerDist < 100) {
      nearestClickDist = clickDist;
      nearestObj = obj;
    }
  }
  // Process only the nearest clicked object
  const interactReach = 100;
  for (let i = state.objects.length-1; i >= 0; i--) {
    const obj = state.objects[i];
    if (obj !== nearestObj) continue; // only process the nearest clicked object
    if (obj.placed) continue;
    if (obj.type === 'death_pack' || obj.type === 'shipwreck') continue;
    const d = Math.hypot(p.x-obj.x, p.y-obj.y);
    if (d > interactReach) continue;

    if (['tree','breadfruit','mape','purau','pandanus','filao','hutu'].includes(obj.type)) {
      const activeTool = getActiveTool ? getActiveTool() : null;
      if (!activeTool || (activeTool !== 'axe' && activeTool !== 'fire_axe')) {
        showMsg('Equip an AXE to chop trees (press its slot number)', '#c8a060');
        return;
      }
      startChopMinigame(obj); return;
    }
    if (obj.type === 'rock' || obj.type === 'vol_rock') {
      startMineMinigame(obj); return;
    }
    if (obj.type === 'palm' && obj.respawn<=0) {
      obj.respawn = 1800;
      p.inv.coconut++;
      p.water = Math.min(p.maxWater, p.water+20);
      showMsg('+COCONUT (+WATER)', '#3498db');
      SFX.pickup();
      return;
    }
    if (obj.type === 'berry' && obj.respawn<=0) {
      obj.respawn = 3600;
      // Raw berry — risk of sickness
      if (Math.random() < 0.2) { p.sick = 200; showMsg('SICK FROM RAW BERRIES!', '#e74c3c'); SFX.hurt(); }
      else { p.food = Math.min(p.maxFood, p.food+15); showMsg('+BERRIES (RAW)', '#e67e22'); SFX.pickup(); }
      return;
    }
    if (obj.type === 'fruit') {
      if (Math.random() < 0.2) { p.sick = 200; showMsg('SICK FROM RAW FRUIT!', '#e74c3c'); SFX.hurt(); }
      else { p.food = Math.min(p.maxFood, p.food+20); showMsg('+FRUIT (RAW)', '#e67e22'); SFX.pickup(); }
      spawnParticles(obj.x, obj.y, '#2ecc71',4);
      state.objects.splice(i,1);
      return;
    }
    if (obj.type === 'fish_cooked' || obj.type === 'fish_cooked') {
      p.food = Math.min(p.maxFood, p.food+40);
      SFX.pickup();
      state.objects.splice(i,1);
      return;
    }
    if (obj.type === 'driftwood' && !obj.collected) {
      obj.collected = true;
      const wasZeroWood = (p.inv.wood||0) === 0;
      p.inv.wood++;
      addFloatingText(obj.x, obj.y - 20, '+1 WOOD', '#c8a060');
      showMsg('+DRIFTWOOD', '#8B6914');
      SFX.pickup();
      // Tutorial hint: first wood pickup
      if (wasZeroWood && !state.tutorials.woodHint) {
        state.tutorials.woodHint = true;
        setTimeout(() => showMsg('GOOD! Now press C to craft a Stone Axe (2 wood + 2 stone)', '#c8f135'), 1500);
      }
      state.objects.splice(i,1);
      return;
    }
    if (obj.type === 'journal') {
      p.inv.journal = (p.inv.journal||0) + 1;
      showMsg("MARA'S JOURNAL FOUND. RETURN IT TO HER.", '#c8a060');
      spawnParticles(obj.x, obj.y, '#c8a060',4);
      SFX.pickup();
      state.objects.splice(i,1);
      return;
    }
    if (obj.type === 'tribal_child' && !obj.collected) {
      obj.collected = true;
      p.inv.tribal_child = (p.inv.tribal_child||0) + 1;
      showMsg("YOU FOUND THE TRIBAL CHILD. BRING HER TO MARA.", '#c8a060');
      spawnParticles(obj.x, obj.y, '#f0d890',4);
      SFX.pickup();
      state.objects.splice(i,1);
      return;
    }
    if (obj.type === 'vine_pickup' && !obj.collected) {
      obj.collected = true;
      p.inv.vine = (p.inv.vine||0) + 1;
      addFloatingText(obj.x, obj.y - 20, '+1 VINE', '#2a8a18');
      showMsg('+1 VINE (can craft bow)', '#2a8a18');
      SFX.pickup();
      state.objects.splice(i,1);
      return;
    }
    if (obj.type === 'jungle_chest' && !obj.opened) {
      obj.opened = true;
      const items = ['stone','stone','stone','food_pack','volcanic_stone'];
      const item = items[Math.floor(Math.random()*items.length)];
      if (item==='stone') { p.inv.stone+=3; showMsg('+3 STONE (JUNGLE CHEST)', '#888'); }
      else if (item==='volcanic_stone') { p.inv.volcanic_stone+=2; showMsg('+2 VOLCANIC STONE!', '#ff6600'); }
      spawnParticles(obj.x, obj.y, '#c8f135',4);
      SFX.craft(); // chest open = satisfying ding
      return;
    }
    if (obj.type === 'vol_chest' && !obj.opened) {
      obj.opened = true;
      p.inv.fire_axe = 1;
      p.inv.fire_spear = 1;
      p.inv.volcanic_stone += 5;
      showMsg('FIRE AXE + FIRE SPEAR FOUND!', '#ff6600');
      spawnParticles(obj.x, obj.y, '#ff6600',4);
      SFX.victory();
      return;
    }
    if (obj.type === 'treasure_chest' && !obj.opened) {
      obj.opened = true;
      // Always give food/water bonus
      p.food = Math.min(p.maxFood, p.food + 15);
      p.water = Math.min(p.maxWater, p.water + 10);
      let foundItem = '';
      const tier = obj.lootTier || 'common';
      const rareRoll = Math.random() < 0.30;
      if (tier === 'rare' || (tier === 'uncommon' && rareRoll)) {
        // Rare loot
        const rareItems = ['fire_spear','fire_axe','chiefs_mask'];
        const ri = rareItems[Math.floor(Math.random()*rareItems.length)];
        p.inv[ri] = (p.inv[ri]||0) + 1;
        foundItem = ri.replace(/_/g,' ').toUpperCase();
        showMsg('TREASURE FOUND! ' + foundItem, '#ffcc00');
        spawnParticles(obj.x, obj.y, '#ffcc00',4);
        SFX.victory();
      } else if (tier === 'uncommon' || (tier === 'common' && rareRoll)) {
        // Uncommon loot
        const uncItems = [
          () => { p.inv.volcanic_stone=(p.inv.volcanic_stone||0)+2; return '+2 VOLCANIC STONE'; },
          () => { p.inv.fishing_rod=1; return 'FISHING ROD'; },
          () => { p.inv.torch=(p.inv.torch||0)+2; return '+2 TORCHES'; },
        ];
        foundItem = uncItems[Math.floor(Math.random()*uncItems.length)]();
        showMsg('TREASURE FOUND! ' + foundItem, '#ffcc00');
        spawnParticles(obj.x, obj.y, '#ffcc00',4);
        SFX.craft();
      } else {
        // Common loot
        p.inv.wood = (p.inv.wood||0) + 5;
        p.inv.stone = (p.inv.stone||0) + 3;
        p.inv.coconut = (p.inv.coconut||0) + 2;
        foundItem = 'WOOD x5, STONE x3, COCONUT x2';
        showMsg('TREASURE FOUND! ' + foundItem, '#ffcc00');
        spawnParticles(obj.x, obj.y, '#ffcc00',4);
        SFX.craft();
      }
      return;
    }
  }
}

function sleepToMorning() {
  const p = state.player;
  if (p.food < 20) {
    showMsg('Too hungry to sleep — find food first', '#e74c3c');
    return;
  }
  p.food = Math.max(0, p.food - 20);
  state.frameCount = Math.ceil(state.frameCount / state.DAY_FRAMES) * state.DAY_FRAMES;
  p.hp = Math.min(p.maxHp, p.hp + 100);
  p.water = Math.min(p.maxWater, p.water + 80);
  state.enemies = [];
  state.day++;
  showMsg('You slept deeply. Dawn breaks refreshed.', '#c8f135');
  spawnDayEnemies();
}

function spawnDayEnemies() {
  if (state.day >= 3) spawnEnemies(Math.min(2+state.day, 8), 'scout');
  if (state.day >= 5) spawnEnemies(1, 'archer');
  if (state.day >= 15 && !state.chief && !state.player.chiefDefeated) spawnChief();
}
