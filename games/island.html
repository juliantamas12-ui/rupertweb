function drawTile(ctx, type, sx, sy) {
  sx = Math.floor(sx); sy = Math.floor(sy);
  const animated = type === T.LAVA;
  if (animated) {
    const lavaFlicker = 0.7 + Math.sin(state.frameCount * 0.1 + sx * 0.3 + sy * 0.2) * 0.3;
    ctx.fillStyle = `rgb(${Math.round(255*lavaFlicker)},${Math.round(80*lavaFlicker)},0)`;
  } else if (type === T.BEACH) {
    // Check if near volcano for volcanic sand
    const tx = Math.round(sx/TSIZE) + Math.floor(state.cam.x/TSIZE);
    const ty = Math.round(sy/TSIZE) + Math.floor(state.cam.y/TSIZE);
    const vcx = 250, vcy = 65; // volcano tile coords
    const vdist = Math.sqrt((tx-vcx)**2 + (ty-vcy)**2);
    ctx.fillStyle = vdist < 40 ? '#8a7060' : TILE_COLORS[type];
  } else {
    ctx.fillStyle = TILE_COLORS[type];
  }
  ctx.fillRect(sx, sy, TSIZE, TSIZE);

  // Micro-variation: slight brightness offset per tile based on position hash
  // No per-frame tile overlays

  // Tile variation
  if (type === T.BEACH) {
    const tx = Math.round(sx/TSIZE), ty = Math.round(sy/TSIZE);
    const v = (tx * 7 + ty * 13) % 5;
    if (v === 0) { ctx.fillStyle = 'rgba(0,0,0,0.06)'; ctx.fillRect(sx, sy, TSIZE, TSIZE); }
  }
  
  // Shallow water - clean turquoise, no extra texture
}

function drawPlacedObject(ctx, obj, sx, sy) {
  switch (obj.type) {
    case 'campfire':
      px(ctx, '#5c3d1e', sx-6, sy, 12, 8);
      px(ctx, '#8B6914', sx-4, sy-4, 8, 6);
      const flicker = Math.sin(state.frameCount*0.2)*2;
      px(ctx, '#ff6600', sx-4, sy-8+flicker, 8, 8);
      px(ctx, '#ffcc00', sx-2, sy-12+flicker, 4, 6);
      break;
    case 'wall':
      // Wooden wall
      px(ctx, '#5c3d1e', sx-8, sy-14, 16, 28);  // dark wood base
      px(ctx, '#7a5c2e', sx-6, sy-12, 12, 24);  // lighter wood face
      px(ctx, '#3d2010', sx-8, sy-14, 2, 28);   // left edge shadow
      px(ctx, '#8b6020', sx-8, sy-14, 16, 3);   // top cap
      px(ctx, '#4a2e10', sx-4, sy-8, 2, 16);    // wood grain line 1
      px(ctx, '#4a2e10', sx+2, sy-8, 2, 16);    // wood grain line 2
      if (obj.hp !== undefined && obj.hp < 20) {
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(sx-8, sy-16, 16*(obj.hp/20), 3);
      }
      break;
    case 'bed':
      px(ctx, '#8B6914', sx-10, sy-2, 20, 12);
      px(ctx, '#fff', sx-8, sy-6, 16, 8);
      px(ctx, '#c8a060', sx-12, sy-4, 6, 8);
      break;
    case 'chest':
      px(ctx, '#7a5c2e', sx-10, sy-6, 20, 16);
      px(ctx, '#c8a060', sx-10, sy-8, 20, 4);
      px(ctx, '#888', sx-2, sy-3, 4, 6);
      break;
    case 'watchtower':
      px(ctx, '#5c3d1e', sx-4, sy-40, 8, 40);
      px(ctx, '#7a5c2e', sx-12, sy-44, 24, 8);
      px(ctx, '#5c3d1e', sx-10, sy-52, 20, 10);
      break;
    case 'forge':
      px(ctx, '#444455', sx-12, sy-4, 24, 16);
      px(ctx, '#6a2020', sx-8, sy-12, 16, 12);
      const fFlicker = Math.sin(state.frameCount*0.15)*2;
      px(ctx, '#ff4400', sx-4, sy-16+fFlicker, 8, 8);
      px(ctx, '#ffaa00', sx-2, sy-18+fFlicker, 4, 4);
      break;
    case 'smoker':
      px(ctx, '#555', sx-8, sy-2, 16, 12);
      px(ctx, '#333', sx-6, sy-8, 12, 8);
      // Smoke particles
      if (state.frameCount % 10 === 0) {
        spawnParticle(obj.x, obj.y-12, (Math.random()-0.5)*0.5, -0.8, 'rgba(200,200,200,0.5)', 60);
      }
      break;
    case 'vessel':
      px(ctx, '#7a5c2e', sx-8, sy-2, 16, 14);
      px(ctx, '#6a4c1e', sx-10, sy+2, 20, 6);
      // Water fill indicator when raining
      if (state.weatherRain) {
        px(ctx, '#3dd6d0', sx-6, sy+1, 12, 6);
      }
      break;
  }
}

function drawMinimap(minimapCtx) {
  const mc = minimapCtx;
  const scale = 120 / MSIZE;
  mc.imageSmoothingEnabled = false;

  for (let y = 0; y < MSIZE; y += 2) {
    for (let x = 0; x < MSIZE; x += 2) {
      mc.fillStyle = TILE_COLORS[state.map[y][x]];
      mc.fillRect(x*scale, y*scale, 2*scale+1, 2*scale+1);
    }
  }

  // Placed objects
  mc.fillStyle = '#c8f135';
  state.objects.filter(o=>o.placed).forEach(o => {
    mc.fillRect(o.x/TSIZE*scale-1, o.y/TSIZE*scale-1, 3, 3);
  });

  // Enemies
  mc.fillStyle = '#e74c3c';
  state.enemies.forEach(e => mc.fillRect(e.x/TSIZE*scale-1, e.y/TSIZE*scale-1, 3, 3));
  if (state.chief) mc.fillRect(state.chief.x/TSIZE*scale-2, state.chief.y/TSIZE*scale-2, 5, 5);

  // NPCs
  mc.fillStyle = '#4a9ab4';
  state.npcs.forEach(n => mc.fillRect(n.x/TSIZE*scale-1, n.y/TSIZE*scale-1, 3, 3));

  // Player
  mc.fillStyle = '#ffffff';
  mc.fillRect(state.player.x/TSIZE*scale-2, state.player.y/TSIZE*scale-2, 5, 5);
}


function drawGuide(ctx) {
  if (!state.running || state.cutscenePlaying) return;
  const p = state.player;
  let msg = null;

  // Determine what the player should do next
  if ((p.inv.wood||0) === 0 && (p.inv.driftwood||0) === 0) {
    msg = ["STEP 1", "Click the brown logs", "on the beach to get wood"];
  } else if ((p.inv.stone||0) < 2) {
    msg = ["STEP 2", "Click grey rocks to mine stone", "(bare hands work, slowly)"];
  } else if ((p.inv.axe||0) === 0 && (p.inv.pickaxe||0) === 0) {
    msg = ["STEP 3", "Press C to open crafting", "Make a Stone Axe (2W+2S)"];
  } else if ((p.inv.axe||0) > 0 && state.activeSlot !== 1) {
    msg = ["TIP", "Press 1 to equip your AXE", "Then click a tree"];
  } else if (state.zoneUnlocked < 1) {
    msg = ["NEXT", "Talk to OONGA", "Press E near him"];
  }

  if (!msg) return;

  const bx = canvas.width - 180, by = 60;
  ctx.fillStyle = 'rgba(40,20,8,0.85)';
  ctx.strokeStyle = '#8b6020';
  ctx.lineWidth = 1;
  // Draw guide box
  ctx.beginPath();
  ctx.roundRect(bx, by, 170, 60, 8);
  ctx.fill();
  ctx.stroke();
  
  ctx.font = 'bold 10px Cinzel, serif';
  ctx.fillStyle = '#c8f135';
  ctx.textAlign = 'left';
  ctx.fillText(msg[0], bx+10, by+16);
  ctx.font = '10px Lato, sans-serif';
  ctx.fillStyle = '#e8d49a';
  ctx.fillText(msg[1], bx+10, by+32);
  ctx.fillStyle = '#a08040';
  ctx.fillText(msg[2], bx+10, by+48);
  ctx.textAlign = 'left';
}
function render(ctx, minimapCtx) {
  const p = state.player;
  const canvas = ctx.canvas;

  // Camera with shake
  const targetCamX = p.x - canvas.width/2;
  const targetCamY = p.y - canvas.height/2;
  state.cam.x = Math.floor(state.cam.x + (targetCamX - state.cam.x) * 0.12);
  state.cam.y = Math.floor(state.cam.y + (targetCamY - state.cam.y) * 0.12);

  // screenShake removed

  const camX = state.cam.x, camY = state.cam.y;

  // Sky — clean day/night cycle, no orange tint
  let sky;
  const dt = state.dayTime;
  if (dt < 0.1) sky = '#0a0a1e';                    // deep night
  else if (dt < 0.2) {                               // dawn
    const t = (dt-0.1)/0.1;
    sky = `rgb(${Math.round(10+t*225)},${Math.round(10+t*196)},${Math.round(30+t*205)})`;
  }
  else if (dt < 0.6) sky = '#87CEEB';               // bright day
  else if (dt < 0.7) {                               // dusk — purple/blue not orange
    const t = (dt-0.6)/0.1;
    sky = `rgb(${Math.round(135-t*80)},${Math.round(206-t*180)},${Math.round(235-t*200)})`;
  }
  else sky = '#0a0a1e';                              // night
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Visible tile range
  const sx0 = Math.max(0, Math.floor(camX/TSIZE));
  const sy0 = Math.max(0, Math.floor(camY/TSIZE));
  const sx1 = Math.min(MSIZE, sx0 + Math.ceil(canvas.width/TSIZE) + 2);
  const sy1 = Math.min(MSIZE, sy0 + Math.ceil(canvas.height/TSIZE) + 2);

  // Draw tiles
  for (let ty = sy0; ty < sy1; ty++) {
    for (let tx = sx0; tx < sx1; tx++) {
      drawTile(ctx, state.map[ty][tx], Math.floor(tx*TSIZE - camX), Math.floor(ty*TSIZE - camY));
    }
  }

  // Shoreline waves at beach/water boundary
  for (let ty = sy0; ty < sy1; ty++) {
    for (let tx = sx0; tx < sx1; tx++) {
      if (state.map[ty][tx] !== T.BEACH) continue;
      const tileX = tx*TSIZE - camX, tileY = ty*TSIZE - camY;
      const neighbors = [{dx:0,dy:-1,edge:'top'},{dx:0,dy:1,edge:'bot'},{dx:-1,dy:0,edge:'left'},{dx:1,dy:0,edge:'right'}];
      neighbors.forEach(n => {
        const nt = state.map[ty+n.dy]?.[tx+n.dx];
        if (nt === T.SHALLOW_WATER || nt === T.DEEP_OCEAN) {
          // Static foam dots using tile position hash — no per-frame flicker
          const foamHash = Math.sin(tx * 0.5 + ty * 0.7) * 0.5 + 0.5;
          const showFoam = foamHash > 0.55;
          if (showFoam) {
            ctx.fillStyle = 'rgba(220,240,255,0.55)';
            if (n.edge === 'top') ctx.fillRect(tileX, tileY, TSIZE, 2);
            else if (n.edge === 'bot') ctx.fillRect(tileX, tileY+TSIZE-2, TSIZE, 2);
            else if (n.edge === 'left') ctx.fillRect(tileX, tileY, 2, TSIZE);
            else if (n.edge === 'right') ctx.fillRect(tileX+TSIZE-2, tileY, 2, TSIZE);
          }
        }
      });
    }
  }

  // Transition overlays: wet sand near water, jungle edge near beach
  for (let ty = sy0; ty < sy1; ty++) {
    for (let tx = sx0; tx < sx1; tx++) {
      const t = state.map[ty][tx];
      const tileX = tx*TSIZE - camX, tileY = ty*TSIZE - camY;
      if (t === T.BEACH) {
        // Check proximity to water tiles within 2 tiles
        let nearWater = false;
        for (let dy2 = -2; dy2 <= 2 && !nearWater; dy2++) {
          for (let dx2 = -2; dx2 <= 2 && !nearWater; dx2++) {
            const nt = state.map[ty+dy2]?.[tx+dx2];
            if (nt === T.SHALLOW_WATER || nt === T.DEEP_OCEAN) nearWater = true;
          }
        }
        if (nearWater) {
          ctx.fillStyle = 'rgba(0,30,60,0.12)';
          ctx.fillRect(tileX, tileY, TSIZE, TSIZE);
        }
        // Green tufts at edge adjacent to JUNGLE_LIGHT
        const jNeighbors = [{dx:0,dy:-1,edge:'top'},{dx:0,dy:1,edge:'bot'},{dx:-1,dy:0,edge:'left'},{dx:1,dy:0,edge:'right'}];
        jNeighbors.forEach(n => {
          if (state.map[ty+n.dy]?.[tx+n.dx] === T.JUNGLE_LIGHT) {
            ctx.fillStyle = '#3a7a1a';
            const hash = (tx*7 + ty*13) % 4;
            if (n.edge === 'top') {
              for (let i = 0; i < 3; i++) ctx.fillRect(tileX + 1 + i*3, tileY, 2, 4 + (hash+i)%3);
            } else if (n.edge === 'bot') {
              for (let i = 0; i < 3; i++) ctx.fillRect(tileX + 1 + i*3, tileY+TSIZE-4-(hash+i)%3, 2, 4 + (hash+i)%3);
            } else if (n.edge === 'left') {
              for (let i = 0; i < 3; i++) ctx.fillRect(tileX, tileY + 1 + i*3, 4+(hash+i)%3, 2);
            } else {
              for (let i = 0; i < 3; i++) ctx.fillRect(tileX+TSIZE-4-(hash+i)%3, tileY + 1 + i*3, 4+(hash+i)%3, 2);
            }
          }
        });
      }
      if (t === T.JUNGLE_LIGHT) {
        // Check proximity to beach within 2 tiles
        let nearBeach = false;
        for (let dy2 = -2; dy2 <= 2 && !nearBeach; dy2++) {
          for (let dx2 = -2; dx2 <= 2 && !nearBeach; dx2++) {
            const nt = state.map[ty+dy2]?.[tx+dx2];
            if (nt === T.BEACH) nearBeach = true;
          }
        }
        if (nearBeach) {
          ctx.fillStyle = 'rgba(220,200,120,0.2)';
          ctx.fillRect(tileX, tileY, TSIZE, TSIZE);
        }
      }
    }
  }

  // Draw pit indicators (dark x marks in dark jungle, only if no torch)
  if (!p.torch) {
    for (let ty = sy0; ty < sy1; ty++) {
      for (let tx = sx0; tx < sx1; tx++) {
        if (state.pits.has(ty*MSIZE+tx)) {
          const psx = tx*TSIZE - camX, psy = ty*TSIZE - camY;
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(psx+4, psy+4, TSIZE-8, TSIZE-8);
        }
      }
    }
  }

  // Volcano (scaled for 300-tile world: center=150, volcano offset=-72)
  const vcx = 150*TSIZE - camX, vcy = 78*TSIZE - camY;
  if (vcx > -350 && vcx < canvas.width+350) drawVolcano(ctx, vcx, vcy);

  // Lore stones
  state.loreStones.forEach(stone => {
    const sx = stone.x - camX, sy = stone.y - camY;
    if (sx < -20 || sx > canvas.width+20) return;
    px(ctx, stone.read?'#333':'#7a6a50', sx-8, sy-12, 16, 20);
    px(ctx, stone.read?'#444':'#c8a060', sx-6, sy-14, 12, 4);
    if (!stone.read) {
      ctx.fillStyle = '#ff8800';
      ctx.font = '10px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('?', sx, sy-16);
      ctx.textAlign = 'left';
    }
  });

  // Placed objects
  state.objects.filter(o=>o.placed).forEach(obj => {
    const sx = obj.x - camX, sy = obj.y - camY;
    if (sx < -50 || sx > canvas.width+50) return;
    drawPlacedObject(ctx, obj, sx, sy);
  });

  // Build ghost
  if (state.buildMode && state.buildItem) {
    const ghostX = mx + camX - TSIZE/2, ghostY = my + camY - TSIZE/2;
    ctx.fillStyle = 'rgba(200,255,100,0.3)';
    ctx.fillRect(mx-16, my-16, 32, 32);
    ctx.strokeStyle = '#c8f135';
    ctx.strokeRect(mx-16, my-16, 32, 32);
    ctx.fillStyle = '#c8f135';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(state.buildItem.toUpperCase(), mx, my-20);
    ctx.textAlign = 'left';
  }

  // Projectiles
  drawProjectiles(ctx, camX, camY);

  // --- Depth-sorted entity rendering ---
  const drawList = [];

  // World objects (non-placed, already filtered above for shadow ellipses)
  // We draw the objects again here in sorted order, skip the old forEach above for world objects
  state.objects.forEach(obj => {
    if (obj.placed) return;
    if (obj.type === 'death_pack') return;
    const osx = obj.x - camX, osy = obj.y - camY;
    if (osx < -40 || osx > canvas.width+40 || osy < -40 || osy > canvas.height+40) return;
    const capturedObj = obj, capturedOsx = osx, capturedOsy = osy;
    // Crabs draw below player (ground creatures) — use y+8 so player sorts on top
    const sortY = obj.type === 'crab' ? obj.y + 8 : obj.y;
    drawList.push({y: sortY, draw: () => {
      const ssx = capturedObj.x - camX, ssy = capturedObj.y - camY;
      // Shadow ellipse
      if (['tree','palm','rock','vol_rock','jungle_chest','vol_chest','treasure_chest','step_stone','ancient_statue','skull_stake','dead_tree','mossy_log','breadfruit','mape','purau','pandanus','filao','hutu'].includes(capturedObj.type)) {
        ctx.save(); ctx.fillStyle = 'rgba(0,0,0,0.22)';
        const shadowW = capturedObj.type === 'tree' || capturedObj.type === 'palm' ? 18 : capturedObj.type === 'rock' || capturedObj.type === 'vol_rock' ? 12 : 10;
        ctx.beginPath(); ctx.ellipse(ssx + 4, ssy + 12, shadowW, shadowW * 0.3, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
      }
      switch (capturedObj.type) {
        case 'tree': { const ttx2=Math.floor(capturedObj.x/TSIZE),tty2=Math.floor(capturedObj.y/TSIZE); const tt2=(state.map[tty2]&&state.map[tty2][ttx2])||0; if(tt2===T.JUNGLE_DARK)drawJungleTree(ctx,ssx,ssy); else drawTree(ctx,ssx,ssy); break; }
        case 'jungle_tree2': drawJungleTree2(ctx,ssx,ssy); break;
        case 'jungle_tree3': drawJungleTree3(ctx,ssx,ssy); break;
        // Tahitian species
        case 'breadfruit': drawBreadfruitTree(ctx,ssx,ssy); break;
        case 'mape': drawMapeTree(ctx,ssx,ssy); break;
        case 'purau': drawPurauTree(ctx,ssx,ssy); break;
        case 'pandanus': drawPandanusTree(ctx,ssx,ssy); break;
        case 'filao': drawFilaoTree(ctx,ssx,ssy); break;
        case 'hutu': drawHutuTree(ctx,ssx,ssy); break;
        case 'coral': drawCoral(ctx,ssx,ssy); break;
        case 'fern': drawFern(ctx,ssx,ssy); break;
        case 'palm': drawPalm(ctx,ssx,ssy); break;
        case 'rock': case 'vol_rock': drawRock(ctx,ssx,ssy); if(capturedObj.type==='vol_rock')drawVolRock(ctx,ssx,ssy); break;
        case 'berry': case 'fruit': drawBerry(ctx,ssx,ssy); break;
        case 'fish_spot': drawFishSpot(ctx,ssx,ssy); break;
        case 'reed': drawReed(ctx,ssx,ssy); break;
        case 'step_stone': px(ctx,'rgba(0,0,0,0.3)',ssx-11,ssy+4,22,5); px(ctx,'#3a2e20',ssx-10,ssy+0,20,6); px(ctx,'#6a5a4a',ssx-10,ssy-5,20,8); px(ctx,'#9a8a7a',ssx-8,ssy-7,16,4); px(ctx,'#7a6a5a',ssx-6,ssy-6,4,2); break;
        case 'dead_tree': drawDeadTree(ctx,ssx,ssy); break;
        case 'flower_patch': drawFlowerPatch(ctx,ssx,ssy); break;
        case 'mossy_log': drawMossyLog(ctx,ssx,ssy); break;
        case 'skull_stake': drawSkullStake(ctx,ssx,ssy); break;
        case 'ancient_statue': drawAncientStatue(ctx,ssx,ssy); break;
        case 'waterfall': if(capturedObj.decor){drawWaterfall(ctx,ssx,ssy);}else{drawInteractableWaterfall(ctx,ssx,ssy);} break;
        case 'cave': drawCave(ctx,ssx,ssy); break;
        case 'altar': drawAltar(ctx,ssx,ssy); break;
        case 'bottle': if(!capturedObj.read) drawBottle(ctx,ssx,ssy); break;
        case 'campfire_remains': drawCampfireRemains(ctx,ssx,ssy); break;
        case 'tide_pool': drawTidePool(ctx,ssx,ssy); break;
        case 'shipwreck': drawShipwreck(ctx,ssx,ssy); break;
        case 'journal': {
          ctx.save(); ctx.fillStyle='#8B6020'; ctx.fillRect(ssx-6,ssy-8,12,14); ctx.fillStyle='#c8a060'; ctx.fillRect(ssx-5,ssy-7,10,12); ctx.fillStyle='#5c3010'; ctx.fillRect(ssx-5,ssy-7,2,12); ctx.fillStyle='#f0d890'; ctx.fillRect(ssx-2,ssy-5,7,1); ctx.fillRect(ssx-2,ssy-3,7,1); ctx.fillRect(ssx-2,ssy-1,5,1);
          const jGlow=0.3+Math.sin(state.frameCount*0.08)*0.2; ctx.fillStyle=`rgba(255,220,100,${jGlow})`; ctx.beginPath(); ctx.arc(ssx,ssy-2,10,0,Math.PI*2); ctx.fill(); ctx.restore(); break;
        }
        case 'jungle_bird': drawJungleBird(ctx,ssx,ssy,capturedObj.colorIdx||0); break;
        case 'jungle_flower': drawJungleFlower(ctx,ssx,ssy,capturedObj.colorIdx||0); break;
        case 'jungle_floor': drawJungleFloor(ctx,ssx,ssy); break;
        case 'crab': drawCrab(ctx,ssx,ssy,capturedObj.dir||1); break;
        case 'hut': drawHut(ctx,ssx,ssy); break;
        case 'tribal_fire': { const tf=Math.sin(state.frameCount*0.2)*2; px(ctx,'#5c3d1e',ssx-6,ssy,12,8); px(ctx,'#ff6600',ssx-4,ssy-8+tf,8,8); px(ctx,'#ffcc00',ssx-2,ssy-12+tf,4,6); break; }
        case 'driftwood': px(ctx,'#8B6914',ssx-10,ssy-2,20,4); px(ctx,'#7a5514',ssx-6,ssy-4,6,2); break;
        case 'tribal_child': {
          // Small child figure — crouching, frightened
          if (!capturedObj.collected) {
            const cbob = Math.sin(state.frameCount*0.06)*1;
            px(ctx,'rgba(0,0,0,0.15)',ssx-5,ssy+9+cbob,10,3);
            // Legs
            px(ctx,'#6a3010',ssx-3,ssy+2+cbob,3,7);
            px(ctx,'#6a3010',ssx,ssy+2+cbob,3,7);
            // Body
            px(ctx,'#8a5030',ssx-4,ssy-4+cbob,8,6);
            // Head
            px(ctx,'#8a5030',ssx-3,ssy-11+cbob,6,7);
            // Eyes (scared wide)
            px(ctx,'#fff',ssx-2,ssy-9+cbob,2,2);
            px(ctx,'#fff',ssx+1,ssy-9+cbob,2,2);
            px(ctx,'#111',ssx-2,ssy-9+cbob,1,1);
            px(ctx,'#111',ssx+2,ssy-9+cbob,1,1);
            // Hair
            px(ctx,'#1a0800',ssx-3,ssy-12+cbob,6,3);
            // Glow pulse
            const cg=0.2+Math.sin(state.frameCount*0.1)*0.15;
            ctx.fillStyle=`rgba(240,210,100,${cg})`; ctx.beginPath(); ctx.arc(ssx,ssy,14,0,Math.PI*2); ctx.fill();
          }
          break;
        }
        case 'reed': drawReed(ctx,ssx,ssy); break;
        case 'jungle_chest': if(!capturedObj.opened){px(ctx,'#7a5c2e',ssx-8,ssy-6,16,12);px(ctx,'#c8a060',ssx-8,ssy-8,16,4);} break;
        case 'vol_chest': if(!capturedObj.opened){px(ctx,'#7a3020',ssx-10,ssy-8,20,16);px(ctx,'#ff6600',ssx-10,ssy-10,20,4);} break;
        case 'treasure_chest': {
          // Sand-buried variant: draw sand mound underneath
          if (capturedObj.buried && !capturedObj.opened) {
            ctx.fillStyle = 'rgba(232,212,154,0.7)'; ctx.beginPath(); ctx.ellipse(ssx, ssy+8, 14, 6, 0, 0, Math.PI*2); ctx.fill();
          }
          drawTreasureChest(ctx, ssx, ssy, capturedObj.opened, capturedObj.glowOrange);
          break;
        }
      }
      // Respawn sparkle indicator — green dots when palm/berry ready
      if ((capturedObj.type==='palm'||capturedObj.type==='berry') && capturedObj.respawn===0) {
        const sparkDots = [{ox:-6,oy:-28},{ox:0,oy:-32},{ox:6,oy:-26},{ox:-3,oy:-30}];
        sparkDots.forEach((sd,si) => {
          ctx.fillStyle = si%2===0 ? '#44ff88' : '#88ffaa';
          ctx.fillRect(Math.round(ssx+sd.ox), Math.round(ssy+sd.oy), 2, 2);
        });
      }
    }});
  });

  // Enemies
  state.enemies.forEach(e => {
    const esx = e.x - camX, esy = e.y - camY;
    if (esx < -60 || esx > canvas.width+60) return;
    const capturedE = e;
    drawList.push({y: e.y, draw: () => {
      capturedE.walkTimer++;
      drawEnemy(ctx, capturedE.x - camX, capturedE.y - camY, capturedE);
    }});
  });
  if (state.chief) {
    const capturedChief = state.chief;
    drawList.push({y: state.chief.y, draw: () => {
      capturedChief.walkTimer++;
      drawEnemy(ctx, capturedChief.x - camX, capturedChief.y - camY, capturedChief);
    }});
  }

  // Creatures
  state.creatures.forEach(c => {
    const csx = c.x - camX, csy = c.y - camY;
    if (csx < -60 || csx > ctx.canvas.width+60 || csy < -60 || csy > ctx.canvas.height+60) return;
    const capturedC = c;
    drawList.push({y: c.y, draw: () => {
      const sx2 = capturedC.x - camX, sy2 = capturedC.y - camY;
      if (capturedC.type === 'spider') {
        drawSpider(ctx, sx2, sy2);
        px(ctx, '#333', sx2-10, sy2-18, 20, 3);
        px(ctx, '#22cc44', sx2-10, sy2-18, Math.round(20*capturedC.hp/capturedC.maxHp), 3);
      } else if (capturedC.type === 'croc') {
        drawShark(ctx, sx2, sy2);
        px(ctx, '#333', sx2-14, sy2-18, 28, 3);
        px(ctx, '#2d8a22', sx2-14, sy2-18, Math.round(28*capturedC.hp/capturedC.maxHp), 3);
      } else if (capturedC.type === 'bat') {
        drawBat(ctx, sx2, sy2);
        px(ctx, '#333', sx2-8, sy2-14, 16, 3);
        px(ctx, '#2a1040', sx2-8, sy2-14, Math.round(16*capturedC.hp/capturedC.maxHp), 3);
      }
      if (capturedC.hitFlash > 0) {
        capturedC.hitFlash--;
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillRect(sx2-8, sy2-10, 16, 16);
      }
    }});
  });

  // NPCs
  state.npcs.forEach(npc => {
    if (!npc || npc.companion) return;
    const nsx = npc.x - camX, nsy = npc.y - camY;
    if (nsx < -60 || nsx > canvas.width+60) return;
    const capturedNpc = npc;
    drawList.push({y: npc.y, draw: () => {
      capturedNpc.bobTimer++;
      drawNPC(ctx, capturedNpc.x - camX, capturedNpc.y - camY, capturedNpc);
    }});
  });

  // Player
  drawList.push({y: p.y, draw: () => {
    const tile = getTile(p.x, p.y);
    drawPlayer(ctx, canvas.width/2, canvas.height/2 + (p.jumpOffset||0), p);
  }});

  // Sort by y and draw
  drawList.sort((a, b) => a.y - b.y);
  drawList.forEach(item => item.draw());

  // Draw spike traps (visible only with torch, otherwise hidden in dark jungle)
  if (state.traps) {
    state.traps.forEach(trap => {
      const tsx = trap.x - camX, tsy = trap.y - camY;
      if (tsx < -30 || tsx > canvas.width+30 || tsy < -30 || tsy > canvas.height+30) return;
      const tileUnder = getTile(trap.x, trap.y);
      if (tileUnder === T.JUNGLE_DARK && !p.torch) return; // invisible without torch
      drawSpikeTrap(ctx, tsx, tsy);
    });
  }

  // Campfire glow at night — warm golden radius, brighter when player is nearby
  if (state.isNight) {
    state.objects.filter(o => o.placed && o.type === 'campfire').forEach(cf => {
      const cfsx = cf.x - camX, cfsy = cf.y - camY;
      if (cfsx < -140 || cfsx > canvas.width+140) return;
      const nearPlayer = Math.hypot(state.player.x - cf.x, state.player.y - cf.y) < 120;
      const glowR = nearPlayer ? 120 : 90;
      const grd = ctx.createRadialGradient(cfsx, cfsy, 0, cfsx, cfsy, glowR);
      grd.addColorStop(0, 'rgba(255,180,50,0.28)');
      grd.addColorStop(0.4, 'rgba(255,140,20,0.15)');
      grd.addColorStop(1, 'rgba(255,100,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(cfsx, cfsy, glowR, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // Trap flash
  if (state.trapFlash > 0) {
    state.trapFlash--;
    ctx.fillStyle = 'rgba(200,0,0,0.4)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Particles
  drawParticles(ctx, camX, camY);

  // Footprints on beach
  state.footprints.forEach(fp => {
    const fpx = fp.x - camX, fpy = fp.y - camY;
    const a = (fp.life / fp.maxLife) * 0.5;
    ctx.fillStyle = `rgba(180,150,100,${a})`;
    ctx.fillRect(Math.round(fpx-2), Math.round(fpy), 3, 2);
    ctx.fillRect(Math.round(fpx+2), Math.round(fpy+3), 3, 2);
  });

  // Ambient birds (drawn in sky layer)
  state.birds.forEach(b => {
    const bsx = b.wx - camX, bsy = b.wy - camY;
    if (bsx < -20 || bsx > canvas.width+20) return;
    const flapPhase = Math.floor(b.flapFrame / 8) % 2;
    ctx.fillStyle = b.color || '#e8e8e8';
    if (flapPhase === 0) {
      // Wings up: V shape
      ctx.fillRect(Math.round(bsx-6), Math.round(bsy-2), 5, 2);
      ctx.fillRect(Math.round(bsx+1), Math.round(bsy-2), 5, 2);
    } else {
      // Wings level
      ctx.fillRect(Math.round(bsx-6), Math.round(bsy), 5, 2);
      ctx.fillRect(Math.round(bsx+1), Math.round(bsy), 5, 2);
    }
    // Body dot
    ctx.fillRect(Math.round(bsx-1), Math.round(bsy-1), 3, 2);
  });

  // Night overlay — clean dark sky gradient, no stars
  if (state.isNight) {
    const darkness = Math.min(0.72, (dt > 0.65 ? (dt-0.65)/0.08 : (0.1-dt)/0.1) * 0.72);
    const nightGrd = ctx.createLinearGradient(0, 0, 0, canvas.height);
    nightGrd.addColorStop(0, `rgba(0,4,18,${darkness})`);
    nightGrd.addColorStop(1, `rgba(0,8,10,${darkness*0.7})`);
    ctx.fillStyle = nightGrd;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Volcano heat shimmer (subtle, only very close)
  if (state.volcanoTint > 0.25) {
    ctx.fillStyle = `rgba(255,80,0,0.08)`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Zone gate visual hints — draw a subtle dark band at locked boundaries
  {
    const camY = state.cam.y;
    const camX = state.cam.x;
    // Gate 1 (y=145): darker tree-line band if not yet unlocked
    if (state.zoneUnlocked < 1) {
      const gateScreenY = 145 * TSIZE - camY;
      if (gateScreenY > -20 && gateScreenY < canvas.height + 20) {
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillRect(0, gateScreenY - 8, canvas.width, 18);
        ctx.fillStyle = 'rgba(40,20,8,0.6)';
        ctx.fillRect(0, gateScreenY - 4, canvas.width, 10);
        ctx.fillStyle = '#a08040';
        ctx.font = '10px "Lato", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('- JUNGLE AHEAD: SPEAK TO OONGA -', canvas.width/2, gateScreenY + 5);
        ctx.textAlign = 'left';
      }
    }
    // Gate 2 (y=120): deep jungle barrier
    if (state.zoneUnlocked < 2) {
      const gateScreenY = 120 * TSIZE - camY;
      if (gateScreenY > -20 && gateScreenY < canvas.height + 20) {
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillRect(0, gateScreenY - 8, canvas.width, 20);
        ctx.fillStyle = 'rgba(5,15,0,0.7)';
        ctx.fillRect(0, gateScreenY - 4, canvas.width, 12);
        ctx.fillStyle = '#3a2808';
        ctx.font = '9px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('- DEEP JUNGLE: COMPLETE MARA\'S QUEST -', canvas.width/2, gateScreenY + 5);
        ctx.textAlign = 'left';
      }
    }
  }

  // Rain
  if (state.weatherRain) {
    ctx.fillStyle = 'rgba(150,200,255,0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Sick screen tint
  if (p.sick > 0) {
    ctx.fillStyle = `rgba(50,200,50,${Math.min(0.2, p.sick/300)})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Poison indicator (static border, no flashing)
  if (p.poison > 0) {
    ctx.fillStyle = 'rgba(0,150,30,0.15)';
    ctx.fillRect(0, 0, canvas.width, 20);
    ctx.fillRect(0, canvas.height-20, canvas.width, 20);
    ctx.fillRect(0, 0, 20, canvas.height);
    ctx.fillRect(canvas.width-20, 0, 20, canvas.height);
  }

  // Low health indicator (static dark red border, no flashing)
  if (p.hp < 30) {
    ctx.fillStyle = 'rgba(180,0,0,0.18)';
    ctx.fillRect(0, 0, canvas.width, 24);
    ctx.fillRect(0, canvas.height-24, canvas.width, 24);
    ctx.fillRect(0, 0, 24, canvas.height);
    ctx.fillRect(canvas.width-24, 0, 24, canvas.height);
  }
  // Low water indicator (static blue border)
  if (p.water < 20) {
    ctx.fillStyle = 'rgba(0,50,200,0.15)';
    ctx.fillRect(0,0,canvas.width,20);
    ctx.fillRect(0,canvas.height-20,canvas.width,20);
    ctx.fillRect(0,0,20,canvas.height);
    ctx.fillRect(canvas.width-20,0,20,canvas.height);
  }

  // Minigame + dialogue
  drawMinigame(ctx);
  drawDialogue(ctx);
  drawMsgs(ctx);

  // Invincibility frames after respawn
  if (state.invincible > 0) { state.invincible--; p.hp = Math.max(1, p.hp); }

  // Death / collapse mechanic
  if (p.hp <= 0 && !state.collapsing && !state.collapsed && !(state.invincible > 0)) {
    state.collapsing = true;
    state.collapseTimer = 0;
    state.collapseDeathX = p.x;
    state.collapseDeathY = p.y;
    // Save inventory copy
    state.collapseInvCopy = Object.assign({}, p.inv);
    // Place death pack
    state.objects.push({type:'death_pack', x:p.x, y:p.y, inv:Object.assign({},p.inv)});
    // Clear inventory (keep equipped tools by zeroing consumables)
    const keepKeys = ['axe','pickaxe','sword','spear','fire_axe','fire_spear','torch','fishing_rod'];
    for (const k of Object.keys(p.inv)) {
      if (!keepKeys.includes(k)) p.inv[k] = 0;
    }
    const tileX = Math.floor(p.x/TSIZE), tileY = Math.floor(p.y/TSIZE);
    showMsg(`YOU COLLAPSED. YOUR PACK DROPPED AT [${tileX},${tileY}]. Recover it or lose everything.`, '#ff4444');
  }
  if (state.collapsing) {
    state.collapseTimer++;
    const t = state.collapseTimer / 180; // 0..1 over 3s
    // Dark overlay fades in
    ctx.fillStyle = `rgba(0,0,0,${t*0.85})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    // Collapsed text
    if (state.collapseTimer > 60) {
      ctx.font = 'bold 36px "Courier New"';
      ctx.fillStyle = `rgba(200,60,60,${Math.min(1,(state.collapseTimer-60)/40)})`;
      ctx.textAlign = 'center';
      ctx.fillText('YOU COLLAPSED', canvas.width/2, canvas.height/2);
      ctx.textAlign = 'left';
    }
    if (state.collapseTimer >= 180) {
      state.collapsing = false;
      state.collapsed = false;
      // Respawn — full reset, clear enemies, grant invincibility frames
      p.hp = 100; p.water = 80; p.food = 80; p.stamina = 100;
      p.x = 75*TSIZE; p.y = 102*TSIZE;
      state.cam.x = p.x - canvas.width/2;
      state.cam.y = p.y - canvas.height/2;
      state.enemies = []; // clear all enemies
      state.creatures = state.creatures.filter(c => c.type !== 'bat'); // clear bats
      state.invincible = 300; // 5 seconds of invincibility
      showMsg('YOU WAKE UP. FIND YOUR PACK.', '#c8f135');
    }
  }

  // Draw death packs in world (glowing white chest)
  state.objects.forEach(obj => {
    if (obj.type !== 'death_pack') return;
    const dpsx = obj.x - camX, dpsy = obj.y - camY;
    if (dpsx < -40 || dpsx > canvas.width+40 || dpsy < -40 || dpsy > canvas.height+40) return;
    const glow = 0.4 + Math.sin(state.frameCount*0.1)*0.4;
    ctx.save();
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 12;
    ctx.fillStyle = `rgba(255,255,255,${glow})`;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.strokeRect(dpsx-10, dpsy-8, 20, 16);
    ctx.fillStyle = '#c8e8ff';
    ctx.fillRect(dpsx-9, dpsy-7, 18, 14);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(dpsx-9, dpsy-9, 18, 4);
    ctx.fillStyle = '#888';
    ctx.fillRect(dpsx-2, dpsy-4, 4, 8);
    ctx.restore();
  });

  // Sea creatures in deep ocean
  if (state.seaCreatures) {
    state.seaCreatures.forEach(sc => {
      const scsx = sc.x - camX, scsy = sc.y - camY;
      if (scsx < -80 || scsx > canvas.width+80 || scsy < -80 || scsy > canvas.height+80) return;
      const jOff = sc.jumpOffset || 0;
      if (sc.type === 'whale') drawWhale(ctx, scsx, scsy);
      else if (sc.type === 'dolphin') drawDolphin(ctx, scsx, scsy + jOff);
      else if (sc.type === 'manta') drawMantaRay(ctx, scsx, scsy);
    });
  }

  // Minimap
  drawMinimap(minimapCtx);

  // HUD hotbar icons overlay (draw pixel icons on canvas)
  drawHotbarIcons(ctx);
}

function updateDayNight() {
  state.frameCount++;
  state.dayTime = (state.frameCount % state.DAY_FRAMES) / state.DAY_FRAMES;
  const prevNight = state.isNight;
  state.isNight = state.dayTime > 0.65 || state.dayTime < 0.12;

  if (!prevNight && state.isNight) {
    // Rotten food check on new day
    if (state.day > (state.cookedFoodDay||0) + 2) {
      if (state.player.inv.fish_cooked > 0) {
        state.player.inv.fish_cooked = Math.max(0, state.player.inv.fish_cooked - 1);
        showMsg('YOUR COOKED FOOD HAS ROTTED', '#e67e22');
      } else if (state.player.inv.fruit_cooked > 0) {
        state.player.inv.fruit_cooked = Math.max(0, state.player.inv.fruit_cooked - 1);
        showMsg('YOUR COOKED FOOD HAS ROTTED', '#e67e22');
      }
    }

    // Tribal spike traps at night from day 5
    if (state.day >= 5) {
      if (!state.traps) state.traps = [];
      const trapCount = 3 + Math.floor(Math.random()*3);
      for (let i = 0; i < trapCount; i++) {
        // Place in jungle dark area
        const tx = 160 + Math.floor(Math.random()*180);
        const ty = 160 + Math.floor(Math.random()*180);
        if (state.map[ty] && state.map[ty][tx] === T.JUNGLE_DARK) {
          state.traps.push({x: tx*TSIZE+TSIZE/2, y: ty*TSIZE+TSIZE/2, triggered:false});
        }
      }
    }

    // Nightfall — spawn bat swarms at jungle edge
    const batCount = 3 + Math.floor(Math.random() * 3);
    const cx = 250*TSIZE, cy = 250*TSIZE;
    for (let i = 0; i < batCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = (45 + Math.random() * 20) * TSIZE;
      const bx2 = cx + Math.cos(angle) * r;
      const by2 = cy + Math.sin(angle) * r;
      // Don't spawn near start position
      if (Math.hypot(bx2 - 125*TSIZE, by2 - 175*TSIZE) < 40*TSIZE) continue;
      state.creatures.push({
        type: 'bat',
        x: bx2,
        y: by2,
        hp: 15, maxHp: 15,
        spd: 1.26,
        attackTimer: 0,
        walkTimer: 0
      });
    }

    // Nightfall
    spawnEnemies(Math.min(3 + state.day, 12), 'shadow');
    if (state.day >= 5) spawnEnemies(1, 'archer');

    // Day journal
    const journals = [
      '',
      'Day 1 — You washed ashore. The jungle hides its secrets.',
      'Day 2 — Something moved in the trees last night.',
      'Day 3 — Tribal scouts spotted. They are watching.',
      'Day 4 — The jungle grows darker toward the center.',
      'Day 5 — Arrows fell near camp. Archers in the trees.',
      'Day 6 — You can hear drums from the volcano.',
      'Day 7 — The raids are getting bolder.',
      'Day 8 — Who else survived the wreck?',
      'Day 9 — The volcanic path glows at night.',
      'Day 10 — They want something. What?',
      'Day 11 — You found a carved stone. The tribe has history here.',
      'Day 12 — Every morning there are fewer of them. They are testing you.',
      'Day 13 — You can feel the volcano heat from here.',
      'Day 14 — Tomorrow, perhaps, you will face their leader.',
      'Day 15 — The Chief comes.'
    ];
    const msg = journals[Math.min(state.day, journals.length-1)];
    if (msg) showMsg(msg, '#888');

    state.day++;
    document.getElementById('day-display').textContent = `DAY ${state.day}`;
  }

  if (prevNight && !state.isNight) {
    // Dawn — remove bats
    state.creatures = state.creatures.filter(c => c.type !== 'bat');
    // Dawn — spawn day enemies
    spawnDayEnemies();
  }

  // Weather
  state.weatherTimer++;
  if (state.weatherTimer > state.weatherNext) {
    state.weatherTimer = 0;
    state.weatherRain = !state.weatherRain;
    state.weatherNext = state.weatherRain ?
      60*60*(1+Math.random()*2) : // storm lasts 1-2 days
      60*60*(3+Math.random()*4);  // clear for 3-7 days
    showMsg(state.weatherRain ? 'STORM APPROACHING...' : 'THE STORM HAS PASSED.', state.weatherRain?'#3498db':'#c8f135');
  }

  // Rain vessel filling
  if (state.weatherRain && state.frameCount % 60 === 0) {
    const hasVessel = state.objects.some(o => o.placed && o.type === 'vessel');
    if (hasVessel) {
      state.player.water = Math.min(state.player.maxWater, state.player.water + 2);
      if (!state.vesselFilled) {
        state.vesselFilled = true;
        showMsg('RAIN VESSEL FILLING', '#3498db');
      }
    }
  }
  if (!state.weatherRain) state.vesselFilled = false;

  // Occasional thunder during storms (roughly every 8-20 seconds)
  if (state.weatherRain && state.frameCount % 30 === 0 && Math.random() < 0.025) {
    SFX.thunder();
  }

  // Respawn timers
  state.objects.forEach(o => {
    if (o.respawn > 0) o.respawn--;
  });
}

function updateBirdsAndFootprints() {
  const p = state.player;
  // Bird spawning: every 30-60 seconds (1800-3600 frames)
  state.birdTimer++;
  if (state.birdTimer > 1800 + Math.random() * 1800) {
    state.birdTimer = 0;
    // Spawn bird entering from left or right edge of world view
    const camX = state.cam.x, camY = state.cam.y;
    const startX = Math.random() > 0.5 ? camX - 20 : camX + window.innerWidth + 20;
    const dirX = startX < camX ? 1.5 : -1.5;
    // Assign bird type: 60% seagull, 25% kingfisher, 15% tropic bird
    const birdRnd = Math.random();
    const birdType = birdRnd < 0.60 ? 0 : birdRnd < 0.85 ? 1 : 2;
    const birdColors = ['#e8e8e8', '#2a88cc', '#cc3322'];
    state.birds.push({
      wx: startX, // world x
      wy: camY + 30 + Math.random() * (window.innerHeight * 0.4),
      vx: dirX,
      vy: (Math.random() - 0.5) * 0.3,
      life: 600 + Math.floor(Math.random() * 400),
      flapFrame: 0,
      birdType: birdType,
      color: birdColors[birdType]
    });
  }
  state.birds = state.birds.filter(b => {
    b.wx += b.vx;
    b.wy += b.vy;
    b.flapFrame++;
    b.life--;
    return b.life > 0;
  });

  // Footprints: when walking on beach
  const tile = getTile(p.x, p.y);
  const moving = !!(state.frameCount % 8 === 0);
  if (tile === T.BEACH && moving) {
    const keys_moving = true; // simplified — add every 8 frames when alive
    state.footprints.push({x: p.x + (Math.random()-0.5)*4, y: p.y + 8, life: 120, maxLife: 120});
    if (state.footprints.length > 80) state.footprints.shift();
  }
  state.footprints = state.footprints.filter(fp => { fp.life--; return fp.life > 0; });
}

function updateCrabs() {
  state.objects.forEach(obj => {
    if (obj.type !== 'crab') return;
    obj.walkTimer = (obj.walkTimer||0) + 1;
    obj.moveTimer = (obj.moveTimer||0) + 1;
    // Change direction every 3 seconds
    if (obj.moveTimer % 180 === 0) {
      const a = Math.random() * Math.PI * 2;
      obj.dx = Math.cos(a) * 0.3;
      obj.dy = Math.sin(a) * 0.15;
    }
    // Only move on beach tiles
    const newX = obj.x + (obj.dx||0);
    const newY = obj.y + (obj.dy||0);
    const tile = getTile(newX, newY);
    if (tile === T.BEACH) { obj.x = newX; obj.y = newY; }
    else { obj.dx = -(obj.dx||0); obj.dy = -(obj.dy||0); } // bounce
  });
}

function updateSeaCreatures() {
  if (!state.seaCreatures) return;
  state.seaCreatures.forEach(sc => {
    sc.timer++;
    if (sc.type === 'whale') {
      // Change direction every ~600 frames (10s)
      if (sc.timer % 600 === 0) sc.dir = Math.random() * Math.PI * 2;
      sc.x += Math.cos(sc.dir) * sc.speed;
      sc.y += Math.sin(sc.dir) * sc.speed;
      // Stay in deep ocean
      const tile = getTile(sc.x, sc.y);
      if (tile !== T.DEEP_OCEAN) {
        sc.dir += Math.PI + (Math.random()-0.5)*0.5;
        sc.x += Math.cos(sc.dir) * 2;
        sc.y += Math.sin(sc.dir) * 2;
      }
      // Wrap at world edges
      sc.x = Math.max(TSIZE*2, Math.min(WORLD_W-TSIZE*2, sc.x));
      sc.y = Math.max(TSIZE*2, Math.min(WORLD_H-TSIZE*2, sc.y));
    }
    if (sc.type === 'dolphin') {
      // Change direction every ~300 frames, slight sine wave
      if (sc.timer % 300 === 0) sc.dir = sc.dir + (Math.random()-0.5)*0.8;
      const sineY = Math.sin(sc.timer * 0.04) * 0.5;
      sc.x += Math.cos(sc.dir) * sc.speed;
      sc.y += Math.sin(sc.dir) * sc.speed + sineY;
      // Jump offset
      if (sc.jumpTimer > 0) {
        sc.jumpTimer--;
        sc.jumpOffset = -Math.sin(sc.jumpTimer / 30 * Math.PI) * 12;
      } else {
        sc.jumpOffset = 0;
        // Random jump every 5-8 seconds
        if (sc.timer % (300 + Math.floor(Math.random()*180)) === 0) {
          sc.jumpTimer = 30;
        }
      }
      const tile = getTile(sc.x, sc.y);
      if (tile !== T.DEEP_OCEAN) {
        sc.dir += Math.PI + (Math.random()-0.5)*0.5;
        sc.x += Math.cos(sc.dir) * 2;
        sc.y += Math.sin(sc.dir) * 2;
      }
      sc.x = Math.max(TSIZE*2, Math.min(WORLD_W-TSIZE*2, sc.x));
      sc.y = Math.max(TSIZE*2, Math.min(WORLD_H-TSIZE*2, sc.y));
    }
    if (sc.type === 'manta') {
      // Slow gentle circle
      sc.orbitAngle = (sc.orbitAngle||0) + 0.003;
      sc.dir = sc.orbitAngle;
      sc.x += Math.cos(sc.dir) * sc.speed;
      sc.y += Math.sin(sc.dir) * sc.speed;
      const tile = getTile(sc.x, sc.y);
      if (tile !== T.DEEP_OCEAN) {
        sc.orbitAngle += Math.PI;
        sc.x += Math.cos(sc.orbitAngle) * 4;
        sc.y += Math.sin(sc.orbitAngle) * 4;
      }
      sc.x = Math.max(TSIZE*2, Math.min(WORLD_W-TSIZE*2, sc.x));
      sc.y = Math.max(TSIZE*2, Math.min(WORLD_H-TSIZE*2, sc.y));
    }
  });
}

function updateNPCCompanions() {
  const p = state.player;
  state.npcs.forEach(npc => {
    npc.bobTimer = (npc.bobTimer || 0) + 1;
    // Non-companion NPCs wander slowly
    if (!npc.companion) {
      if (!npc.wanderTimer) { npc.wanderTimer = 0; npc.wanderDx = 0; npc.wanderDy = 0; }
      npc.wanderTimer++;
      if (npc.wanderTimer % 180 === 0) {
        // New random direction every 3 seconds
        const a = Math.random() * Math.PI * 2;
        npc.wanderDx = Math.cos(a) * 0.3;
        npc.wanderDy = Math.sin(a) * 0.3;
        if (npc.wanderTimer > 720) npc.wanderDx = npc.wanderDy = 0; // stop occasionally
        if (npc.wanderTimer > 900) npc.wanderTimer = 0;
      }
      // Don't wander if player is close (ready to talk)
      const distToPlayer = Math.hypot(p.x - npc.x, p.y - npc.y);
      if (distToPlayer > 60) {
        npc.x += npc.wanderDx;
        npc.y += npc.wanderDy;
      }
      return;
    }
    // Follow player
    const dx = p.x - npc.x, dy = p.y - npc.y;
    const d = Math.sqrt(dx*dx+dy*dy);
    if (d > 60) {
      npc.x += dx/d * 1.8;
      npc.y += dy/d * 1.8;
    }
    // Auto harvest nearby resources
    if (Math.random() < 0.002) {
      const nearby = state.objects.find(o =>
        !o.placed && o.type === 'driftwood' && !o.collected &&
        Math.hypot(o.x-npc.x, o.y-npc.y) < 80
      );
      if (nearby) {
        nearby.collected = true;
        p.inv.wood++;
        state.objects = state.objects.filter(o => o !== nearby);
      }
    }
  });
}

function playCutscene(id) {
  const cs = CUTSCENES[id];
  if (!cs || state.cutscenesSeen.has(id)) return;
  state.cutscenePlaying = true;
  state.cutscene = {
    id,
    frameIdx: 0,
    frame: cs.frames[0],
    textIdx: 0,
    textDisplayed: '',
    textTimer: 0,
    waitForInput: false,
    done: false
  };
  state.cutscenesSeen.add(id);
}

function advanceCutscene() {
  const cs = state.cutscene;
  if (!cs) return;
  if (!cs.waitForInput && cs.textDisplayed.length < cs.frame.text.length) {
    // Skip typewriter
    cs.textDisplayed = cs.frame.text;
    return;
  }
  // Next frame
  const csDef = CUTSCENES[cs.id];
  cs.frameIdx++;
  if (cs.frameIdx >= csDef.frames.length) {
    // End cutscene
    state.cutscenePlaying = false;
    state.cutscene = null;
    if (csDef.onComplete) csDef.onComplete();
  } else {
    cs.frame = csDef.frames[cs.frameIdx];
    cs.textDisplayed = '';
    cs.textTimer = 0;
    cs.waitForInput = false;
  }
}

function renderCutscene(ctx) {
  const cs = state.cutscene;
  if (!cs) return;
  const cw = canvas.width, ch = canvas.height;

  // Black letterbox background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cw, ch);

  // Pixel art scene (16:9 centered panel, 65% of height)
  const panelH = Math.round(ch * 0.65);
  const panelW = Math.round(panelH * 16/9);
  const panelX = (cw - panelW) / 2;
  const panelY = Math.round(ch * 0.05);

  // Draw the scene
  if (cs.frame && cs.frame.draw) {
    cs.frame.draw(ctx, panelX, panelY, panelW, panelH);
  }

  // Text box at bottom
  const tbY = panelY + panelH + 10;
  const tbH = Math.round(ch * 0.22);
  ctx.fillStyle = 'rgba(40,20,8,0.95)';
  ctx.fillRect(panelX, tbY, panelW, tbH);
  ctx.strokeStyle = '#8b6020';
  ctx.lineWidth = 2;
  ctx.strokeRect(panelX, tbY, panelW, tbH);

  // Speaker name
  if (cs.frame.speaker) {
    ctx.font = '600 14px "Cinzel", serif';
    ctx.fillStyle = '#e8d49a';
    ctx.fillText(cs.frame.speaker, panelX + 14, tbY + 18);
  }

  // Typewriter text
  ctx.font = '13px "Lato", sans-serif';
  ctx.fillStyle = '#f0e0b0';
  const words = cs.textDisplayed.split(' ');
  let line = '', lineY = tbY + (cs.frame.speaker ? 34 : 18);
  words.forEach(word => {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > panelW - 28) {
      ctx.fillText(line, panelX + 14, lineY);
      line = word + ' '; lineY += 16;
    } else { line = test; }
  });
  ctx.fillText(line, panelX + 14, lineY);

  // Continue prompt
  if (cs.waitForInput) {
    ctx.fillStyle = '#a08040';
    ctx.font = '11px "Lato", sans-serif';
    ctx.fillText('[ CLICK OR SPACE TO CONTINUE ]', panelX + panelW/2 - 100, tbY + tbH - 8);
  }

  // Update typewriter
  cs.textTimer++;
  if (cs.textTimer % 2 === 0 && cs.textDisplayed.length < cs.frame.text.length) {
    cs.textDisplayed += cs.frame.text[cs.textDisplayed.length];
  } else if (cs.textDisplayed.length >= cs.frame.text.length) {
    cs.waitForInput = true;
  }
}

function triggerWin() {
  // Determine ending based on storyChoices
  const sc = state.storyChoices;
  let title, text, cutsceneId;
  if (sc.learnedTruth && sc.returnedChild && sc.konaHelping) {
    title = 'PEACE';

  if (cutsceneId) {

<script>
// ============================================================
// MOBILE TOUCH CONTROLS
// ============================================================

(function() {
  const joyCanvas = document.getElementById('joystick-canvas');
  if (!joyCanvas) return;
  const jCtx = joyCanvas.getContext('2d');

  // Joystick canvas matches the zone size
  joyCanvas.width = 160;
  joyCanvas.height = 160;

  // Joystick state
  const joy = {
    active: false,
    touchId: null,
    centerX: 0,
    centerY: 0,
    knobX: 0,
    knobY: 0,
    dx: 0,
    dy: 0,
    radius: 65, // outer ring radius (larger for 160px zone)
    knobRadius: 30,
  };

  // Default joystick center (bottom-left zone center)
  function getDefaultJoyCenter() {
    return { x: 100, y: window.innerHeight - 100 };
  }

  function drawJoystick() {
    jCtx.clearRect(0, 0, joyCanvas.width, joyCanvas.height);
    if (!joy.active) return;

    // Outer ring
    jCtx.beginPath();
    jCtx.arc(joy.centerX, joy.centerY, joy.radius, 0, Math.PI * 2);
    jCtx.fillStyle = 'rgba(255,255,255,0.15)';
    jCtx.fill();
    jCtx.strokeStyle = 'rgba(255,255,255,0.4)';
    jCtx.lineWidth = 2;
    jCtx.stroke();

    // Inner knob
    jCtx.beginPath();
    jCtx.arc(joy.knobX, joy.knobY, joy.knobRadius, 0, Math.PI * 2);
    jCtx.fillStyle = 'rgba(255,255,255,0.4)';
    jCtx.fill();
  }

  function updateJoystickKeys() {
    const threshold = 0.25;
    keys['w'] = joy.active && joy.dy < -threshold;
    keys['s'] = joy.active && joy.dy > threshold;
    keys['a'] = joy.active && joy.dx < -threshold;
    keys['d'] = joy.active && joy.dx > threshold;
  }

  function resetJoystick() {
    joy.active = false;
    joy.touchId = null;
    joy.dx = 0;
    joy.dy = 0;
    keys['w'] = false;
    keys['s'] = false;
    keys['a'] = false;
    keys['d'] = false;
    jCtx.clearRect(0, 0, joyCanvas.width, joyCanvas.height);
  }

  // Button tap handlers (called via inline ontouchstart/end)
  window.touchBtnStart = function(e, btn) {
    e.preventDefault();
    e.stopPropagation();
    if (btn === 'atk') {
      // Simulate click at canvas center
      if (state.running) {
        handleClick(window.innerWidth / 2, window.innerHeight / 2);
      }
    } else if (btn === 'jmp') {
      handleJump();
    } else if (btn === 'use') {
      handleInteract();
    }
  };

  window.touchBtnEnd = function(e, btn) {
    e.preventDefault();
    e.stopPropagation();
    if (!state.running) return;
    if (btn === 'atk') handleClick(window.innerWidth/2, window.innerHeight/2);
    if (btn === 'jmp') handleJump();
    if (btn === 'use') handleInteract();
    if (btn === 'mine') {
      // Find nearest rock/vol_rock and start mining minigame
      const p = state.player;
      const reach = 60;
      for (const obj of state.objects) {
        if (['rock','vol_rock'].includes(obj.type)) {
          if (Math.hypot(p.x-obj.x, p.y-obj.y) < reach) {
            if (!p.inv.pickaxe) { showMsg('NEED A PICKAXE'); return; }
            startMineMinigame(obj); return;
          }
        }
      }
      showMsg('NO ROCK IN RANGE');
    }
  };

  // Joystick zone element for touch tracking
  const joyZone = document.getElementById('joystick-zone');

  document.addEventListener('touchstart', function(e) {
    if (!state.running) return; // Don't intercept during start screens
    const tag = e.target.tagName.toLowerCase();
    if (tag === 'button' || tag === 'input' || tag === 'div' || tag === 'span') return;
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
      const t = e.changedTouches[i];
      // Only claim joystick touch if on left half of screen and no active joystick touch
      if (t.clientX < window.innerWidth / 2 && joy.touchId === null) {
        joy.active = true;
        joy.touchId = t.identifier;
        const jRect = joyCanvas.getBoundingClientRect();
        joy.centerX = t.clientX - jRect.left;
        joy.centerY = t.clientY - jRect.top;
        joy.knobX = joy.centerX;
        joy.knobY = joy.centerY;
        joy.dx = 0;
        joy.dy = 0;
        drawJoystick();
      }
    }
  }, { passive: false });

  document.addEventListener('touchmove', function(e) {
    if (!state.running) return;
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
      const t = e.changedTouches[i];
      if (t.identifier === joy.touchId) {
        const jRect2 = joyCanvas.getBoundingClientRect();
        const rawDx = (t.clientX - jRect2.left) - joy.centerX;
        const rawDy = (t.clientY - jRect2.top) - joy.centerY;
        const dist = Math.sqrt(rawDx * rawDx + rawDy * rawDy);
        const clampedDist = Math.min(dist, joy.radius);
        const angle = Math.atan2(rawDy, rawDx);
        joy.knobX = joy.centerX + Math.cos(angle) * clampedDist;
        joy.knobY = joy.centerY + Math.sin(angle) * clampedDist;
        joy.dx = Math.cos(angle) * (clampedDist / joy.radius);
        joy.dy = Math.sin(angle) * (clampedDist / joy.radius);
        updateJoystickKeys();
        drawJoystick();
      }
    }
  }, { passive: false });

  document.addEventListener('touchend', function(e) {
    if (!state.running) return;
    if (joy.touchId !== null) e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
      const t = e.changedTouches[i];
      if (t.identifier === joy.touchId) {
        resetJoystick();
      }
    }
  }, { passive: false });

  document.addEventListener('touchcancel', function(e) {
    if (!state.running) return;
    e.preventDefault();
    resetJoystick();
  }, { passive: false });

})();
</script>
</body>
</html>
