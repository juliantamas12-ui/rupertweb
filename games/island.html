<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island Survival</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;user-select:none}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#ui{position:fixed;top:0;left:0;right:0;padding:10px;pointer-events:none;z-index:10}
#bars{display:flex;gap:12px;align-items:center;background:rgba(0,0,0,0.7);padding:8px 12px;border:2px solid #333;width:fit-content}
.bar-wrap{display:flex;flex-direction:column;gap:2px}
.bar-lbl{color:#c8f135;font-size:10px;letter-spacing:2px}
.bar-outer{width:120px;height:10px;background:#222;border:1px solid #555}
.bar-inner{height:100%;transition:width 0.3s}
#day-display{color:#c8f135;font-size:12px;letter-spacing:3px;margin-left:20px}
#msg{position:fixed;top:60px;left:50%;transform:translateX(-50%);color:#ff4444;font-size:14px;letter-spacing:2px;text-align:center;pointer-events:none;z-index:10;text-shadow:0 0 10px #ff0000}
#minimap{position:fixed;bottom:10px;right:10px;border:2px solid #555;z-index:10}
#hotbar{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10}
.slot{width:44px;height:44px;background:rgba(0,0,0,0.8);border:2px solid #555;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#c8f135;font-size:9px;letter-spacing:1px}
.slot.active{border-color:#c8f135}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
#overlay h1{color:#c8f135;font-size:28px;letter-spacing:6px;margin-bottom:30px;text-shadow:0 0 20px #c8f135}
#overlay .slide{max-width:520px;text-align:center;line-height:1.8;font-size:13px;letter-spacing:1px;color:#ccc;margin-bottom:30px}
#overlay .slide b{color:#c8f135}
#overlay button{background:#c8f135;color:#000;border:none;padding:10px 32px;font-family:'Courier New',monospace;font-size:13px;letter-spacing:3px;cursor:pointer;font-weight:bold}
#overlay button:hover{background:#fff}
#inv-panel,#craft-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;border:2px solid #c8f135;padding:20px;z-index:50;min-width:300px;display:none}
#inv-panel h2,#craft-panel h2{color:#c8f135;font-size:14px;letter-spacing:3px;margin-bottom:15px}
.inv-grid{display:grid;grid-template-columns:repeat(5,50px);gap:4px}
.inv-slot{width:50px;height:50px;background:#222;border:1px solid #444;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#aaa;font-size:10px;text-align:center}
.craft-recipe{padding:6px;border:1px solid #333;margin-bottom:6px;cursor:pointer;color:#aaa;font-size:11px;letter-spacing:1px}
.craft-recipe:hover{border-color:#c8f135;color:#c8f135}
.close-btn{position:absolute;top:8px;right:12px;color:#c8f135;cursor:pointer;font-size:16px}
#win-screen{position:fixed;inset:0;background:#001133;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff}
#win-screen h1{color:#c8f135;font-size:32px;letter-spacing:8px;margin-bottom:20px}
#win-screen p{font-size:14px;letter-spacing:2px;color:#aaa}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="bars">
    <div class="bar-wrap"><div class="bar-lbl">HP</div><div class="bar-outer"><div class="bar-inner" id="hp-bar" style="width:100%;background:#e74c3c"></div></div></div>
    <div class="bar-wrap"><div class="bar-lbl">WATER</div><div class="bar-outer"><div class="bar-inner" id="water-bar" style="width:100%;background:#3498db"></div></div></div>
    <div class="bar-wrap"><div class="bar-lbl">FOOD</div><div class="bar-outer"><div class="bar-inner" id="food-bar" style="width:100%;background:#e67e22"></div></div></div>
    <div id="day-display">DAY 1</div>
  </div>
</div>
<div id="msg"></div>
<canvas id="minimap" width="100" height="100"></canvas>
<div id="hotbar">
  <div class="slot active" id="slot0">-</div>
  <div class="slot" id="slot1">-</div>
  <div class="slot" id="slot2">-</div>
  <div class="slot" id="slot3">-</div>
  <div class="slot" id="slot4">-</div>
</div>
<div id="inv-panel">
  <span class="close-btn" onclick="toggleInv()">X</span>
  <h2>INVENTORY</h2>
  <div class="inv-grid" id="inv-grid"></div>
</div>
<div id="craft-panel">
  <span class="close-btn" onclick="toggleCraft()">X</span>
  <h2>CRAFTING</h2>
  <div id="craft-list"></div>
</div>
<div id="overlay">
  <h1>ISLAND SURVIVAL</h1>
  <div class="slide" id="slide-content"></div>
  <button id="slide-btn" onclick="nextSlide()">NEXT</button>
</div>
<div id="win-screen">
  <h1>YOU ESCAPED!</h1>
  <canvas id="yacht-canvas" width="300" height="150"></canvas>
  <p style="margin-top:20px">You became the island leader and sailed away on your superyacht.</p>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// TUTORIAL
const slides=[
  {t:'CONTROLS',b:'<b>WASD</b> — Move<br><b>Mouse</b> — Aim<br><b>Click</b> — Attack / Harvest<br><b>I</b> — Inventory<br><b>C</b> — Crafting'},
  {t:'SURVIVAL',b:'You have <b>Health</b>, <b>Water</b>, and <b>Food</b> bars.<br>Water and Food deplete over time.<br>If either runs out, your <b>Health</b> will drain.<br>Keep all three bars up to survive.'},
  {t:'RESOURCES',b:'<b>Palm Trees</b> on the beach → Coconuts (Water)<br><b>Fruit Trees</b> in the jungle → Fruit (Food)<br><b>Fishing Spots</b> (shimmering water) → Fish (Food)<br><b>Trees</b> → Wood &nbsp;&nbsp; <b>Rocks</b> → Stone'},
  {t:'ENEMIES',b:'<b>Tribal Warriors</b> patrol the jungle and volcano area.<br>They attack on sight. More appear each night.<br>The <b>Tribal Chief</b> appears on <b>Day 15</b>.<br>Defeat him to become <b>Island Leader</b>.'},
  {t:'YOUR GOAL',b:'Gather resources. Build shelter and weapons.<br>Survive the tribal raids. Find the <b>Volcano</b>.<br>Defeat the <b>Tribal Chief</b> on Day 15.<br>Craft a <b>Superyacht</b> and escape the island!'}
];
let slideIdx=0;
function showSlide(){
  const s=slides[slideIdx];
  document.getElementById('slide-content').innerHTML=`<h3 style="color:#c8f135;font-size:16px;letter-spacing:4px;margin-bottom:16px">${s.t}</h3>${s.b}`;
  document.getElementById('slide-btn').textContent=slideIdx===slides.length-1?'START GAME':'NEXT';
}
function nextSlide(){
  if(slideIdx<slides.length-1){slideIdx++;showSlide();}
  else{document.getElementById('overlay').style.display='none';startGame();}
}
showSlide();

// TILE TYPES
const T={OCEAN:0,BEACH:1,JUNGLE:2,VOLCANIC:3,ROCK:4};
const TSIZE=16;
const MSIZE=250;
let map=[];

function genMap(){
  map=[];
  const cx=MSIZE/2,cy=MSIZE/2;
  for(let y=0;y<MSIZE;y++){
    map[y]=[];
    for(let x=0;x<MSIZE;x++){
      const dx=x-cx,dy=y-cy;
      // Volcano area
      const vx=cx,vy=cy-60;
      const dvx=x-vx,dvy=y-vy;
      const vdist=Math.sqrt(dvx*dvx+dvy*dvy);
      // Island shape with noise
      const angle=Math.atan2(dy,dx);
      const noise=Math.sin(angle*3)*8+Math.sin(angle*7)*4+Math.cos(angle*5)*5;
      const islandR=70+noise;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>islandR+12)map[y][x]=T.OCEAN;
      else if(dist>islandR)map[y][x]=T.BEACH;
      else if(vdist<20)map[y][x]=T.VOLCANIC;
      else if(vdist<35)map[y][x]=T.ROCK;
      else if(dist<islandR-8)map[y][x]=T.JUNGLE;
      else map[y][x]=T.BEACH;
    }
  }
}

// OBJECTS
let trees=[],rocks=[],palms=[],fruits=[],fishSpots=[],enemies=[],particles=[];
let chief=null;

function genObjects(){
  for(let y=0;y<MSIZE;y++){
    for(let x=0;x<MSIZE;x++){
      const t=map[y][x];
      const wx=x*TSIZE+8,wy=y*TSIZE+8;
      if(t===T.JUNGLE&&Math.random()<0.06)trees.push({x:wx,y:wy,hp:5,maxHp:5,type:'tree'});
      if(t===T.JUNGLE&&Math.random()<0.04)fruits.push({x:wx,y:wy,hp:3,maxHp:3,type:'fruit',respawn:0});
      if((t===T.BEACH||t===T.JUNGLE)&&Math.random()<0.015)rocks.push({x:wx,y:wy,hp:4,maxHp:4,type:'rock'});
      if(t===T.BEACH&&Math.random()<0.04)palms.push({x:wx,y:wy,hp:4,maxHp:4,type:'palm',respawn:0});
      if(t===T.BEACH&&Math.random()<0.01)fishSpots.push({x:wx,y:wy,type:'fish',shimmer:0});
    }
  }
}

// PLAYER
let player={
  x:MSIZE/2*TSIZE,y:(MSIZE/2+50)*TSIZE,
  hp:100,maxHp:100,water:100,maxWater:100,food:100,maxFood:100,
  spd:2,dir:0,attacking:false,attackTimer:0,
  inv:{wood:0,stone:0,coconut:0,fruit:0,fish:0,campfire:0,axe:0,spear:0,raft:0},
  chiefDefeated:false
};

// GAME STATE
let gameRunning=false;
let dayTime=0; // 0-1
let dayCount=1;
const DAY_DURATION=180*60; // 3 min in frames
let frameCount=0;
let isNight=false;
let keys={};
let mx=0,my=0;
let msgTimer=0;
let msgText='';
let waterTimer=0,foodTimer=0;
let enemySpawnTimer=0;

function showMsg(t){msgText=t;msgTimer=180;}

// COLORS
const TILE_COLORS=[
  '#1a3a5c', // OCEAN
  '#e8d49a', // BEACH
  '#2d6e2d', // JUNGLE
  '#4a3030', // VOLCANIC
  '#555566', // ROCK
];
const OCEAN_DARK='#0d1f33';

function getTileColor(type,x,y){
  if(type===T.OCEAN){
    // Vary ocean depth
    const cx=MSIZE/2,cy=MSIZE/2;
    const dx=(x/TSIZE)-cx,dy=(y/TSIZE)-cy;
    const d=Math.sqrt(dx*dx+dy*dy);
    return d>100?OCEAN_DARK:TILE_COLORS[0];
  }
  return TILE_COLORS[type];
}

// DRAW PIXEL SPRITES
function drawPixelTree(x,y,trunk){
  // Trunk
  ctx.fillStyle=trunk||'#5c3d1e';
  ctx.fillRect(x-4,y+4,8,12);
  // Foliage layers
  ctx.fillStyle='#1a5c1a';
  ctx.fillRect(x-12,y-4,24,10);
  ctx.fillStyle='#22772a';
  ctx.fillRect(x-8,y-12,16,10);
  ctx.fillStyle='#2d9e35';
  ctx.fillRect(x-4,y-18,8,8);
}

function drawPixelPalm(x,y){
  ctx.fillStyle='#7a5c2e';
  ctx.fillRect(x-3,y,6,20);
  ctx.fillStyle='#7a5c2e';
  ctx.fillRect(x-3,y-4,4,8);
  // Fronds
  ctx.fillStyle='#2d8c2d';
  ctx.fillRect(x-20,y-8,18,4);
  ctx.fillRect(x+2,y-8,18,4);
  ctx.fillRect(x-10,y-16,20,4);
  // Coconuts
  ctx.fillStyle='#5c3d1e';
  ctx.fillRect(x-5,y-2,4,4);
  ctx.fillRect(x+1,y-2,4,4);
}

function drawPixelRock(x,y){
  ctx.fillStyle='#666677';
  ctx.fillRect(x-8,y-4,16,10);
  ctx.fillStyle='#888899';
  ctx.fillRect(x-6,y-8,12,6);
  ctx.fillStyle='#444455';
  ctx.fillRect(x-4,y+4,8,4);
}

function drawPixelFruit(x,y){
  ctx.fillStyle='#2d8c2d';
  ctx.fillRect(x-10,y-10,20,16);
  ctx.fillStyle='#e74c3c';
  ctx.fillRect(x-4,y-8,6,6);
  ctx.fillRect(x+2,y-4,6,6);
  ctx.fillRect(x-8,y-2,6,6);
}

function drawPixelFishSpot(x,y,shimmer){
  ctx.fillStyle=`rgba(100,180,255,${0.4+Math.sin(shimmer*0.1)*0.3})`;
  ctx.fillRect(x-10,y-4,20,8);
  ctx.fillStyle='rgba(200,240,255,0.6)';
  ctx.fillRect(x-6,y-2,4,4);
  ctx.fillRect(x+2,y-2,4,4);
}

function drawPixelPlayer(x,y,dir){
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.fillRect(x-6,y+14,12,4);
  // Legs
  ctx.fillStyle='#7a4a1e';
  ctx.fillRect(x-6,y+6,5,10);
  ctx.fillRect(x+1,y+6,5,10);
  // Body
  ctx.fillStyle='#2d7a2d';
  ctx.fillRect(x-7,y-4,14,12);
  // Arms
  ctx.fillStyle='#c8a07a';
  ctx.fillRect(x-11,y-2,5,8);
  ctx.fillRect(x+6,y-2,5,8);
  // Head
  ctx.fillStyle='#c8a07a';
  ctx.fillRect(x-6,y-14,12,12);
  // Hair/hat
  ctx.fillStyle='#5c3d1e';
  ctx.fillRect(x-7,y-16,14,4);
  ctx.fillRect(x-8,y-14,16,2);
  // Eyes
  ctx.fillStyle='#000';
  if(dir>=0){ctx.fillRect(x-3,y-10,2,2);ctx.fillRect(x+1,y-10,2,2);}
  else{ctx.fillRect(x-3,y-10,2,2);ctx.fillRect(x+1,y-10,2,2);}
  // Weapon
  if(player.inv.spear>0){
    ctx.fillStyle='#5c3d1e';
    ctx.fillRect(x+10,y-20,3,30);
    ctx.fillStyle='#888';
    ctx.fillRect(x+8,y-24,6,6);
  }
}

function drawPixelEnemy(x,y,isChief){
  const sc=isChief?1.5:1;
  const h=isChief?20:14;
  // Body
  ctx.fillStyle=isChief?'#8b1a1a':'#5c2e0a';
  ctx.fillRect(x-Math.round(7*sc),y-4,Math.round(14*sc),Math.round(10*sc));
  // War paint
  ctx.fillStyle='#e74c3c';
  ctx.fillRect(x-Math.round(6*sc),y-2,Math.round(4*sc),Math.round(3*sc));
  ctx.fillRect(x+Math.round(2*sc),y-2,Math.round(4*sc),Math.round(3*sc));
  // Head
  ctx.fillStyle='#7a4a20';
  ctx.fillRect(x-Math.round(6*sc),y-h,Math.round(12*sc),Math.round(12*sc));
  // Eyes
  ctx.fillStyle='#ff4444';
  ctx.fillRect(x-Math.round(3*sc),y-h+4,2,2);
  ctx.fillRect(x+Math.round(1*sc),y-h+4,2,2);
  // Headdress for chief
  if(isChief){
    ctx.fillStyle='#e74c3c';
    ctx.fillRect(x-10,y-h-10,6,12);
    ctx.fillRect(x-4,y-h-14,4,16);
    ctx.fillRect(x+0,y-h-10,6,12);
    ctx.fillStyle='#f39c12';
    ctx.fillRect(x-10,y-h-8,4,4);
    ctx.fillRect(x+6,y-h-8,4,4);
  }
  // Spear
  ctx.fillStyle='#5c3d1e';
  ctx.fillRect(x+10,y-20,3,28);
  ctx.fillStyle='#aaa';
  ctx.fillRect(x+8,y-24,6,6);
}

function drawVolcano(cx,cy){
  // Base
  ctx.fillStyle='#3a2020';
  ctx.fillRect(cx-80,cy-20,160,60);
  // Mountain shape
  ctx.fillStyle='#4a2828';
  ctx.fillRect(cx-60,cy-50,120,40);
  ctx.fillStyle='#5c3030';
  ctx.fillRect(cx-40,cy-70,80,30);
  ctx.fillStyle='#4a2020';
  ctx.fillRect(cx-24,cy-90,48,28);
  // Crater
  ctx.fillStyle='#ff4400';
  ctx.fillRect(cx-16,cy-94,32,16);
  ctx.fillStyle='#ff6600';
  ctx.fillRect(cx-12,cy-96,24,8);
  ctx.fillStyle='#ffaa00';
  ctx.fillRect(cx-6,cy-98,12,6);
  // Lava drips
  ctx.fillStyle='#ff4400';
  ctx.fillRect(cx-20,cy-80,6,20);
  ctx.fillRect(cx+14,cy-75,6,18);
}

function spawnEnemies(n,isChiefSpawn){
  if(isChiefSpawn){
    const a=Math.random()*Math.PI*2;
    const r=40*TSIZE;
    chief={
      x:MSIZE/2*TSIZE+Math.cos(a)*r,
      y:(MSIZE/2-60)*TSIZE+Math.sin(a)*r,
      hp:300,maxHp:300,spd:0.8,isChief:true,
      attackTimer:0,type:'chief'
    };
    showMsg('THE TRIBAL CHIEF HAS APPEARED!');
    return;
  }
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const r=(50+Math.random()*30)*TSIZE;
    enemies.push({
      x:MSIZE/2*TSIZE+Math.cos(a)*r,
      y:(MSIZE/2-20)*TSIZE+Math.sin(a)*r,
      hp:30,maxHp:30,spd:0.7+Math.random()*0.4,
      attackTimer:0,isChief:false
    });
  }
}

// INPUT
window.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key.toLowerCase()==='i')toggleInv();
  if(e.key.toLowerCase()==='c')toggleCraft();
});
window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
window.addEventListener('click',e=>{
  if(!gameRunning)return;
  handleClick(e.clientX,e.clientY);
});

function toggleInv(){
  const p=document.getElementById('inv-panel');
  p.style.display=p.style.display==='block'?'none':'block';
  if(p.style.display==='block')renderInv();
}
function toggleCraft(){
  const p=document.getElementById('craft-panel');
  p.style.display=p.style.display==='block'?'none':'block';
  if(p.style.display==='block')renderCraft();
}

function renderInv(){
  const grid=document.getElementById('inv-grid');
  grid.innerHTML='';
  const items=[
    {k:'wood',l:'WOOD'},{k:'stone',l:'STONE'},{k:'coconut',l:'COCONUT'},
    {k:'fruit',l:'FRUIT'},{k:'fish',l:'FISH'},{k:'campfire',l:'CAMPFIRE'},
    {k:'axe',l:'AXE'},{k:'spear',l:'SPEAR'},{k:'raft',l:'RAFT'}
  ];
  items.forEach(it=>{
    const d=document.createElement('div');
    d.className='inv-slot';
    d.innerHTML=`<div>${it.l}</div><div style="color:#c8f135;font-size:14px">${player.inv[it.k]||0}</div>`;
    grid.appendChild(d);
  });
}

const recipes=[
  {name:'CAMPFIRE',needs:{wood:5},gives:'campfire',desc:'5 Wood'},
  {name:'STONE AXE',needs:{wood:2,stone:3},gives:'axe',desc:'2W+3S — Better chopping'},
  {name:'SPEAR',needs:{wood:4,stone:2},gives:'spear',desc:'4W+2S — Weapon'},
  {name:'RAFT',needs:{wood:10},gives:'raft',desc:'10 Wood'},
  {name:'SUPERYACHT',needs:{wood:25,stone:10,raft:1},gives:'yacht',desc:'25W+10S+1 Raft — ESCAPE!',needsChief:true}
];

function renderCraft(){
  const list=document.getElementById('craft-list');
  list.innerHTML='';
  recipes.forEach(r=>{
    if(r.needsChief&&!player.chiefDefeated){return;}
    const d=document.createElement('div');
    d.className='craft-recipe';
    d.innerHTML=`<b>${r.name}</b> — ${r.desc}`;
    d.onclick=()=>tryCraft(r);
    list.appendChild(d);
  });
}

function tryCraft(r){
  for(const[k,v] of Object.entries(r.needs)){
    if((player.inv[k]||0)<v){showMsg(`NEED MORE ${k.toUpperCase()}`);return;}
  }
  for(const[k,v] of Object.entries(r.needs))player.inv[k]-=v;
  if(r.gives==='yacht'){triggerWin();return;}
  player.inv[r.gives]=(player.inv[r.gives]||0)+1;
  showMsg(`CRAFTED: ${r.name}`);
  renderCraft();
  renderInv();
}

function triggerWin(){
  document.getElementById('win-screen').style.display='flex';
  gameRunning=false;
  animateYacht();
}

function animateYacht(){
  const yc=document.getElementById('yacht-canvas');
  const yctx=yc.getContext('2d');
  yctx.imageSmoothingEnabled=false;
  let yx=20;
  function frame(){
    yctx.fillStyle='#001133';
    yctx.fillRect(0,0,300,150);
    // Ocean
    yctx.fillStyle='#1a4a8c';
    yctx.fillRect(0,90,300,60);
    yctx.fillStyle='#2266bb';
    yctx.fillRect(0,88,300,6);
    // Yacht hull
    yctx.fillStyle='#ffffff';
    yctx.fillRect(yx,80,80,20);
    yctx.fillStyle='#cccccc';
    yctx.fillRect(yx+4,76,70,8);
    // Mast
    yctx.fillStyle='#aaaaaa';
    yctx.fillRect(yx+36,40,4,38);
    // Sail
    yctx.fillStyle='rgba(255,255,255,0.9)';
    yctx.fillRect(yx+40,42,30,32);
    // Flag
    yctx.fillStyle='#c8f135';
    yctx.fillRect(yx+40,40,10,8);
    yx+=1;
    if(yx<300)requestAnimationFrame(frame);
  }
  frame();
}

function handleClick(sx,sy){
  // World coordinates
  const camX=player.x-canvas.width/2;
  const camY=player.y-canvas.height/2;
  const wx=sx+camX;
  const wy=sy+camY;
  const reach=48;

  // Attack enemies
  enemies.forEach((e,i)=>{
    const d=Math.hypot(wx-e.x,wy-e.y);
    if(d<reach+20){
      const dmg=player.inv.spear>0?20:10;
      e.hp-=dmg;
      spawnParticles(e.x,e.y,'#e74c3c');
      if(e.hp<=0)enemies.splice(i,1);
    }
  });
  if(chief){
    const d=Math.hypot(wx-chief.x,wy-chief.y);
    if(d<reach+30){
      chief.hp-=player.inv.spear>0?20:10;
      spawnParticles(chief.x,chief.y,'#e74c3c');
      if(chief.hp<=0){
        chief=null;
        player.chiefDefeated=true;
        showMsg('TRIBAL CHIEF DEFEATED! YOU ARE ISLAND LEADER!');
        spawnParticles(wx,wy,'#c8f135');
      }
    }
  }

  // Harvest trees
  [...trees].forEach((t,i)=>{
    if(Math.hypot(wx-t.x,wy-t.y)<reach){
      t.hp--;
      spawnParticles(t.x,t.y,'#5c3d1e');
      if(t.hp<=0){
        player.inv.wood+=player.inv.axe>0?3:2;
        trees.splice(i,1);
        showMsg('+WOOD');
      }
    }
  });

  // Harvest palms
  [...palms].forEach((t,i)=>{
    if(Math.hypot(wx-t.x,wy-t.y)<reach&&t.respawn<=0){
      player.inv.coconut++;
      t.respawn=600;
      showMsg('+COCONUT (+WATER)');
    }
  });

  // Harvest fruits
  [...fruits].forEach((t,i)=>{
    if(Math.hypot(wx-t.x,wy-t.y)<reach&&t.respawn<=0){
      player.inv.fruit++;
      t.respawn=900;
      showMsg('+FRUIT (+FOOD)');
    }
  });

  // Harvest rocks
  [...rocks].forEach((t,i)=>{
    if(Math.hypot(wx-t.x,wy-t.y)<reach){
      t.hp--;
      spawnParticles(t.x,t.y,'#666');
      if(t.hp<=0){
        player.inv.stone+=2;
        rocks.splice(i,1);
        showMsg('+STONE');
      }
    }
  });

  // Fishing spots
  fishSpots.forEach(f=>{
    if(Math.hypot(wx-f.x,wy-f.y)<reach){
      // Simple: just give fish
      player.inv.fish++;
      showMsg('+FISH (+FOOD)');
    }
  });

  // Use coconut / fruit from inventory
  // Auto-consume handled by I key
}

function spawnParticles(x,y,color){
  for(let i=0;i<6;i++){
    particles.push({
      x,y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,
      life:30,maxLife:30,color
    });
  }
}

function updateParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    return p.life>0;
  });
}

function drawParticles(camX,camY){
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    ctx.globalAlpha=a;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-camX-2,p.y-camY-2,4,4);
  });
  ctx.globalAlpha=1;
}

// MINIMAP
function drawMinimap(){
  const mc=document.getElementById('minimap');
  const mctx=mc.getContext('2d');
  const scale=100/MSIZE;
  for(let y=0;y<MSIZE;y+=2){
    for(let x=0;x<MSIZE;x+=2){
      mctx.fillStyle=TILE_COLORS[map[y][x]];
      mctx.fillRect(x*scale,y*scale,2*scale+1,2*scale+1);
    }
  }
  // Player dot
  mctx.fillStyle='#c8f135';
  mctx.fillRect(player.x/TSIZE*scale-2,player.y/TSIZE*scale-2,4,4);
  // Enemies
  mctx.fillStyle='#e74c3c';
  enemies.forEach(e=>mctx.fillRect(e.x/TSIZE*scale-1,e.y/TSIZE*scale-1,3,3));
  if(chief)mctx.fillRect(chief.x/TSIZE*scale-2,chief.y/TSIZE*scale-2,5,5);
}

// MAIN GAME LOOP
function startGame(){
  genMap();
  genObjects();
  player.x=MSIZE/2*TSIZE;
  player.y=(MSIZE/2+55)*TSIZE;
  gameRunning=true;
  requestAnimationFrame(loop);
}

function updatePlayer(){
  const spd=player.inv.axe>0?player.spd+0.5:player.spd;
  let nx=player.x,ny=player.y;
  if(keys['w']||keys['arrowup'])ny-=spd;
  if(keys['s']||keys['arrowdown'])ny+=spd;
  if(keys['a']||keys['arrowleft'])nx-=spd;
  if(keys['d']||keys['arrowright'])nx+=spd;

  // Bounds
  nx=Math.max(8,Math.min(MSIZE*TSIZE-8,nx));
  ny=Math.max(8,Math.min(MSIZE*TSIZE-8,ny));

  const tx=Math.floor(nx/TSIZE),ty=Math.floor(ny/TSIZE);
  const tile=map[ty]&&map[ty][tx];

  if(tile===T.OCEAN){
    showMsg('TOO DEEP — SWIM BACK!');
    player.hp-=0.5;
    // Bounce back
    nx=player.x;ny=player.y;
  }
  player.x=nx;player.y=ny;

  // Survival timers
  waterTimer++;foodTimer++;
  if(waterTimer>300){waterTimer=0;player.water=Math.max(0,player.water-2);}
  if(foodTimer>500){foodTimer=0;player.food=Math.max(0,player.food-2);}
  if(player.water<=0)player.hp=Math.max(0,player.hp-0.1);
  if(player.food<=0)player.hp=Math.max(0,player.hp-0.1);

  // Auto consume if critically low
  if(player.water<20&&player.inv.coconut>0){player.inv.coconut--;player.water=Math.min(100,player.water+40);showMsg('DRANK COCONUT');}
  if(player.food<20&&player.inv.fruit>0){player.inv.fruit--;player.food=Math.min(100,player.food+35);showMsg('ATE FRUIT');}
  if(player.food<20&&player.inv.fish>0){player.inv.fish--;player.food=Math.min(100,player.food+45);showMsg('ATE FISH');}
}

function updateEnemies(){
  const allEnemies=[...enemies];
  if(chief)allEnemies.push(chief);

  allEnemies.forEach(e=>{
    const dx=player.x-e.x,dy=player.y-e.y;
    const d=Math.hypot(dx,dy);
    if(d<300){
      e.x+=dx/d*e.spd;
      e.y+=dy/d*e.spd;
    }
    e.attackTimer++;
    if(d<24&&e.attackTimer>60){
      e.attackTimer=0;
      const dmg=e.isChief?15:8;
      player.hp=Math.max(0,player.hp-dmg);
      spawnParticles(player.x,player.y,'#e74c3c');
    }
  });

  // Spawn schedule
  enemySpawnTimer++;
  if(dayCount>=3&&isNight&&enemySpawnTimer>300){
    enemySpawnTimer=0;
    const n=Math.min(3+dayCount,10);
    spawnEnemies(n,false);
  }
  if(dayCount>=15&&!chief&&!player.chiefDefeated){
    spawnEnemies(0,true);
  }
}

function updateDayNight(){
  frameCount++;
  dayTime=frameCount%DAY_DURATION/DAY_DURATION;
  const prevNight=isNight;
  isNight=dayTime>0.6||dayTime<0.05;
  if(!prevNight&&isNight){
    dayCount++;
    document.getElementById('day-display').textContent=`DAY ${dayCount}`;
    if(dayCount===3)showMsg('TRIBAL SCOUTS SPOTTED!');
    if(dayCount===15&&!player.chiefDefeated)showMsg('THE CHIEF APPROACHES...');
  }
}

function updatePalmsAndFruits(){
  palms.forEach(p=>{if(p.respawn>0)p.respawn--;});
  fruits.forEach(f=>{if(f.respawn>0)f.respawn--;});
  fishSpots.forEach(f=>f.shimmer++);
}

function updateUI(){
  document.getElementById('hp-bar').style.width=player.hp+'%';
  document.getElementById('water-bar').style.width=player.water+'%';
  document.getElementById('food-bar').style.width=player.food+'%';
  if(msgTimer>0){
    document.getElementById('msg').textContent=msgText;
    msgTimer--;
  } else {
    document.getElementById('msg').textContent='';
  }
}

function loop(){
  if(!gameRunning)return;
  requestAnimationFrame(loop);

  updatePlayer();
  updateEnemies();
  updateDayNight();
  updateParticles();
  updatePalmsAndFruits();
  updateUI();

  // RENDER
  const camX=player.x-canvas.width/2;
  const camY=player.y-canvas.height/2;

  // Sky
  let skyColor;
  if(dayTime<0.25)skyColor=`rgb(${Math.round(30+dayTime*4*130)},${Math.round(50+dayTime*4*120)},${Math.round(80+dayTime*4*100)})`;
  else if(dayTime<0.6)skyColor='#87CEEB';
  else if(dayTime<0.7)skyColor=`rgb(${Math.round(255-((dayTime-0.6)*10)*200)},${Math.round(150-((dayTime-0.6)*10)*100)},50)`;
  else skyColor='#0a0a1a';
  ctx.fillStyle=skyColor;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Tiles
  const startX=Math.max(0,Math.floor(camX/TSIZE));
  const startY=Math.max(0,Math.floor(camY/TSIZE));
  const endX=Math.min(MSIZE,startX+Math.ceil(canvas.width/TSIZE)+2);
  const endY=Math.min(MSIZE,startY+Math.ceil(canvas.height/TSIZE)+2);

  for(let ty=startY;ty<endY;ty++){
    for(let tx=startX;tx<endX;tx++){
      const t=map[ty][tx];
      ctx.fillStyle=getTileColor(t,tx*TSIZE,ty*TSIZE);
      ctx.fillRect(tx*TSIZE-camX,ty*TSIZE-camY,TSIZE,TSIZE);
      // Tile variation
      if(t===T.BEACH&&(tx+ty)%5===0){ctx.fillStyle='rgba(255,255,200,0.2)';ctx.fillRect(tx*TSIZE-camX,ty*TSIZE-camY,TSIZE,TSIZE);}
      if(t===T.JUNGLE&&(tx*3+ty*7)%11===0){ctx.fillStyle='rgba(0,60,0,0.3)';ctx.fillRect(tx*TSIZE-camX,ty*TSIZE-camY,TSIZE,TSIZE);}
    }
  }

  // Volcano
  const vcx=MSIZE/2*TSIZE-camX;
  const vcy=(MSIZE/2-60)*TSIZE-camY;
  if(vcx>-200&&vcx<canvas.width+200)drawVolcano(vcx,vcy);

  // Objects
  trees.forEach(t=>{const sx=t.x-camX,sy=t.y-camY;if(sx>-30&&sx<canvas.width+30)drawPixelTree(sx,sy);});
  rocks.forEach(t=>{const sx=t.x-camX,sy=t.y-camY;if(sx>-20&&sx<canvas.width+20)drawPixelRock(sx,sy);});
  palms.forEach(t=>{const sx=t.x-camX,sy=t.y-camY;if(sx>-30&&sx<canvas.width+30)drawPixelPalm(sx,sy);});
  fruits.forEach(t=>{const sx=t.x-camX,sy=t.y-camY;if(sx>-20&&sx<canvas.width+20)drawPixelFruit(sx,sy);});
  fishSpots.forEach(f=>{const sx=f.x-camX,sy=f.y-camY;if(sx>-20&&sx<canvas.width+20)drawPixelFishSpot(sx,sy,f.shimmer);});

  // Enemies
  enemies.forEach(e=>{
    const sx=e.x-camX,sy=e.y-camY;
    if(sx>-50&&sx<canvas.width+50){
      drawPixelEnemy(sx,sy,false);
      ctx.fillStyle='#e74c3c';ctx.fillRect(sx-15,sy-30,30,4);
      ctx.fillStyle='#2ecc71';ctx.fillRect(sx-15,sy-30,30*(e.hp/e.maxHp),4);
    }
  });
  if(chief){
    const sx=chief.x-camX,sy=chief.y-camY;
    if(sx>-80&&sx<canvas.width+80){
      drawPixelEnemy(sx,sy,true);
      ctx.fillStyle='#e74c3c';ctx.fillRect(sx-25,sy-50,50,6);
      ctx.fillStyle='#f39c12';ctx.fillRect(sx-25,sy-50,50*(chief.hp/chief.maxHp),6);
    }
  }

  // Player
  drawPixelPlayer(canvas.width/2,canvas.height/2,mx>canvas.width/2?1:-1);

  // Particles
  drawParticles(camX,camY);

  // Night overlay
  if(isNight){
    ctx.fillStyle=`rgba(0,0,15,${Math.min(0.65,(dayTime>0.6?(dayTime-0.6)/0.1:0.05/dayTime)*0.65)})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    // Stars
    ctx.fillStyle='rgba(255,255,255,0.8)';
    for(let i=0;i<80;i++){
      const sx=(i*137+40)%canvas.width;
      const sy=(i*97+20)%canvas.height;
      ctx.fillRect(sx,sy,2,2);
    }
  }

  // Water warning flash
  const tx2=Math.floor(player.x/TSIZE),ty2=Math.floor(player.y/TSIZE);
  if(map[ty2]&&map[ty2][tx2]===T.OCEAN){
    ctx.fillStyle='rgba(0,100,200,0.25)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  // Death check
  if(player.hp<=0){
    ctx.fillStyle='rgba(150,0,0,0.7)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#fff';
    ctx.font='bold 48px Courier New';
    ctx.textAlign='center';
    ctx.fillText('YOU DIED',canvas.width/2,canvas.height/2);
    ctx.font='20px Courier New';
    ctx.fillText('Refresh to try again',canvas.width/2,canvas.height/2+50);
    gameRunning=false;
  }

  drawMinimap();
}

window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
</script>
</body>
</html>
