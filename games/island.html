function startChopMinigame(obj) {
  state.minigame = {
    type: 'chop', target: obj,
    indicatorPos: 0, indicatorDir: 1,
    progress: 0, maxProgress: 2, // 2 hits to fell tree
    result: null, timer: 0,
    speed: 0.018
  };
}

function startMineMinigame(obj) {
  const zones = [];
  for (let i = 0; i < 5; i++) {
    zones.push({x: 30+Math.random()*280, y: 60+Math.random()*40, hit:false});
  }
  state.minigame = {
    type: 'mine', target: obj,
    zones, currentZone: 0,
    zoneTimer: 180, progress:0,
    autoTimer: 600, // 10 second auto-complete
    result: null
  };
}

function startFishMinigame() {
  state.minigame = {
    type: 'fish_wait',
    timer: (2+Math.random()*6)*60,
    tension: 0,
    phase: 'wait' // wait -> bite -> reel -> result
  };
}

function updateMinigame(canvas) {
  const mg = state.minigame;
  if (!mg) return;

  if (mg.type === 'chop') {
    mg.indicatorPos += mg.indicatorDir * mg.speed;
    if (mg.indicatorPos > 1) { mg.indicatorPos = 1; mg.indicatorDir = -1; }
    if (mg.indicatorPos < 0) { mg.indicatorPos = 0; mg.indicatorDir = 1; }
    if (mg.result) {
      mg.resultTimer = (mg.resultTimer||40) - 1;
      if (mg.resultTimer <= 0) mg.result = null;
    }
  }

  if (mg.type === 'mine') {
    mg.zoneTimer--;
    mg.autoTimer = (mg.autoTimer||600) - 1;
    if (mg.zoneTimer <= 0 && mg.currentZone < mg.zones.length) {
      mg.currentZone = Math.min(mg.currentZone, mg.zones.filter(z=>!z.hit).length);
      mg.zoneTimer = 180;
    }
    // Auto-complete after 10 seconds
    if (mg.autoTimer <= 0) {
      state.player.inv.stone += 1;
      showMsg('+1 STONE', '#888899');
      SFX.pickup();
      state.objects = state.objects.filter(o => o !== mg.target);
      state.minigame = null;
    }
  }

  if (mg.type === 'fish_wait') {
    mg.timer--;
    if (mg.timer <= 0) {
      mg.type = 'fish_bite';
      mg.biteTimer = 120;
      showMsg('FISH BITING! PRESS F!', '#4a9ab4');
    }
  }

  if (mg.type === 'fish_bite') {
    mg.biteTimer--;
    if (mg.biteTimer <= 0) {
      showMsg('THE FISH GOT AWAY...', '#888');
      state.minigame = null;
      state.fishing = null;
    }
  }

  if (mg.type === 'fish_reel') {
    if (keys['f'] || keys[' ']) {
      mg.tension = Math.min(1, mg.tension + 0.02);
    } else {
      mg.tension = Math.max(0, mg.tension - 0.015);
    }
    if (mg.tension >= 0.6 && mg.tension <= 0.85) {
      mg.inZone = (mg.inZone||0) + 1;
      if (mg.inZone > 60) {
        // Caught!
        state.player.inv.fish++;
        showMsg('FISH CAUGHT!', '#4a9ab4');
        spawnParticles(state.player.x, state.player.y, '#4a9ab4', 10);
        state.minigame = null;
        state.fishing = null;
      }
    } else {
      mg.inZone = 0;
      if (mg.tension >= 1) {
        showMsg('LINE SNAPPED!', '#e74c3c');
        state.minigame = null;
        state.fishing = null;
      }
    }
  }
}

function drawMinigame(ctx) {
  const mg = state.minigame;
  if (!mg) return;
  const cw = ctx.canvas.width, ch = ctx.canvas.height;
  const bx = cw/2 - 180, by = ch - 180, bw = 360, bh = 120;

  ctx.fillStyle = 'rgba(61,32,16,0.96)';
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = '#8B6020';
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.strokeStyle = '#5c3a10';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx+3, by+3, bw-6, bh-6);

  ctx.font = '11px "Courier New"';
  ctx.fillStyle = '#f0d890';
  ctx.textAlign = 'center';

  if (mg.type === 'chop') {
    ctx.fillText('AXE EQUIPPED: 2 hits needed — PRESS SPACE IN THE GREEN ZONE', cw/2, by+18);
    const barX = bx+20, barY = by+35, barW = bw-40, barH = 24;
    // Bar background
    ctx.fillStyle = '#cc2222'; ctx.fillRect(barX, barY, barW, barH);
    // Yellow zones
    ctx.fillStyle = '#ccaa00';
    ctx.fillRect(barX + barW*0.25, barY, barW*0.15, barH);
    ctx.fillRect(barX + barW*0.6, barY, barW*0.15, barH);
    // Green zone
    ctx.fillStyle = '#22aa22';
    ctx.fillRect(barX + barW*0.35, barY, barW*0.25, barH);
    // Indicator
    ctx.fillStyle = '#fff';
    ctx.fillRect(barX + mg.indicatorPos*(barW-8), barY-4, 8, barH+8);
    // Progress trees
    ctx.fillStyle = '#aaa';
    for (let i = 0; i < mg.maxProgress; i++) {
      ctx.fillStyle = i < mg.progress ? '#c8f135' : '#333';
      ctx.fillRect(bx+20+i*30, by+72, 20, 20);
    }
    if (mg.result) {
      ctx.fillStyle = mg.result === 'green' ? '#22ff22' : mg.result === 'yellow' ? '#ffaa00' : '#ff2222';
      ctx.fillText(mg.result === 'green' ? 'PERFECT!' : mg.result === 'yellow' ? 'GOOD' : 'MISS!', cw/2, by+100);
    }
  }

  if (mg.type === 'mine') {
    ctx.fillText('MINING — CLICK THE GLOWING WEAK POINTS IN ORDER', cw/2, by+18);
    // Draw rock face
    ctx.fillStyle = '#555'; ctx.fillRect(bx+20, by+28, bw-40, 80);
    mg.zones.forEach((z, i) => {
      if (z.hit) { ctx.fillStyle = '#333'; }
      else if (i === mg.currentZone) {
        const pulse = 0.5 + Math.sin(state.frameCount*0.2)*0.5;
        ctx.fillStyle = `rgba(255,${Math.round(200*pulse)},0,${0.7+pulse*0.3})`;
      } else { ctx.fillStyle = '#888'; }
      ctx.fillRect(bx+20+z.x-12, by+28+z.y-60, 24, 24);
      if (!z.hit && i === mg.currentZone) {
        ctx.fillStyle = '#fff';
        ctx.font = '9px Courier New';
        ctx.fillText(i+1, bx+20+z.x, by+28+z.y-46);
      }
    });
    // Timer bar
    ctx.fillStyle = '#333'; ctx.fillRect(bx+20, by+108, bw-40, 6);
    ctx.fillStyle = mg.zoneTimer > 60 ? '#22aa22' : '#cc4400';
    ctx.fillRect(bx+20, by+108, (bw-40)*mg.zoneTimer/180, 6);
  }

  if (mg.type === 'fish_wait') {
    ctx.fillText('FISHING — WAIT FOR A BITE...', cw/2, by+18);
    // Animated fish line
    const lineX = cw/2;
    ctx.strokeStyle = '#c8a060';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(lineX, by+30);
    for (let i = 0; i < 60; i++) {
      ctx.lineTo(lineX + Math.sin(i*0.3+state.frameCount*0.05)*8, by+30+i);
    }
    ctx.stroke();
    // Bobber
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(lineX-5, by+85, 10, 10);
    ctx.fillStyle = '#fff';
    ctx.fillRect(lineX-5, by+85, 10, 5);
  }

  if (mg.type === 'fish_bite') {
    ctx.fillStyle = '#4a9ab4';
    ctx.fillText('FISH BITING! PRESS F TO REEL IN!', cw/2, by+50);
    const pulse = Math.sin(state.frameCount*0.3)*3;
    ctx.font = `${20+pulse}px Courier New`;
    ctx.fillStyle = '#ffff00';
    ctx.fillText('><>', cw/2, by+85);
  }

  if (mg.type === 'fish_reel') {
    ctx.fillText('REEL IN — HOLD F/SPACE TO TENSION, KEEP IN GREEN', cw/2, by+18);
    const barX = bx+40, barY = by+40, barW = bw-80, barH = 28;
    ctx.fillStyle = '#cc2222'; ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = '#22aa22'; ctx.fillRect(barX+barW*0.6, barY, barW*0.25, barH);
    ctx.fillStyle = '#ffaa00'; ctx.fillRect(barX+barW*0.85, barY, barW*0.15, barH);
    // Tension indicator
    ctx.fillStyle = '#fff';
    ctx.fillRect(barX + mg.tension*(barW-6), barY-4, 6, barH+8);
    ctx.fillStyle = '#aaa';
    ctx.font = '10px Courier New';
    ctx.fillText('SLACK                    SWEET SPOT              SNAP', cw/2, by+88);
  }

  ctx.textAlign = 'left';
}

function handleMinigameKey(key) {
  const mg = state.minigame;
  if (!mg) return;

  if (mg.type === 'chop' && key === ' ') {
    const pos = mg.indicatorPos;
    let result;
    if (pos >= 0.35 && pos <= 0.6) result = 'green';
    else if ((pos >= 0.25 && pos < 0.35) || (pos > 0.6 && pos <= 0.75)) result = 'yellow';
    else result = 'miss';
    mg.result = result;
    mg.resultTimer = 40;

    const prog = result === 'green' ? 2 : result === 'yellow' ? 1 : 0;
    mg.progress += prog;
    if (result !== 'miss') {
      spawnParticles(mg.target.x, mg.target.y, '#5c3d1e', 4);
      SFX.chop();
    }

    if (mg.progress >= mg.maxProgress) {
      const yield_ = 2 + (Math.random() < 0.4 ? 1 : 0); // 2 or 3 wood
      state.player.inv.wood += yield_;
      showMsg(`+${yield_} WOOD`, '#8B6914');
      SFX.pickup();
      // Floating "+N WOOD" particle
      const tx = mg.target.x, ty = mg.target.y;
      spawnParticle(tx, ty-20, 0, -1.5, '#c8f135', 80);
      spawnParticle(tx-8, ty-10, -0.5, -0.8, '#8B6914', 50);
      spawnParticle(tx+8, ty-10, 0.5, -0.8, '#8B6914', 50);
      spawnParticles(tx, ty, '#5c3d1e', 8);
      // Remove tree
      state.objects = state.objects.filter(o => o !== mg.target);
      state.minigame = null;
    }
  }

  if (mg.type === 'fish_bite' && (key === 'f')) {
    mg.type = 'fish_reel';
    mg.tension = 0.3;
    mg.inZone = 0;
  }
}

function handleMineClick(wx, wy) {
  const mg = state.minigame;
  if (!mg || mg.type !== 'mine') return;
  const cw = window.innerWidth, ch = window.innerHeight;
  const bx = cw/2 - 180, by = ch - 180;
  // Zone positions: drawn at bx+20+z.x-12, by+28+z.y-60, size 24x24
  const z = mg.zones[mg.currentZone];
  if (!z || z.hit) return;
  const zx = bx + 20 + z.x - 12;
  const zy = by + 28 + z.y - 60;
  if (wx >= zx && wx <= zx+24 && wy >= zy && wy <= zy+24) {
    z.hit = true;
    spawnParticles(mg.target.x, mg.target.y, '#666677', 4);
    SFX.chop();
    mg.currentZone++;
    mg.zoneTimer = 180;
    if (mg.currentZone >= mg.zones.length) {
      const perfect = mg.zones.every(z2=>z2.hit);
      const yield_ = perfect ? 3 : (2 + (Math.random() < 0.3 ? 1 : 0)); // 2-3 stone
      const wasZeroStone = (state.player.inv.stone||0) === 0;
      state.player.inv.stone += yield_;
      showMsg(`+${yield_} STONE${perfect?' (PERFECT!)':''}`, '#888899');
      SFX.pickup();
      // Tutorial hint: first stone pickup
      if (wasZeroStone && !state.tutorials.stoneHint) {
        state.tutorials.stoneHint = true;
        setTimeout(() => showMsg('Craft tools at the WORKBENCH (C key)', '#c8f135'), 1500);
      }
      state.objects = state.objects.filter(o => o !== mg.target);
      state.minigame = null;
    }
  }
}

// ============================================================
// WEB AUDIO — PROCEDURAL SOUND EFFECTS
// ============================================================

const SFX = (() => {
  let ctx = null;
  let unlocked = false;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  // Unlock audio on first user interaction
  function unlock() {
    if (unlocked) return;
    unlocked = true;
    getCtx();
  }

  function _osc(type, freq, gain, dur, freqEnd) {
    try {
      const c = getCtx();
      const osc = c.createOscillator();
      const gainNode = c.createGain();
      osc.connect(gainNode);
      gainNode.connect(c.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime);
      if (freqEnd !== undefined) osc.frequency.exponentialRampToValueAtTime(freqEnd, c.currentTime + dur);
      gainNode.gain.setValueAtTime(gain, c.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      osc.start(c.currentTime);
      osc.stop(c.currentTime + dur);
    } catch(e) {}
  }

  function _noise(gainVal, dur, filterFreq) {
    try {
      const c = getCtx();
      const bufSz = Math.ceil(c.sampleRate * dur);
      const buf = c.createBuffer(1, bufSz, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSz; i++) data[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource();
      src.buffer = buf;
      const filter = c.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = filterFreq || 800;
      filter.Q.value = 0.5;
      const gainNode = c.createGain();
      gainNode.gain.setValueAtTime(gainVal, c.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      src.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(c.destination);
      src.start();
      src.stop(c.currentTime + dur);
    } catch(e) {}
  }

  return {
    unlock,

    // Attack swing — short airy whoosh
    swing() {
      _noise(0.12, 0.09, 2400);
      _osc('sine', 220, 0.04, 0.09, 110);
    },

    // Hit landed on enemy — sharp impact
    hit() {
      _noise(0.22, 0.06, 600);
      _osc('square', 180, 0.08, 0.07, 60);
    },

    // Enemy death — descending crunch
    enemyDie() {
      _osc('sawtooth', 260, 0.12, 0.25, 40);
      _noise(0.18, 0.12, 300);
    },

    // Player hurt — dull thud + low grunt
    hurt() {
      _osc('sine', 100, 0.18, 0.18, 50);
      _noise(0.15, 0.1, 200);
    },

    // Chop / mine click
    chop() {
      _noise(0.2, 0.07, 1200);
      _osc('triangle', 300, 0.06, 0.05, 200);
    },

    // Item pickup — quick ascending sparkle
    pickup() {
      _osc('sine', 440, 0.07, 0.06, 660);
      setTimeout(() => _osc('sine', 660, 0.05, 0.06, 880), 60);
    },

    // Jump — brief bounce
    jump() {
      _osc('sine', 280, 0.06, 0.1, 420);
    },

    // Thunder — low rumble during storm
    thunder() {
      _noise(0.35, 1.2, 80);
      _osc('sine', 55, 0.15, 1.0, 30);
    },

    // Campfire crackle — brief noise burst
    crackle() {
      _noise(0.08, 0.15, 1800);
    },

    // Crafting complete — ascending major chord hit
    craft() {
      _osc('sine', 330, 0.07, 0.15, 330);
      setTimeout(() => _osc('sine', 415, 0.06, 0.12, 415), 60);
      setTimeout(() => _osc('sine', 495, 0.07, 0.18, 495), 120);
    },

    // Victory sting
    victory() {
      [523, 659, 784, 1047].forEach((f, i) => {
        setTimeout(() => _osc('sine', f, 0.1, 0.3), i * 100);
      });
    }
  };
})();

// ============================================================
// PLAYER UPDATE, INPUT, INTERACTION
// ============================================================

let keys = {};
let mx = 0, my = 0;
let mouseDown = false;

function getTile(x, y) {
  const tx = Math.floor(x/TSIZE), ty = Math.floor(y/TSIZE);
  if (ty < 0 || ty >= MSIZE || tx < 0 || tx >= MSIZE) return T.DEEP_OCEAN;
  return state.map[ty][tx];
}

function checkCollisions(nx, ny) {
  const playerR = 8;
  for (const obj of state.objects) {
    if (obj.placed && obj.type !== 'wall') continue;
    if (!['tree','rock','palm','vol_rock','wall'].includes(obj.type)) continue;
    if (obj.placed && obj.type === 'wall') {
      if (nx > obj.x - 12 && nx < obj.x + 12 && ny > obj.y - 12 && ny < obj.y + 12) return true;
    } else {
      const r = obj.type === 'tree' ? 10 : 8;
      const dx = nx - obj.x, dy = ny - obj.y;
      if (dx*dx + dy*dy < (r + playerR) * (r + playerR)) return true;
    }
  }
  return false;
}

function updatePlayer() {
  const p = state.player;
  if (state.paused || state.minigame || state.dialogue || state.collapsing) return;

  // Movement
  const sprinting = keys['shift'] && p.stamina > 0;
  const tile = getTile(p.x, p.y);
  const inWater = tile === T.SHALLOW_WATER;
  const inDarkJungle = tile === T.JUNGLE_DARK;
  const inDense = inDarkJungle; // slowed in dark jungle

  let spd = 2.0;
  if (sprinting) spd = 2.8;
  if (inWater) spd *= 0.5;
  if (inDense) spd *= 0.6;
  if (p.stamina <= 0) spd *= 0.8;

  const moving = keys['w']||keys['s']||keys['a']||keys['d']||keys['arrowup']||keys['arrowdown']||keys['arrowleft']||keys['arrowright'];

  let nx = p.x, ny = p.y;
  if (keys['w']||keys['arrowup']) ny -= spd;
  if (keys['s']||keys['arrowdown']) ny += spd;
  if (keys['a']||keys['arrowleft']) nx -= spd;
  if (keys['d']||keys['arrowright']) nx += spd;

  // Clamp to world
  nx = Math.max(TSIZE, Math.min(WORLD_W-TSIZE, nx));
  ny = Math.max(TSIZE, Math.min(WORLD_H-TSIZE, ny));

  // Tile collision (lava, deep ocean, impassable volcanic walls)
  const newTile = getTile(nx, ny);
  if (newTile === T.LAVA || newTile === T.VOLCANIC) {
    p.hp = Math.max(0, p.hp - 5);
    
    showMsg('LAVA! GET BACK!', '#ff4400');
    nx = p.x; ny = p.y;
  } else if (newTile === T.DEEP_OCEAN) {
    p.hp = Math.max(0, p.hp - 1);
    
    showMsg('TOO DEEP — TURN BACK!', '#3498db');
    nx = p.x; ny = p.y;
  } else {
    // Object collision with sliding — skip when jumping
    if (p.jumping || !checkCollisions(nx, ny)) {
      p.x = nx; p.y = ny;
    } else {
      if (p.jumping || !checkCollisions(nx, p.y)) { p.x = nx; }
      else if (p.jumping || !checkCollisions(p.x, ny)) { p.y = ny; }
    }
  }

  // ── ZONE GATES ──
  const ptx = Math.floor(p.x / TSIZE);
  const pty = Math.floor(p.y / TSIZE);
  const gateMsg = (state._gateMsg || 0);
  const canShowGateMsg = gateMsg <= 0;

  // Gate 1: Jungle wall - can't enter until Oonga quest done
  if (pty < 145 && state.zoneUnlocked < 1) {
    p.y = 145 * TSIZE;
    if (canShowGateMsg) { showMsg("Talk to OONGA first — press E near him on the beach", '#c8a060'); state._gateMsg = 180; }
  }
  // Gate 2: Inner jungle (y < 120) requires zone 2 (unlocked by Mara quest)
  else if (pty < 120 && state.zoneUnlocked < 2) {
    p.y = 120 * TSIZE;
    if (canShowGateMsg) { showMsg("The deep jungle blocks your path. Complete Mara's quest first.", '#888'); state._gateMsg = 180; }
  }
  // Gate 3: Volcanic approach (within 60 tiles of volcano centre at ~150,78) requires zone 3
  else {
    const volcX = 150, volcY = 78;
    const distFromVolcano = Math.hypot(ptx - volcX, pty - volcY);
    if (distFromVolcano < 60 && state.zoneUnlocked < 3) {
      const angle = Math.atan2(pty - volcY, ptx - volcX);
      p.x = (volcX + Math.cos(angle) * 62) * TSIZE;
      p.y = (volcY + Math.sin(angle) * 62) * TSIZE;
      if (canShowGateMsg) { showMsg("FELIX: 'I wouldn't go near that mountain without proper preparation.'", '#7ca0b0'); state._gateMsg = 180; }
    }
    // Gate 4: Village area (within 20 tiles of ~150,94) requires zone 4
    const distFromVillage = Math.hypot(ptx - 150, pty - 94);
    if (distFromVillage < 20 && state.zoneUnlocked < 4) {
      const ang = Math.atan2(pty - 94, ptx - 150);
      p.x = (150 + Math.cos(ang) * 22) * TSIZE;
      p.y = (94 + Math.sin(ang) * 22) * TSIZE;
      if (canShowGateMsg) { showMsg("KONA: 'You are not ready to face my brother. Find me first.'", '#c87050'); state._gateMsg = 180; }
    }
  }
  if (state._gateMsg > 0) state._gateMsg--;

  // Attack cooldown tick
  if (p.attackCooldown > 0) p.attackCooldown--;
  if (p.attackFlash > 0) p.attackFlash--;

  // Creature soft push (animals nudge the player)
  state.creatures.forEach(c => {
    const cdx = p.x - c.x, cdy = p.y - c.y;
    const cdist = Math.sqrt(cdx*cdx + cdy*cdy);
    if (cdist > 0 && cdist < 16) {
      p.x += (cdx/cdist) * 0.5;
      p.y += (cdy/cdist) * 0.5;
    }
  });

  // Pit check in dark jungle (without torch)
  const tx = Math.floor(p.x/TSIZE), ty2 = Math.floor(p.y/TSIZE);
  if (state.pits.has(ty2*MSIZE+tx) && !p.torch && !p.inv.torch) {
    p.hp = 0;
    showMsg('YOU FELL INTO A PIT!', '#e74c3c');
  }

  // Spike trap check
  if (state.traps) {
    for (let i = state.traps.length-1; i >= 0; i--) {
      const trap = state.traps[i];
      if (trap.triggered) continue;
      if (Math.hypot(p.x-trap.x, p.y-trap.y) < 12) {
        trap.triggered = true;
        state.traps.splice(i, 1);
        p.hp = Math.max(0, p.hp - 15);
        
        state.trapFlash = 2; // brief red flash frames
        showMsg('SPIKE TRAP!', '#e74c3c');
        spawnParticles(p.x, p.y, '#e74c3c', 8);
      }
    }
  }

  // Water effects
  if (inWater && moving) {
    if (Math.random() < 0.2) spawnParticle(p.x+(Math.random()-0.5)*20, p.y+8, (Math.random()-0.5)*1.5, -1, '#aaddff', 20);
  }

  // Stamina
  if (sprinting && moving) p.stamina = Math.max(0, p.stamina - 0.4);
  else p.stamina = Math.min(p.maxStamina, p.stamina + 0.3);

  // Walk animation
  if (moving) {
    p.walkTimer++;
    p.walkFrame = Math.floor(p.walkTimer/6) % 8;
    // Dirt particle trail
    if (p.walkTimer % 8 === 0 && p.onGround) {
      const tileUnder = getTile(p.x, p.y);
      let dirtColor = null;
      if (tileUnder === T.BEACH) dirtColor = '#c8b060';
      else if (tileUnder === T.JUNGLE_LIGHT || tileUnder === T.JUNGLE_DARK) dirtColor = '#3a6a1a';
      if (dirtColor) {
        const n = 2 + Math.floor(Math.random()*2);
        for (let di = 0; di < n; di++) {
          const dp = {
            x: p.x + (Math.random()-0.5)*6,
            y: p.y + 8,
            vx: (Math.random()-0.5)*1.2,
            vy: -0.3 - Math.random()*0.5,
            color: dirtColor,
            life: 20, maxLife: 20, size: 2
          };
          state.particles.push(dp);
        }
      }
    }
  } else {
    p.walkFrame = 0;
  }

  // Survival timers
  state.waterDecay = (state.waterDecay||0) + 1;
  state.foodDecay = (state.foodDecay||0) + 1;
  const waterRate = state.objects.find(o=>o.placed&&o.type==='smoker') ? 400 : 240;
  const foodRate = state.objects.find(o=>o.placed&&o.type==='smoker') ? 600 : 360;

  if (state.waterDecay > waterRate) { state.waterDecay=0; p.water=Math.max(0,p.water-1); }
  if (state.foodDecay > foodRate) { state.foodDecay=0; p.food=Math.max(0,p.food-1); }
  if (p.water <= 0) p.hp = Math.max(0, p.hp - 0.05);
  if (p.food <= 0) p.hp = Math.max(0, p.hp - 0.05);
  if (p.sick > 0) { p.sick--; p.hp = Math.max(0, p.hp - 0.1); }
  if (p.poison > 0) { p.poison--; p.hp = Math.max(0, p.hp - 0.5); }

  // Torch auto-equip
  // torch toggled manually via hotbar

  // Volcano proximity tint
  const vcx2 = 150*TSIZE, vcy2 = 78*TSIZE;
  const vd = Math.sqrt((p.x-vcx2)**2 + (p.y-vcy2)**2);
  state.volcanoTint = Math.max(0, Math.min(0.35, (120*TSIZE - vd) / (120*TSIZE)));

  // Weather effects
  if (state.weatherRain) {
    p.water = Math.min(p.maxWater, p.water + 0.005);
    if (Math.random() < 0.3) {
      spawnParticle(
        p.x + (Math.random()-0.5)*700,
        p.y - 300,
        0, 8, '#aaddff', 30
      );
    }
  }

  // Jump — simplified arc
  if (p.jumping) {
    p.jumpTimer--;
    p.jumpOffset = -Math.abs(Math.sin(p.jumpTimer / 20 * Math.PI)) * 48;
    if (p.jumpTimer <= 0) {
      p.jumping = false;
      p.jumpOffset = 0;
      p.onGround = true;
    }
  } else {
    p.jumpOffset = 0;
  }
}

function throwCoconut() {
  const p = state.player;
  if ((p.inv.coconut||0) <= 0) { showMsg('NO COCONUT TO THROW', '#888'); return; }
  p.inv.coconut--;
  // Velocity toward mouse (in world coords)
  const camX = state.cam.x, camY = state.cam.y;
  const wx = mx + camX, wy = my + camY;
  const dx = wx - p.x, dy = wy - p.y;
  const dist = Math.sqrt(dx*dx+dy*dy);
  const speed = 8;
  state.projectiles.push({
    type: 'coconut_throw',
    x: p.x, y: p.y,
    vx: dist>0 ? dx/dist*speed : speed,
    vy: dist>0 ? dy/dist*speed : 0,
    life: 60, damage: 15
  });
  showMsg('COCONUT THROWN!', '#5c3d1e');
}

function handleInteract() {
  const p = state.player;
  const reach = 40;

  // Death pack pickup
  for (let i = state.objects.length-1; i >= 0; i--) {
    const obj = state.objects[i];
    if (obj.type === 'death_pack') {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < reach) {
        // Recover items
        for (const [k,v] of Object.entries(obj.inv)) {
          p.inv[k] = (p.inv[k]||0) + v;
        }
        state.objects.splice(i, 1);
        showMsg('PACK RECOVERED! YOUR ITEMS ARE BACK.', '#c8f135');
        spawnParticles(obj.x, obj.y, '#ffffff', 12);
        return;
      }
    }
  }

  // NPC interaction
  for (let npc of state.npcs) {
    const d = Math.hypot(p.x-npc.x, p.y-npc.y);
    if (d < reach) {
      startDialogue(npc);
      return;
    }
  }

  // Lore stones
  for (let stone of state.loreStones) {
    const d = Math.hypot(p.x-stone.x, p.y-stone.y);
    if (d < reach && !stone.read) {
      stone.read = true;
      state.dialogue = {
        type: 'lore',
        text: stone.text,
        timer: 0,
        displayed: '',
      };
      return;
    }
  }

  // Bed sleep
  for (let obj of state.objects) {
    if (obj.placed && obj.type === 'bed') {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < reach) {
        if (!state.isNight) { showMsg('NOT DARK ENOUGH TO SLEEP', '#888'); return; }
        const nearEnemy = state.enemies.some(e => Math.hypot(p.x-e.x,p.y-e.y) < 200);
        if (nearEnemy) { showMsg('ENEMIES TOO CLOSE TO SLEEP', '#e74c3c'); return; }
        sleepToMorning();
        return;
      }
    }
    // Campfire cook
    if (obj.placed && obj.type === 'campfire') {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < reach) {
        if (p.inv.fish > 0) { p.inv.fish--; p.inv.fish_cooked++; state.cookedFoodDay = state.day; showMsg('COOKED FISH', '#e67e22'); return; }
        if (p.inv.fruit > 0) { p.inv.fruit--; p.inv.fruit_cooked++; state.cookedFoodDay = state.day; showMsg('COOKED FRUIT', '#e67e22'); return; }
        showMsg('NOTHING TO COOK', '#888');
        return;
      }
    }
    // Chest
    if (obj.placed && obj.type === 'chest') {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < reach) { openChest(obj); return; }
    }
  }

  // Waterfall interaction
  for (let obj of state.objects) {
    if (obj.type === 'waterfall' && !obj.decor) {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < 50) {
        p.water = Math.min(p.maxWater, p.water + 50);
        showMsg('DRANK FROM WATERFALL', '#3dd6d0');
        spawnParticles(obj.x, obj.y, '#55aaee', 8);
        return;
      }
    }
  }

  // Cave interaction
  for (let obj of state.objects) {
    if (obj.type === 'cave' && !obj.opened) {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < 40) {
        obj.opened = true;
        // Give random loot
        p.inv.stone = (p.inv.stone||0) + 3;
        p.inv.wood = (p.inv.wood||0) + 3;
        p.inv.volcanic_stone = (p.inv.volcanic_stone||0) + 1;
        p.inv.fish = (p.inv.fish||0) + 2;
        p.inv.coconut = (p.inv.coconut||0) + 2;
        showMsg('TIDAL CAVE: STONE x3, WOOD x3, VOLCANIC STONE x1, FISH x2, COCONUT x2', '#c8a060');
        spawnParticles(obj.x, obj.y, '#c8f135', 12);
        return;
      }
    }
  }

  // Altar interaction
  for (let obj of state.objects) {
    if (obj.type === 'altar') {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < 40 && !state.altarUsed) {
        state.altarUsed = true;
        p.maxHp += 20;
        p.hp = Math.min(p.maxHp, p.hp + 20);
        showMsg('THE ISLAND BLESSES YOU. +20 MAX HEALTH', '#ffee44');
        spawnParticles(obj.x, obj.y, '#ffaa00', 16);
        return;
      }
    }
  }

  // Bottle interaction
  const bottleMsgs = [
    "The volcano holds great power. Those who reach its peak find more than fire.",
    "The tribe fears nothing except the mask of their ancestors. Find it on their chief.",
    "There is a lagoon to the north. The warriors never go there. I know not why."
  ];
  for (let obj of state.objects) {
    if (obj.type === 'bottle' && !obj.read) {
      const d = Math.hypot(p.x-obj.x, p.y-obj.y);
      if (d < 40) {
        obj.read = true;
        const msg = bottleMsgs[obj.msgIdx % bottleMsgs.length];
        state.dialogue = { type:'lore', text: msg, displayed:'', timer:0, charIdx:0 };
        return;
      }
    }
  }

  // Fishing
  const tile2 = getTile(p.x, p.y);
  const nearWater2 = [T.SHALLOW_WATER, T.BEACH].includes(tile2);
  if (nearWater2 && !state.minigame) {
    if (p.inv.fishing_rod <= 0) { showMsg('NEED A FISHING ROD TO FISH', '#e74c3c'); return; }
    startFishMinigame();
    return;
  }
}


// Get currently equipped tool from hotbar
function getActiveTool() {
  const p = state.player;
  // Build tool list: same order as hotbar (excluding fishing_rod from hotbar per spec)
  const tools = [
    {id:'axe'}, {id:'fire_axe'}, {id:'pickaxe'}, {id:'sword'},
    {id:'spear'}, {id:'fire_spear'}, {id:'torch'}, {id:'coconut'}
  ].filter(t => (p.inv[t.id]||0) > 0);
  if (!state.activeSlot) state.activeSlot = 1;
  const slot = tools[state.activeSlot - 1];
  return slot ? slot.id : null;
}
function handleClick(sx, sy) {
  if (state.cutscenePlaying) { advanceCutscene(); return; }
  if (!state.running) return;
  const p = state.player;

  // Minigame mine click
  if (state.minigame?.type === 'mine') {
    handleMineClick(sx, sy);
    return;
  }

  if (state.minigame) return;

  // Dialogue click
  if (state.dialogue) {
    const d = state.dialogue;
    // Check if clicking an option button
    if (d.charIdx >= d.text.length && d.options && d.options.length > 0 && d._optRects) {
      for (let i = 0; i < d._optRects.length; i++) {
        const r = d._optRects[i];
        if (sx >= r.x && sx <= r.x+r.w && sy >= r.y && sy <= r.y+r.h) {
          selectDialogueOption(i);
          return;
        }
      }
      // Clicked outside options — do nothing (wait for choice)
      return;
    }
    advanceDialogue();
    return;
  }

  if (state.buildMode) {
    placeBuildItem(sx, sy);
    return;
  }

  const camX = state.cam.x, camY = state.cam.y;
  const wx = sx + camX, wy = sy + camY;
  const reach = 80; // generous reach for tree/rock interaction

  const tool = getActiveTool();

  // ── WEAPON TOOLS: attack nearest enemy within 56px of PLAYER ──
  const isWeapon = tool === 'sword' || tool === 'spear' || tool === 'fire_spear' || tool === 'fire_axe';
  if (isWeapon) {
    if (p.attackCooldown > 0) {
      showMsg('WEAPON COOLING DOWN...', '#888');
      return;
    }
    const dmgMap = {sword:15, spear:18, fire_spear:30, fire_axe:22};
    const combatDmg = dmgMap[tool] || 8;
    const combatColor = (tool==='fire_spear'||tool==='fire_axe') ? '#ff6600' : '#e74c3c';
    const attackReach = 56;
    SFX.swing();
    p.attackCooldown = 30; // 0.5s at 60fps
    p.attackFlash = 6;
    let hit = false;
    [...state.enemies, ...(state.chief?[state.chief]:[])].forEach(e => {
      if (Math.hypot(p.x-e.x, p.y-e.y) < attackReach) {
        e.hp -= combatDmg;
        e.hitFlash = 6;
        spawnParticles(e.x, e.y, combatColor, 6);
        SFX.hit();
        if (e.hp <= 0) SFX.enemyDie();
        hit = true;
      }
    });
    for (let i = state.creatures.length-1; i >= 0; i--) {
      const c = state.creatures[i];
      if (c.type === 'crab') continue;
      if (Math.hypot(p.x-c.x, p.y-c.y) < attackReach) {
        c.hp -= combatDmg;
        c.hitFlash = 6;
        spawnParticles(c.x, c.y, '#22cc44', 4);
        SFX.hit();
        if (c.hp <= 0) {
          SFX.enemyDie();
          if (c.type === 'spider') { p.inv.wood++; showMsg('+1 WOOD (SPIDER WEB)', '#8B6914'); }
          if (c.type === 'shark') { p.inv.fish = (p.inv.fish||0)+2; showMsg('+2 FISH (SHARK)', '#e67e22'); }
          state.creatures.splice(i, 1);
        }
        hit = true;
        break;
      }
    }
    if (!hit) showMsg('NO ENEMIES IN RANGE (need within 56px)', '#888');
    return;
  }

  // ── AXE TOOL: click on tree ──
  if (tool === 'axe') {
    // find nearest tree within 80px of WORLD click position
    let nearest = null, nearestDist = 80;
    for (const obj of state.objects) {
      if (obj.placed) continue;
      const isTree = ['tree','breadfruit','mape','purau','pandanus','filao','hutu','palm'].includes(obj.type);
      if (!isTree) continue;
      const d = Math.hypot(wx-obj.x, wy-obj.y);
      if (d < nearestDist) { nearest = obj; nearestDist = d; }
    }
    if (nearest) {
      startChopMinigame(nearest);
    } else {
      showMsg('No tree in range — click closer to a tree', '#888');
    }
    return;
  }

  // ── FIRE AXE: instant chop ──
  if (tool === 'fire_axe') {
    // fire_axe also attacks enemies (handled in weapon block above)
    // here: click on tree for instant chop
    let nearest = null, nearestDist = 80;
    for (const obj of state.objects) {
      if (obj.placed) continue;
      const isTree = ['tree','breadfruit','mape','purau','pandanus','filao','hutu','palm'].includes(obj.type);
      if (!isTree) continue;
      const d = Math.hypot(wx-obj.x, wy-obj.y);
      if (d < nearestDist) { nearest = obj; nearestDist = d; }
    }
    if (nearest) {
      // Instant chop, 3 wood
      const yield_ = 3;
      p.inv.wood = (p.inv.wood||0) + yield_;
      state.objects = state.objects.filter(o => o !== nearest);
      showMsg(`+${yield_} WOOD (FIRE AXE)`, '#ff6600');
      spawnParticles(nearest.x, nearest.y, '#ff6600', 8);
      // +WOOD floating particle
      spawnParticle(nearest.x, nearest.y-20, 0, -1.2, '#c8f135', 60);
      SFX.chop(); SFX.pickup();
    } else {
      // No tree: treat as weapon attack (already handled above via isWeapon check)
      showMsg('No tree in range — or equip to attack enemies', '#888');
    }
    return;
  }

  // ── PICKAXE TOOL: click on rock ──
  if (tool === 'pickaxe') {
    let nearest = null, nearestDist = 80;
    for (const obj of state.objects) {
      if (obj.placed) continue;
      if (obj.type !== 'rock' && obj.type !== 'vol_rock') continue;
      const d = Math.hypot(wx-obj.x, wy-obj.y);
      if (d < nearestDist) { nearest = obj; nearestDist = d; }
    }
    if (nearest) {
      startMineMinigame(nearest);
    } else {
      showMsg('No rock in range — click closer to a rock', '#888');
    }
    return;
  }

  // ── FISHING ROD: click on shallow water tile ──
  if (tool === 'fishing_rod') {
    const clickTile = getTile(wx, wy);
    if (clickTile === 1) { // SHALLOW_WATER
      if (!state.minigame) startFishMinigame();
    } else {
      showMsg('Click on shallow water to fish (F key also works)', '#3dd6d0');
    }
    return;
  }

  // ── TORCH: toggle on/off (also handled by hotbar key) ──
  if (tool === 'torch') {
    p.torch = !p.torch;
    showMsg(p.torch ? 'TORCH ON — reveals pit traps in dark jungle' : 'TORCH OFF', p.torch ? '#ffaa00' : '#888');
    return;
  }

  // ── COCONUT: throw toward click ──
  if (tool === 'coconut') {
    throwCoconut();
    return;
  }

  // ── NO TOOL / UNARMED: try to interact with objects at click position ──
  // Check if clicking tree without axe
  for (const obj of state.objects) {
    if (obj.placed) continue;
    const isTree = ['tree','breadfruit','mape','purau','pandanus','filao','hutu'].includes(obj.type);
    if (isTree && Math.hypot(wx-obj.x, wy-obj.y) < 80) {
      showMsg('You need an AXE — craft one (C menu: 2 wood + 2 stone)', '#e74c3c');
      return;
    }
    if ((obj.type==='rock'||obj.type==='vol_rock') && Math.hypot(wx-obj.x, wy-obj.y) < 80) {
      showMsg('You need a PICKAXE — craft one (C menu: 3 wood + 4 stone)', '#e74c3c');
      return;
    }
  }

  // Unarmed attacks (very weak)
  let hit = false;
  const combatDmg = 4;
  const attackReach = 56;
  SFX.swing();
  [...state.enemies, ...(state.chief?[state.chief]:[])].forEach(e => {
    if (Math.hypot(p.x-e.x, p.y-e.y) < attackReach) {
      e.hp -= combatDmg;
      e.hitFlash = 6;
      spawnParticles(e.x, e.y, '#e74c3c', 4);
      SFX.hit();
      if (e.hp <= 0) SFX.enemyDie();
      hit = true;
    }
  });
  if (hit) return;

  // Harvest objects
  for (let i = state.objects.length-1; i >= 0; i--) {
    const obj = state.objects[i];
    if (obj.placed) continue;
    if (obj.type === 'death_pack' || obj.type === 'shipwreck') continue;
    const d = Math.hypot(wx-obj.x, wy-obj.y);
    if (d > reach) continue;

    // Trees: require axe tool (handled above)
    if (['tree','breadfruit','mape','purau','pandanus','filao','hutu'].includes(obj.type)) {
      showMsg('You need an AXE — craft one (C menu: 2 wood + 2 stone)', '#e74c3c');
      return;
    }
    // Rocks: require pickaxe tool (handled above)
    if (obj.type === 'rock' || obj.type === 'vol_rock') {
      showMsg('You need a PICKAXE — craft one (C menu: 3 wood + 4 stone)', '#e74c3c');
      return;
    }
    if (obj.type === 'palm' && obj.respawn<=0) {
      obj.respawn = 1800;
      p.inv.coconut++;
      p.water = Math.min(p.maxWater, p.water+20);
      showMsg('+COCONUT (+WATER)', '#3498db');
      SFX.pickup();
      return;
    }
    if (obj.type === 'berry' && obj.respawn<=0) {
      obj.respawn = 3600;
      // Raw berry — risk of sickness
      if (Math.random() < 0.2) { p.sick = 200; showMsg('SICK FROM RAW BERRIES!', '#e74c3c'); SFX.hurt(); }
      else { p.food = Math.min(p.maxFood, p.food+15); showMsg('+BERRIES (RAW)', '#e67e22'); SFX.pickup(); }
      return;
    }
    if (obj.type === 'fruit') {
      if (Math.random() < 0.2) { p.sick = 200; showMsg('SICK FROM RAW FRUIT!', '#e74c3c'); SFX.hurt(); }
      else { p.food = Math.min(p.maxFood, p.food+20); showMsg('+FRUIT (RAW)', '#e67e22'); SFX.pickup(); }
      spawnParticles(obj.x, obj.y, '#2ecc71', 4);
      state.objects.splice(i,1);
      return;
    }
    if (obj.type === 'fish_cooked' || obj.type === 'fish_cooked') {
      p.food = Math.min(p.maxFood, p.food+40);
      SFX.pickup();
      state.objects.splice(i,1);
      return;
    }
    if (obj.type === 'driftwood' && !obj.collected) {
      obj.collected = true;
      const wasZeroWood = (p.inv.wood||0) === 0;
      p.inv.wood++;
      showMsg('+DRIFTWOOD', '#8B6914');
      SFX.pickup();
      // Tutorial hint: first wood pickup
      if (wasZeroWood && !state.tutorials.woodHint) {
        state.tutorials.woodHint = true;
        setTimeout(() => showMsg('GOOD! Now press C to craft a Stone Axe (2 wood + 2 stone)', '#c8f135'), 1500);
      }
      state.objects.splice(i,1);
      return;
    }
    if (obj.type === 'journal') {
      p.inv.journal = (p.inv.journal||0) + 1;
      showMsg("MARA'S JOURNAL FOUND. RETURN IT TO HER.", '#c8a060');
      spawnParticles(obj.x, obj.y, '#c8a060', 8);
      SFX.pickup();
      state.objects.splice(i,1);
      return;
    }
    if (obj.type === 'tribal_child' && !obj.collected) {
      obj.collected = true;
      p.inv.tribal_child = (p.inv.tribal_child||0) + 1;
      showMsg("YOU FOUND THE TRIBAL CHILD. BRING HER TO MARA.", '#c8a060');
      spawnParticles(obj.x, obj.y, '#f0d890', 10);
      SFX.pickup();
      state.objects.splice(i,1);
      return;
    }
    if (obj.type === 'jungle_chest' && !obj.opened) {
      obj.opened = true;
      const items = ['stone','stone','stone','food_pack','volcanic_stone'];
      const item = items[Math.floor(Math.random()*items.length)];
      if (item==='stone') { p.inv.stone+=3; showMsg('+3 STONE (JUNGLE CHEST)', '#888'); }
      else if (item==='volcanic_stone') { p.inv.volcanic_stone+=2; showMsg('+2 VOLCANIC STONE!', '#ff6600'); }
      spawnParticles(obj.x, obj.y, '#c8f135', 10);
      SFX.craft(); // chest open = satisfying ding
      return;
    }
    if (obj.type === 'vol_chest' && !obj.opened) {
      obj.opened = true;
      p.inv.fire_axe = 1;
      p.inv.fire_spear = 1;
      p.inv.volcanic_stone += 5;
      showMsg('FIRE AXE + FIRE SPEAR FOUND!', '#ff6600');
      spawnParticles(obj.x, obj.y, '#ff6600', 20);
      SFX.victory();
      return;
    }
    if (obj.type === 'treasure_chest' && !obj.opened) {
      obj.opened = true;
      // Always give food/water bonus
      p.food = Math.min(p.maxFood, p.food + 15);
      p.water = Math.min(p.maxWater, p.water + 10);
      let foundItem = '';
      const tier = obj.lootTier || 'common';
      const rareRoll = Math.random() < 0.30;
      if (tier === 'rare' || (tier === 'uncommon' && rareRoll)) {
        // Rare loot
        const rareItems = ['fire_spear','fire_axe','chiefs_mask'];
        const ri = rareItems[Math.floor(Math.random()*rareItems.length)];
        p.inv[ri] = (p.inv[ri]||0) + 1;
        foundItem = ri.replace(/_/g,' ').toUpperCase();
        showMsg('TREASURE FOUND! ' + foundItem, '#ffcc00');
        spawnParticles(obj.x, obj.y, '#ffcc00', 20);
        SFX.victory();
      } else if (tier === 'uncommon' || (tier === 'common' && rareRoll)) {
        // Uncommon loot
        const uncItems = [
          () => { p.inv.volcanic_stone=(p.inv.volcanic_stone||0)+2; return '+2 VOLCANIC STONE'; },
          () => { p.inv.fishing_rod=1; return 'FISHING ROD'; },
          () => { p.inv.torch=(p.inv.torch||0)+2; return '+2 TORCHES'; },
        ];
        foundItem = uncItems[Math.floor(Math.random()*uncItems.length)]();
        showMsg('TREASURE FOUND! ' + foundItem, '#ffcc00');
        spawnParticles(obj.x, obj.y, '#ffcc00', 14);
        SFX.craft();
      } else {
        // Common loot
        p.inv.wood = (p.inv.wood||0) + 5;
        p.inv.stone = (p.inv.stone||0) + 3;
        p.inv.coconut = (p.inv.coconut||0) + 2;
        foundItem = 'WOOD x5, STONE x3, COCONUT x2';
        showMsg('TREASURE FOUND! ' + foundItem, '#ffcc00');
        spawnParticles(obj.x, obj.y, '#ffcc00', 10);
        SFX.craft();
      }
      return;
    }
  }
}

function sleepToMorning() {
  state.frameCount = Math.ceil(state.frameCount / state.DAY_FRAMES) * state.DAY_FRAMES;
  state.player.hp = Math.min(state.player.maxHp, state.player.hp + 40);
  state.player.water = Math.min(state.player.maxWater, state.player.water + 30);
  state.player.food = Math.min(state.player.maxFood, state.player.food + 30);
  state.enemies = [];
  state.day++;
  showMsg('YOU SLEPT. A NEW DAY BEGINS.', '#c8f135');
  spawnDayEnemies();
}

function spawnDayEnemies() {
  if (state.day >= 3) spawnEnemies(Math.min(2+state.day, 8), 'scout');
  if (state.day >= 5) spawnEnemies(1, 'archer');
  if (state.day >= 15 && !state.chief && !state.player.chiefDefeated) spawnChief();
}

function openBuildMenu() {
  state.buildMode = !state.buildMode;
  state.buildItem = null;
  if (state.buildMode) showMsg('BUILD MODE — SELECT ITEM (B to cancel)', '#c8f135');
}

function selectBuildItem(id) {
  const p = state.player;
  const item = BUILD_ITEMS.find(b=>b.id===id);
  if (!item) return;
  for (const [k,v] of Object.entries(item.cost)) {
    if ((p.inv[k]||0) < v) { showMsg(`NEED MORE ${k.toUpperCase()}`, '#e74c3c'); return; }
  }
  state.buildItem = id;
  showMsg(`PLACING ${item.label} — CLICK TO PLACE`, '#c8f135');
}

function placeBuildItem(sx, sy) {
  if (!state.buildItem) return;
  const camX = state.cam.x, camY = state.cam.y;
  const wx = sx + camX, wy = sy + camY;
  const p = state.player;
  const item = BUILD_ITEMS.find(b=>b.id===state.buildItem);
  if (!item) return;

  // Check can afford
  for (const [k,v] of Object.entries(item.cost)) {
    if ((p.inv[k]||0) < v) { showMsg(`NEED MORE ${k.toUpperCase()}`, '#e74c3c'); return; }
  }
  for (const [k,v] of Object.entries(item.cost)) p.inv[k] -= v;

  state.objects.push({
    type: state.buildItem,
    x: Math.round(wx/TSIZE)*TSIZE + TSIZE/2,
    y: Math.round(wy/TSIZE)*TSIZE + TSIZE/2,
    placed: true,
    hp: state.buildItem==='wall'?20:undefined
  });

  showMsg(`${item.label} PLACED`, '#c8f135');
  spawnParticles(wx, wy, '#c8f135', 8);
  checkSettlement();

  if (state.buildItem==='water_barrel') { p.maxWater += 50; showMsg('MAX WATER +50', '#3498db'); }
}

function openChest(chestObj) {
  // Simple chest UI
  const existingChestPanel = document.getElementById('chest-panel');
  if (existingChestPanel) {
    existingChestPanel.style.display = existingChestPanel.style.display==='block'?'none':'block';
    return;
  }
}

function openCraftMenu() {
  const panel = document.getElementById('craft-panel');
  if (!panel) return;
  panel.style.display = panel.style.display==='block'?'none':'block';
  if (panel.style.display==='block') {
    renderCraftMenu();
    // Tutorial hint: first time opening craft menu
    if (!state.tutorials.craftHint) {
      state.tutorials.craftHint = true;
      setTimeout(() => showMsg('TIP: Craft a STONE AXE first to chop trees faster', '#c8f135'), 800);
    }
  }
}

function renderCraftMenu() {
  const list = document.getElementById('craft-list');
  if (!list) return;
  list.innerHTML = '';
  const p = state.player;
  const hasForge = state.objects.some(o=>o.placed&&o.type==='forge');

  CRAFT_ITEMS.forEach(item => {
    if (item.needsForge && !hasForge) return;
    if (item.needsChief && !p.chiefDefeated) return;

    const costStr = Object.entries(item.cost).map(([k,v])=>`${v} ${k.replace('_',' ').toUpperCase()}`).join(', ');
    const canAfford = Object.entries(item.cost).every(([k,v])=>(p.inv[k]||0)>=v);

    const div = document.createElement('div');
    div.style.cssText = `padding:8px 10px;background:rgba(0,0,0,0.35);border:1px solid ${canAfford?'#8b6020':'rgba(61,30,10,0.5)'};border-radius:6px;margin-bottom:5px;cursor:${canAfford?'pointer':'default'};transition:background 0.15s,border-color 0.15s;font-family:'Lato',sans-serif;${canAfford?'box-shadow:0 0 6px rgba(200,241,53,0.08)':''}`;
    div.innerHTML = `<span style="color:${canAfford?'#e8d49a':'#5c3a20'};font-weight:600;font-size:12px">${item.label}</span> <span style="color:#a08040;font-size:10px">— ${costStr}</span><br><span style="color:${canAfford?'#c8a870':'#4a2a10'};font-size:10px">${item.desc}</span>`;
    if (canAfford) div.onclick = () => tryCraft(item.id);
    list.appendChild(div);
  });
}

function tryCraft(id) {
  const p = state.player;
  const item = CRAFT_ITEMS.find(c=>c.id===id);
  if (!item) return;

  for (const [k,v] of Object.entries(item.cost)) {
    if ((p.inv[k]||0) < v) { showMsg('NOT ENOUGH RESOURCES', '#e74c3c'); return; }
  }
  for (const [k,v] of Object.entries(item.cost)) p.inv[k] -= v;

  if (id === 'superyacht') { triggerWin(); return; }

  p.inv[id] = (p.inv[id]||0) + 1;
  showMsg(`CRAFTED: ${item.label}`, '#c8f135');
  SFX.craft();
  updateUI(); // refresh hotbar immediately

  if (id === 'water_barrel') p.maxWater += 50;
  if (id === 'torch') p.torch = true;

  renderCraftMenu();
  renderInvMenu();
}

// DIALOGUE
function _applyLineEffects(npc, line) {
  // Apply storyChoice if this line has one
  if (line.choiceSet) {
    state.storyChoices[line.choiceSet.key] = line.choiceSet.val;
  }
  // Quest triggers
  if (line.questTrigger === 'find_kona') {
    // Oonga finished — unlock Zone 1
    state.zoneUnlocked = Math.max(1, state.zoneUnlocked);
    showMsg("ZONE UNLOCKED: The jungle opens to you.", '#c8f135');
    showMsg("QUEST: Find Elder Kona (marked on minimap)", '#c8a060');
  }
  if (line.questTrigger === 'reach_summit') {
    // Kona finished — unlock Zone 4
    state.zoneUnlocked = Math.max(4, state.zoneUnlocked);
    showMsg("ZONE UNLOCKED: The village. The chief awaits.", '#ff4444');
    setTimeout(() => { playCutscene('village_approach'); }, 400);
    // Give reward
    const q = npc.quest;
    if (q && !q.done) {
      for (const [k,v] of Object.entries(q.reward)) state.player.inv[k] = (state.player.inv[k]||0)+v;
      q.done = true;
      showMsg(`QUEST COMPLETE: ${q.text}`, '#c8f135');
    }
  }
  // Felix truth — learnedTruth already set via choiceSet on line 1, now check quest
  if (npc.id === 'felix' && line.choiceSet && line.choiceSet.key === 'learnedTruth') {
    // Don't complete quest yet — needs items
    // Trigger cutscene after a short delay (let dialogue close first)
    setTimeout(() => { playCutscene('meet_felix_truth'); }, 300);
  }
}

function startDialogue(npc) {
  if (!npc.lines || !npc.lines.length) return;

  // Check quest completion
  if (npc.quest && !npc.quest.done && Object.keys(npc.quest.needs).length > 0) {
    const q = npc.quest;
    const canComplete = Object.entries(q.needs).every(([k,v])=>(state.player.inv[k]||0)>=v);
    if (canComplete) {
      for (const [k,v] of Object.entries(q.needs)) state.player.inv[k] = Math.max(0,(state.player.inv[k]||0)-v);
      for (const [k,v] of Object.entries(q.reward)) state.player.inv[k] = (state.player.inv[k]||0)+v;
      q.done = true;
      showMsg(`QUEST COMPLETE: ${q.text}`, '#c8f135');
      // Zone unlock on Mara quest complete
      if (npc.id === 'mara') {
        state.zoneUnlocked = Math.max(2, state.zoneUnlocked);
        showMsg("ZONE UNLOCKED: The deep jungle awaits.", '#c8f135');
      }
      // Zone unlock on Felix quest complete
      if (npc.id === 'felix') {
        state.storyChoices.felixDone = true;
        state.zoneUnlocked = Math.max(3, state.zoneUnlocked);
        showMsg("ZONE UNLOCKED: The volcanic path is passable.", '#c8f135');
      }
    }
  }

  const idx = npc._lineIdx || 0;
  const line = npc.lines[Math.min(idx, npc.lines.length-1)];
  state.dialogue = {
    type: 'npc',
    npc: npc,
    text: line.text,
    options: line.options || null,
    optionNext: line.optionNext || null,
    displayed: '',
    timer: 0,
    charIdx: 0,
    _lineRef: line,
  };
}

function selectDialogueOption(optIdx) {
  const d = state.dialogue;
  if (!d || !d.npc) return;
  const npc = d.npc;
  const nextIdx = d.optionNext ? d.optionNext[optIdx] : (npc._lineIdx||0) + 1;

  // Apply effects for the current line before moving on
  _applyLineEffects(npc, d._lineRef);

  // For Mara's child choice (line 1 -> 2 or 3), track the option
  if (npc.id === 'mara' && (npc._lineIdx||0) === 1) {
    state.storyChoices.returnedChild = (optIdx === 0);
  }

  npc._lineIdx = nextIdx;
  const newLine = npc.lines[Math.min(nextIdx, npc.lines.length-1)];
  _applyLineEffects(npc, newLine);

  state.dialogue = {
    type: 'npc',
    npc: npc,
    text: newLine.text,
    options: newLine.options || null,
    optionNext: newLine.optionNext || null,
    displayed: '',
    timer: 0,
    charIdx: 0,
    _lineRef: newLine,
  };
}

function advanceDialogue() {
  const d = state.dialogue;
  if (!d) return;

  if (d.charIdx < d.text.length) {
    // Skip typewriter
    d.displayed = d.text;
    d.charIdx = d.text.length;
    return;
  }

  // If there are options, wait for option click — don't auto-advance
  if (d.options && d.options.length > 0) return;

  if (d.type === 'lore') {
    state.dialogue = null;
    return;
  }

  if (d.npc) {
    const npc = d.npc;
    _applyLineEffects(npc, d._lineRef || {});
    const nextIdx = (npc._lineIdx||0) + 1;
    if (nextIdx < npc.lines.length) {
      npc._lineIdx = nextIdx;
      const newLine = npc.lines[nextIdx];
      state.dialogue = {
        type: 'npc',
        npc: npc,
        text: newLine.text,
        options: newLine.options || null,
        optionNext: newLine.optionNext || null,
        displayed: '',
        timer: 0,
        charIdx: 0,
        _lineRef: newLine,
      };
    } else {
      state.dialogue = null;
    }
  } else {
    state.dialogue = null;
  }
}

function updateDialogue() {
  const d = state.dialogue;
  if (!d) return;
  if (d.charIdx < d.text.length) {
    d.charIdx++;
    d.displayed = d.text.substring(0, d.charIdx);
  }
}

function drawDialogue(ctx) {
  const d = state.dialogue;
  if (!d) return;
  const cw = ctx.canvas.width, ch = ctx.canvas.height;
  const hasOptions = d.charIdx >= d.text.length && d.options && d.options.length > 0;
  const bh = hasOptions ? 160 : 130;
  const bx = 40, by = ch - bh - 10, bw = cw - 80;

  ctx.fillStyle = 'rgba(40,20,8,0.95)';
  ctx.fillRect(bx, by, bw, bh);
  ctx.strokeStyle = '#8b6020';
  ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.strokeStyle = 'rgba(200,168,100,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx+3, by+3, bw-6, bh-6);

  if (d.type === 'lore') {
    ctx.fillStyle = '#e8d49a';
    ctx.font = '600 12px "Cinzel", serif';
    ctx.fillText('CARVED STONE', bx+14, by+20);
  } else if (d.npc) {
    ctx.fillStyle = d.npc.color || '#e8d49a';
    ctx.font = '600 13px "Cinzel", serif';
    ctx.fillText(d.npc.name, bx+14, by+20);
  }

  ctx.fillStyle = '#f0e0b0';
  ctx.font = '13px "Lato", sans-serif';
  // Word wrap
  const words = d.displayed.split(' ');
  let line = '', lineY = by+38;
  words.forEach(word => {
    const testLine = line + word + ' ';
    if (ctx.measureText(testLine).width > bw-30 && line !== '') {
      ctx.fillText(line, bx+14, lineY);
      line = word + ' ';
      lineY += 16;
    } else { line = testLine; }
  });
  ctx.fillText(line, bx+14, lineY);

  if (d.charIdx >= d.text.length) {
    if (hasOptions) {
      // Draw option buttons
      const optY = by + bh - 38;
      const optW = Math.floor((bw - 40) / d.options.length) - 8;
      d.options.forEach((opt, i) => {
        const ox = bx + 14 + i * (optW + 8);
        // Highlight on hover (store rects for click detection)
        if (!d._optRects) d._optRects = [];
        d._optRects[i] = { x: ox, y: optY, w: optW, h: 26 };
        ctx.fillStyle = 'rgba(61,30,10,0.9)';
        ctx.fillRect(ox, optY, optW, 26);
        ctx.strokeStyle = '#8b6020';
        ctx.lineWidth = 1;
        ctx.strokeRect(ox, optY, optW, 26);
        ctx.fillStyle = '#e8d49a';
        ctx.font = '12px "Lato", sans-serif';
        ctx.textAlign = 'left';
        // Truncate if needed
        let label = opt;
        while (ctx.measureText(label).width > optW - 10 && label.length > 4) label = label.slice(0,-1);
        ctx.fillText(label, ox + 6, optY + 17);
      });
      ctx.fillStyle = '#a08040';
      ctx.font = '10px "Lato", sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('[CLICK AN OPTION]', bx+14, by+bh-44);
    } else {
      ctx.fillStyle = '#a08040';
      ctx.font = '11px "Lato", sans-serif';
      ctx.fillText('[CLICK TO CONTINUE]', bx+bw-164, by+bh-10);
    }
  }
}

function drawItemIcon(ctx, item, x, y, size) {
  const s = size || 28;
  const cx = x + s/2, cy = y + s/2;
  ctx.save();
  switch(item) {
    case 'wood':
      // Log cross-section: brown circle with rings
      ctx.fillStyle = '#7a4a18'; ctx.fillRect(x+4, y+4, s-8, s-8);
      ctx.fillStyle = '#5c3010'; ctx.fillRect(x+6, y+6, s-12, s-12);
      ctx.fillStyle = '#3a1a08'; ctx.fillRect(x+10, y+10, s-20, s-20);
      ctx.strokeStyle = '#3a1a08'; ctx.lineWidth = 1;
      ctx.strokeRect(x+4, y+4, s-8, s-8);
      break;
    case 'stone':
      ctx.fillStyle = '#666677'; ctx.fillRect(x+2, y+8, s-4, s-10);
      ctx.fillStyle = '#888899'; ctx.fillRect(x+4, y+4, s-10, s-8);
      ctx.fillStyle = '#aaaacc'; ctx.fillRect(x+8, y+2, s-16, 6);
      break;
    case 'coconut':
      ctx.fillStyle = '#5c3d1e'; ctx.beginPath(); ctx.arc(cx, cy, s*0.38, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#3a2010'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx-4, cy-4); ctx.lineTo(cx+4, cy+4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+4, cy-4); ctx.lineTo(cx-4, cy+4); ctx.stroke();
      break;
    case 'fruit':
      ctx.fillStyle = '#cc4400'; ctx.beginPath(); ctx.ellipse(cx, cy+2, s*0.35, s*0.42, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff6600'; ctx.beginPath(); ctx.ellipse(cx-2, cy-1, s*0.2, s*0.25, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#2d8a18'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(cx+2, y+2); ctx.lineTo(cx+6, y-2); ctx.stroke();
      break;
    case 'fish':
      ctx.fillStyle = '#2a6ab4'; ctx.beginPath(); ctx.ellipse(cx-2, cy, s*0.38, s*0.22, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#3a8ad4'; ctx.beginPath(); ctx.ellipse(cx-4, cy-2, s*0.2, s*0.12, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#2a6ab4';
      ctx.beginPath(); ctx.moveTo(cx+s*0.3, cy); ctx.lineTo(cx+s*0.48, cy-6); ctx.lineTo(cx+s*0.48, cy+6); ctx.fill();
      ctx.fillStyle = '#000'; ctx.fillRect(Math.round(cx-s*0.28), Math.round(cy-2), 2, 2);
      break;
    case 'fish_cooked':
      ctx.strokeStyle = '#5c3d1e'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x+4, y+22); ctx.lineTo(x+s-4, y+8); ctx.stroke();
      ctx.fillStyle = '#e07020'; ctx.beginPath(); ctx.ellipse(cx, cy+2, s*0.32, s*0.18, -0.4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#f0a040'; ctx.fillRect(Math.round(cx-4), Math.round(cy), 8, 3);
      break;
    case 'axe':
      ctx.strokeStyle = '#5c3d1e'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(x+8, y+s-4); ctx.lineTo(x+s-6, y+4); ctx.stroke();
      ctx.fillStyle = '#888899'; ctx.beginPath(); ctx.moveTo(x+s-10, y+2); ctx.lineTo(x+s-2, y+10); ctx.lineTo(x+s-12, y+16); ctx.fill();
      break;
    case 'spear':
      ctx.strokeStyle = '#5c3d1e'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x+4, y+s-4); ctx.lineTo(x+s-4, y+4); ctx.stroke();
      ctx.fillStyle = '#aaaacc'; ctx.beginPath(); ctx.moveTo(x+s-4, y+4); ctx.lineTo(x+s-10, y+8); ctx.lineTo(x+s-8, y+14); ctx.fill();
      break;
    case 'sword':
      ctx.strokeStyle = '#aaaacc'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(cx, y+s-4); ctx.lineTo(cx, y+4); ctx.stroke();
      ctx.strokeStyle = '#7a5c2e'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(x+4, cy+2); ctx.lineTo(x+s-4, cy+2); ctx.stroke();
      ctx.fillStyle = '#c8a060'; ctx.fillRect(Math.round(cx-2), Math.round(cy+2), 4, 6);
      break;
    case 'pickaxe':
      ctx.strokeStyle = '#5c3d1e'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(x+s-6, y+10); ctx.lineTo(x+6, y+s-6); ctx.stroke();
      ctx.fillStyle = '#888899';
      ctx.beginPath(); ctx.moveTo(x+s-8, y+4); ctx.lineTo(x+s, y+12); ctx.lineTo(x+s-14, y+18); ctx.closePath(); ctx.fill();
      break;
    case 'fishing_rod':
      ctx.strokeStyle = '#5c3d1e'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x+4, y+s-4); ctx.quadraticCurveTo(x+s-4, y+s-8, x+s-4, y+4); ctx.stroke();
      ctx.strokeStyle = '#c8c8c8'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x+s-4, y+4); ctx.lineTo(x+s-2, y+s-2); ctx.stroke();
      ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(x+s-2, y+s-2, 3, 0, Math.PI*2); ctx.fill();
      break;
    case 'torch':
      ctx.fillStyle = '#5c3d1e'; ctx.fillRect(Math.round(cx-2), Math.round(cy), 4, s/2);
      ctx.fillStyle = '#ff8800'; ctx.beginPath(); ctx.ellipse(cx, cy-2, 5, 8, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.ellipse(cx, cy-4, 3, 5, 0, 0, Math.PI*2); ctx.fill();
      break;
    case 'bed':
      ctx.fillStyle = '#8B6914'; ctx.fillRect(x+2, y+8, s-4, s-10);
      ctx.fillStyle = '#e8e8e0'; ctx.fillRect(x+2, y+6, s-4, 8);
      ctx.fillStyle = '#b8b8b0'; ctx.fillRect(x+2, y+6, 8, 8);
      break;
    case 'wall':
      ctx.fillStyle = '#5c5c44';
      for (let wy2 = 0; wy2 < 3; wy2++) for (let wx2 = 0; wx2 < 3; wx2++) {
        ctx.fillRect(x+2+wx2*9, y+2+wy2*9, 7, 7);
      }
      ctx.fillStyle = '#7a7a5a';
      for (let wy2 = 0; wy2 < 3; wy2++) for (let wx2 = 0; wx2 < 3; wx2++) {
        ctx.fillRect(x+2+wx2*9, y+2+wy2*9, 7, 3);
      }
      break;
    case 'raft':
      ctx.fillStyle = '#7a5c2e';
      for (let i = 0; i < 3; i++) { ctx.fillRect(x+2+i*8, y+6, 6, s-12); }
      ctx.strokeStyle = '#5c3d1e'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x+2, y+10); ctx.lineTo(x+s-2, y+10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+2, y+s-8); ctx.lineTo(x+s-2, y+s-8); ctx.stroke();
      break;
    case 'chiefs_mask':
      // Tribal mask shape
      ctx.fillStyle = '#6a1010'; ctx.fillRect(x+4, y+2, s-8, s-4);
      ctx.fillStyle = '#8a1818'; ctx.fillRect(x+6, y+0, s-12, 6);
      // Eye holes
      ctx.fillStyle = '#000'; ctx.fillRect(x+6, y+8, 6, 5);
      ctx.fillStyle = '#000'; ctx.fillRect(x+s-12, y+8, 6, 5);
      // Mouth slot
      ctx.fillStyle = '#000'; ctx.fillRect(x+8, y+18, s-16, 4);
      // Feather decorations
      ctx.fillStyle = '#e74c3c'; ctx.fillRect(x+2, y+2, 3, 10);
      ctx.fillStyle = '#f39c12'; ctx.fillRect(x+s-5, y+2, 3, 10);
      break;
    case 'vessel':
      ctx.fillStyle = '#7a5c2e'; ctx.fillRect(x+4, y+6, s-8, s-10);
      ctx.fillStyle = '#6a4c1e'; ctx.fillRect(x+2, y+s-8, s-4, 6);
      ctx.fillStyle = '#3dd6d0'; ctx.fillRect(x+6, y+s-8, s-12, 5);
      break;
    default:
      ctx.fillStyle = '#a08040'; ctx.font = `${Math.round(s*0.3)}px Courier New`; ctx.textAlign = 'center';
      ctx.fillText(item.substring(0,3).toUpperCase(), cx, cy+4);
      ctx.textAlign = 'left';
  }
  ctx.restore();
}

function renderInvMenu() {
  const grid = document.getElementById('inv-grid');

  allItems.forEach(([k,v]) => {

    ic.width = 28; ic.height = 28;
    ic.style.cssText = 'image-rendering:pixelated;display:block;margin:0 auto 2px';

    div.appendChild(ic);

    // Count
    const countEl = document.createElement('div');
    countEl.className = 'count';
    countEl.style.fontSize = '11px';
    countEl.textContent = v;
    div.appendChild(countEl);

    labelEl.textContent = k.replace(/_/g,' ').toUpperCase().substring(0,8);

    div.onclick = () => {
      if (k==='coconut'&&p.inv.coconut>0){p.inv.coconut--;p.water=Math.min(p.maxWater,p.water+35);showMsg('+35 WATER','#3498db');}
      if (k==='fish'&&p.inv.fish>0){p.inv.fish--;if(Math.random()<0.2){p.sick=200;showMsg('SICK FROM RAW FISH!','#e74c3c');}else{p.food=Math.min(p.maxFood,p.food+25);showMsg('+25 FOOD (RAW)','#e67e22');}}
      if (k==='fish_cooked'&&p.inv.fish_cooked>0){p.inv.fish_cooked--;p.food=Math.min(p.maxFood,p.food+50);showMsg('+50 FOOD (COOKED)','#e67e22');}
      if (k==='fruit'&&p.inv.fruit>0){p.inv.fruit--;if(Math.random()<0.2){p.sick=200;showMsg('SICK FROM RAW FRUIT!','#e74c3c');}else{p.food=Math.min(p.maxFood,p.food+20);showMsg('+20 FOOD (RAW)','#e67e22');}}

function drawToolIcon(ctx, toolId, x, y, size) {
  const s = size || 20;
  ctx.save();
  switch(toolId) {
    case 'axe':
      // Brown handle diagonal, grey blade
      ctx.strokeStyle = '#7a5c2e'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x+3, y+s-3); ctx.lineTo(x+s-5, y+4); ctx.stroke();
      ctx.fillStyle = '#888899';
      ctx.beginPath(); ctx.moveTo(x+s-7, y+2); ctx.lineTo(x+s, y+8); ctx.lineTo(x+s-8, y+14); ctx.closePath(); ctx.fill();
      break;
    case 'fire_axe':
      ctx.strokeStyle = '#7a5c2e'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x+3, y+s-3); ctx.lineTo(x+s-5, y+4); ctx.stroke();
      ctx.fillStyle = '#ff6600';
      ctx.beginPath(); ctx.moveTo(x+s-7, y+2); ctx.lineTo(x+s, y+8); ctx.lineTo(x+s-8, y+14); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffcc00'; ctx.fillRect(x+s-6, y+3, 4, 3);
      break;
    case 'pickaxe':
      ctx.strokeStyle = '#7a5c2e'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x+s-4, y+8); ctx.lineTo(x+4, y+s-4); ctx.stroke();
      ctx.fillStyle = '#888899';
      ctx.beginPath(); ctx.moveTo(x+s-6, y+2); ctx.lineTo(x+s+2, y+10); ctx.lineTo(x+s-10, y+16); ctx.closePath(); ctx.fill();
      break;
    case 'sword':
      ctx.strokeStyle = '#aaaacc'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x+s/2, y+s-2); ctx.lineTo(x+s/2, y+3); ctx.stroke();
      ctx.strokeStyle = '#c8a020'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(x+2, y+s/2+2); ctx.lineTo(x+s-2, y+s/2+2); ctx.stroke();
      ctx.fillStyle = '#c8a060'; ctx.fillRect(Math.round(x+s/2-2), Math.round(y+s/2+3), 5, 5);
      break;
    case 'spear':
      ctx.strokeStyle = '#7a5c2e'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x+3, y+s-3); ctx.lineTo(x+s-4, y+3); ctx.stroke();
      ctx.fillStyle = '#aaaacc';
      ctx.beginPath(); ctx.moveTo(x+s-4, y+3); ctx.lineTo(x+s-10, y+8); ctx.lineTo(x+s-8, y+14); ctx.closePath(); ctx.fill();
      break;
    case 'fire_spear':
      ctx.strokeStyle = '#7a5c2e'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x+3, y+s-3); ctx.lineTo(x+s-4, y+3); ctx.stroke();
      ctx.fillStyle = '#ff8800';
      ctx.beginPath(); ctx.moveTo(x+s-4, y+3); ctx.lineTo(x+s-10, y+8); ctx.lineTo(x+s-8, y+14); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffcc00'; ctx.fillRect(x+s-7, y+3, 3, 4);
      break;
    case 'torch':
      ctx.fillStyle = '#7a5c2e'; ctx.fillRect(Math.round(x+s/2-2), Math.round(y+s/2-2), 4, s/2+2);
      ctx.fillStyle = '#ff8800';
      ctx.beginPath(); ctx.arc(x+s/2, y+s/2-4, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath(); ctx.arc(x+s/2, y+s/2-6, 3, 0, Math.PI*2); ctx.fill();
      break;
    case 'fishing_rod':
      ctx.strokeStyle = '#7a5c2e'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x+3, y+s-3); ctx.quadraticCurveTo(x+s-3, y+s-6, x+s-3, y+3); ctx.stroke();
      ctx.strokeStyle = '#c8c8c8'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x+s-3, y+3); ctx.lineTo(x+s-1, y+s-2); ctx.stroke();
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath(); ctx.arc(x+s-1, y+s-2, 3, 0, Math.PI*2); ctx.fill();
      break;
    case 'coconut':
      ctx.fillStyle = '#5c3d1e';
      ctx.beginPath(); ctx.arc(x+s/2, y+s/2, s*0.38, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#3a2010'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x+s/2-4, y+s/2-4); ctx.lineTo(x+s/2+4, y+s/2+4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+s/2+4, y+s/2-4); ctx.lineTo(x+s/2-4, y+s/2+4); ctx.stroke();
      break;
    default:
      ctx.fillStyle = '#a08040'; ctx.font = `${Math.round(s*0.35)}px Courier New`; ctx.textAlign = 'center';
      ctx.fillText(toolId.substring(0,3).toUpperCase(), x+s/2, y+s/2+4); ctx.textAlign = 'left';
  }
  ctx.restore();
}

function drawHotbarIcons(ctx) {
  const p = state.player;
  // Same tool order as updateUI hotbar
  const toolSlots = [
    {id:'axe'},{id:'fire_axe'},{id:'pickaxe'},{id:'sword'},
    {id:'spear'},{id:'fire_spear'},{id:'torch'},{id:'coconut'},
  ].filter(t => (p.inv[t.id]||0) > 0).slice(0, 6);

  if (toolSlots.length === 0) return;

  const slotSize = 48, gap = 6;
  const totalW = toolSlots.length * slotSize + (toolSlots.length-1) * gap;
  const startX = (ctx.canvas.width - totalW) / 2;
  const slotY = ctx.canvas.height - 52;

  for (let i = 0; i < toolSlots.length; i++) {
    const sl = toolSlots[i];
    if (!sl) continue;
    const x = startX + i * (slotSize + gap);
    // Draw pixel icon centered in slot (20x20 icon, centered in 48px slot)
    const iconSize = 20;
    const iconX = x + (slotSize - iconSize) / 2;
    const iconY = slotY + (slotSize - iconSize) / 2 - 2;
    drawToolIcon(ctx, sl.id, iconX, iconY, iconSize);
  }
}
