// DIALOGUE
function _applyLineEffects(npc, line) {
  // Apply storyChoice if this line has one
  if (line.choiceSet) {
    state.storyChoices[line.choiceSet.key] = line.choiceSet.val;
  }
  // Quest triggers
  if (line.questTrigger === 'find_kona') {
    // Oonga finished — unlock Zone 1
    state.zoneUnlocked = Math.max(1, state.zoneUnlocked);
    showMsg("ZONE UNLOCKED: The jungle opens to you.", '#c8f135');
    showMsg("QUEST: Find Elder Kona (marked on minimap)", '#c8a060');
  }
  if (line.questTrigger === 'reach_summit') {
    // Kona finished — unlock Zone 4
    state.zoneUnlocked = Math.max(4, state.zoneUnlocked);
    showMsg("ZONE UNLOCKED: The village. The chief awaits.", '#ff4444');
    setTimeout(() => { playCutscene('village_approach'); }, 400);
    // Give reward
    const q = npc.quest;
    if (q && !q.done) {
      for (const [k,v] of Object.entries(q.reward)) state.player.inv[k] = (state.player.inv[k]||0)+v;
      q.done = true;
      showMsg(`QUEST COMPLETE: ${q.text}`, '#c8f135');
    }
  }
  // Felix truth — learnedTruth already set via choiceSet on line 1, now check quest
  if (npc.id === 'felix' && line.choiceSet && line.choiceSet.key === 'learnedTruth') {
    // Don't complete quest yet — needs items
    // Trigger cutscene after a short delay (let dialogue close first)
    setTimeout(() => { playCutscene('meet_felix_truth'); }, 300);
  }
}

function startDialogue(npc) {
  if (!npc.lines || !npc.lines.length) return;

  // Check quest completion
  if (npc.quest && !npc.quest.done && Object.keys(npc.quest.needs).length > 0) {
    const q = npc.quest;
    const canComplete = Object.entries(q.needs).every(([k,v])=>(state.player.inv[k]||0)>=v);
    if (canComplete) {
      for (const [k,v] of Object.entries(q.needs)) state.player.inv[k] = Math.max(0,(state.player.inv[k]||0)-v);
      for (const [k,v] of Object.entries(q.reward)) state.player.inv[k] = (state.player.inv[k]||0)+v;
      q.done = true;
      showMsg(`QUEST COMPLETE: ${q.text}`, '#c8f135');
      // Zone unlock on Mara quest complete
      if (npc.id === 'mara') {
        state.zoneUnlocked = Math.max(2, state.zoneUnlocked);
        showMsg("ZONE UNLOCKED: The deep jungle awaits.", '#c8f135');
      }
      // Zone unlock on Felix quest complete
      if (npc.id === 'felix') {
        state.storyChoices.felixDone = true;
        state.zoneUnlocked = Math.max(3, state.zoneUnlocked);
        showMsg("ZONE UNLOCKED: The volcanic path is passable.", '#c8f135');
      }
    }
  }

  const idx = npc._lineIdx || 0;
  const line = npc.lines[Math.min(idx, npc.lines.length-1)];
  state.dialogue = {
    type: 'npc',
    npc: npc,
    text: line.text,
    options: line.options || null,
    optionNext: line.optionNext || null,
    displayed: '',
    timer: 0,
    charIdx: 0,
    _lineRef: line,
  };
}

function selectDialogueOption(optIdx) {
  const d = state.dialogue;
  if (!d) return;
  // Generic choice callback
  if (d.type === 'choice' && d.onChoice) {
    const cb = d.onChoice;
    state.dialogue = null;
    cb(optIdx);
    return;
  }
  if (!d.npc) return;
  const npc = d.npc;
  const nextIdx = d.optionNext ? d.optionNext[optIdx] : (npc._lineIdx||0) + 1;

  // Apply effects for the current line before moving on
  _applyLineEffects(npc, d._lineRef);

  // For Mara's child choice (line 1 -> 2 or 3), track the option
  if (npc.id === 'mara' && (npc._lineIdx||0) === 1) {
    state.storyChoices.returnedChild = (optIdx === 0);
  }

  npc._lineIdx = nextIdx;
  const newLine = npc.lines[Math.min(nextIdx, npc.lines.length-1)];
  _applyLineEffects(npc, newLine);

  state.dialogue = {
    type: 'npc',
    npc: npc,
    text: newLine.text,
    options: newLine.options || null,
    optionNext: newLine.optionNext || null,
    displayed: '',
    timer: 0,
    charIdx: 0,
    _lineRef: newLine,
  };
}

function advanceDialogue() {
  const d = state.dialogue;
  if (!d) return;

  if (d.charIdx < d.text.length) {
    // Skip typewriter
    d.displayed = d.text;
    d.charIdx = d.text.length;
    return;
  }

  // If there are options, wait for option click — don't auto-advance
  if (d.options && d.options.length > 0) return;

  if (d.type === 'lore') {
    state.dialogue = null;
    return;
  }

  if (d.npc) {
    const npc = d.npc;
    _applyLineEffects(npc, d._lineRef || {});
    const nextIdx = (npc._lineIdx||0) + 1;
    if (nextIdx < npc.lines.length) {
      npc._lineIdx = nextIdx;
      const newLine = npc.lines[nextIdx];
      state.dialogue = {
        type: 'npc',
        npc: npc,
        text: newLine.text,
        options: newLine.options || null,
        optionNext: newLine.optionNext || null,
        displayed: '',
        timer: 0,
        charIdx: 0,
        _lineRef: newLine,
      };
    } else {
      state.dialogue = null;
    }
  } else {
    state.dialogue = null;
  }
}

function updateDialogue() {
  const d = state.dialogue;
  if (!d) return;
  if (d.charIdx < d.text.length) {
    d.charIdx++;
    d.displayed = d.text.substring(0, d.charIdx);
  }
}

function drawDialogue(ctx) {
  const d = state.dialogue;
  if (!d) return;
  const cw = ctx.canvas.width, ch = ctx.canvas.height;
  const hasOptions = d.charIdx >= d.text.length && d.options && d.options.length > 0;
  const bh = hasOptions ? 168 : 138;
  const bx = 36, by = ch - bh - 14, bw = cw - 72;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(bx+4, by+6, bw, bh, 12) : ctx.fillRect(bx+4, by+6, bw, bh);
  ctx.fill();

  // Main background with wood grain bands
  ctx.fillStyle = 'rgba(36,16,4,0.97)';
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(bx, by, bw, bh, 12) : ctx.fillRect(bx, by, bw, bh);
  ctx.fill();

  // Top highlight border
  ctx.strokeStyle = 'rgba(180,130,50,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(bx, by, bw, bh, 12) : ctx.strokeRect(bx, by, bw, bh);
  ctx.stroke();

  // Inner subtle frame
  ctx.strokeStyle = 'rgba(100,70,20,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(bx+4, by+4, bw-8, bh-8, 9) : ctx.strokeRect(bx+4, by+4, bw-8, bh-8);
  ctx.stroke();

  // Speaker name strip
  const speakerName = d.type === 'lore' ? 'CARVED STONE' : (d.npc ? d.npc.name : null);
  const speakerColor = d.type === 'lore' ? '#c8b060' : (d.npc ? (d.npc.color || '#e8d490') : '#e8d490');
  if (speakerName) {
    ctx.fillStyle = 'rgba(60,30,8,0.8)';
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(bx+10, by+8, 120, 20, 4) : ctx.fillRect(bx+10, by+8, 120, 20);
    ctx.fill();
    ctx.strokeStyle = 'rgba(140,100,30,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(bx+10, by+8, 120, 20, 4) : ctx.strokeRect(bx+10, by+8, 120, 20);
    ctx.stroke();
    ctx.fillStyle = speakerColor;
    ctx.font = '600 11px "Cinzel", serif';
    ctx.textAlign = 'left';
    ctx.fillText(speakerName, bx+18, by+22);
  }

  // Dialogue text
  ctx.fillStyle = '#e8d8a0';
  ctx.font = '13px "Lato", sans-serif';
  const textX = bx + 16, textStartY = by + 42, maxW = bw - 34;
  const words = d.displayed.split(' ');
  let line = '', lineY = textStartY;
  words.forEach(word => {
    const testLine = line + word + ' ';
    if (ctx.measureText(testLine).width > maxW && line !== '') {
      ctx.fillText(line, textX, lineY);
      line = word + ' '; lineY += 17;
    } else { line = testLine; }
  });
  ctx.fillText(line, textX, lineY);

  if (d.charIdx >= d.text.length) {
    if (hasOptions) {
      const optY = by + bh - 42;
      const optW = Math.floor((bw - 36) / d.options.length) - 8;
      d.options.forEach((opt, i) => {
        const ox = bx + 14 + i * (optW + 8);
        if (!d._optRects) d._optRects = [];
        d._optRects[i] = { x: ox, y: optY, w: optW, h: 28 };
        // Button background
        ctx.fillStyle = 'rgba(60,30,8,0.88)';
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(ox, optY, optW, 28, 6) : ctx.fillRect(ox, optY, optW, 28);
        ctx.fill();
        ctx.strokeStyle = 'rgba(160,110,40,0.7)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect ? ctx.roundRect(ox, optY, optW, 28, 6) : ctx.strokeRect(ox, optY, optW, 28);
        ctx.stroke();
        ctx.fillStyle = '#d8c870';
        ctx.font = '11px "Lato", sans-serif';
        ctx.textAlign = 'left';
        let label = opt;
        while (ctx.measureText(label).width > optW - 12 && label.length > 4) label = label.slice(0,-1);
        ctx.fillText(label, ox + 8, optY + 18);
      });
      ctx.fillStyle = 'rgba(160,130,60,0.6)';
      ctx.font = '9px "Lato", sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('choose a response', bx+14, by+bh-48);
    } else {
      ctx.fillStyle = 'rgba(160,130,60,0.6)';
      ctx.font = '10px "Lato", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('click to continue', bx+bw-14, by+bh-10);
      ctx.textAlign = 'left';
    }
  }
}

// ============================================================
// ITEM ICONS (pixel art drawn on canvas)
// ============================================================
function drawItemIcon(ctx, item, x, y, size) {
  const s = size || 28;
  const cx = x + s/2, cy = y + s/2;
  ctx.save();
  switch(item) {
    case 'wood':
      // Log cross-section: brown circle with rings
      ctx.fillStyle = '#7a4a18'; ctx.fillRect(x+4, y+4, s-8, s-8);
      ctx.fillStyle = '#5c3010'; ctx.fillRect(x+6, y+6, s-12, s-12);
      ctx.fillStyle = '#3a1a08'; ctx.fillRect(x+10, y+10, s-20, s-20);
      ctx.strokeStyle = '#3a1a08'; ctx.lineWidth = 1;
      ctx.strokeRect(x+4, y+4, s-8, s-8);
      break;
    case 'stone':
      ctx.fillStyle = '#666677'; ctx.fillRect(x+2, y+8, s-4, s-10);
      ctx.fillStyle = '#888899'; ctx.fillRect(x+4, y+4, s-10, s-8);
      ctx.fillStyle = '#aaaacc'; ctx.fillRect(x+8, y+2, s-16, 6);
      break;
    case 'coconut':
      ctx.fillStyle = '#5c3d1e'; ctx.beginPath(); ctx.arc(cx, cy, s*0.38, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#3a2010'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx-4, cy-4); ctx.lineTo(cx+4, cy+4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+4, cy-4); ctx.lineTo(cx-4, cy+4); ctx.stroke();
      break;
    case 'fruit':
      ctx.fillStyle = '#cc4400'; ctx.beginPath(); ctx.ellipse(cx, cy+2, s*0.35, s*0.42, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff6600'; ctx.beginPath(); ctx.ellipse(cx-2, cy-1, s*0.2, s*0.25, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#2d8a18'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(cx+2, y+2); ctx.lineTo(cx+6, y-2); ctx.stroke();
      break;
    case 'fish':
      ctx.fillStyle = '#2a6ab4'; ctx.beginPath(); ctx.ellipse(cx-2, cy, s*0.38, s*0.22, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#3a8ad4'; ctx.beginPath(); ctx.ellipse(cx-4, cy-2, s*0.2, s*0.12, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#2a6ab4';
      ctx.beginPath(); ctx.moveTo(cx+s*0.3, cy); ctx.lineTo(cx+s*0.48, cy-6); ctx.lineTo(cx+s*0.48, cy+6); ctx.fill();
      ctx.fillStyle = '#000'; ctx.fillRect(Math.round(cx-s*0.28), Math.round(cy-2), 2, 2);
      break;
    case 'fish_cooked':
      ctx.strokeStyle = '#5c3d1e'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x+4, y+22); ctx.lineTo(x+s-4, y+8); ctx.stroke();
      ctx.fillStyle = '#e07020'; ctx.beginPath(); ctx.ellipse(cx, cy+2, s*0.32, s*0.18, -0.4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#f0a040'; ctx.fillRect(Math.round(cx-4), Math.round(cy), 8, 3);
      break;
    case 'axe':
      ctx.strokeStyle = '#5c3d1e'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(x+8, y+s-4); ctx.lineTo(x+s-6, y+4); ctx.stroke();
      ctx.fillStyle = '#888899'; ctx.beginPath(); ctx.moveTo(x+s-10, y+2); ctx.lineTo(x+s-2, y+10); ctx.lineTo(x+s-12, y+16); ctx.fill();
      break;
    case 'spear':
      ctx.strokeStyle = '#5c3d1e'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x+4, y+s-4); ctx.lineTo(x+s-4, y+4); ctx.stroke();
      ctx.fillStyle = '#aaaacc'; ctx.beginPath(); ctx.moveTo(x+s-4, y+4); ctx.lineTo(x+s-10, y+8); ctx.lineTo(x+s-8, y+14); ctx.fill();
      break;
    case 'sword':
      ctx.strokeStyle = '#aaaacc'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(cx, y+s-4); ctx.lineTo(cx, y+4); ctx.stroke();
      ctx.strokeStyle = '#7a5c2e'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(x+4, cy+2); ctx.lineTo(x+s-4, cy+2); ctx.stroke();
      ctx.fillStyle = '#c8a060'; ctx.fillRect(Math.round(cx-2), Math.round(cy+2), 4, 6);
      break;
    case 'pickaxe':
      ctx.strokeStyle = '#5c3d1e'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(x+s-6, y+10); ctx.lineTo(x+6, y+s-6); ctx.stroke();
      ctx.fillStyle = '#888899';
      ctx.beginPath(); ctx.moveTo(x+s-8, y+4); ctx.lineTo(x+s, y+12); ctx.lineTo(x+s-14, y+18); ctx.closePath(); ctx.fill();
      break;
    case 'fishing_rod':
      ctx.strokeStyle = '#5c3d1e'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x+4, y+s-4); ctx.quadraticCurveTo(x+s-4, y+s-8, x+s-4, y+4); ctx.stroke();
      ctx.strokeStyle = '#c8c8c8'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x+s-4, y+4); ctx.lineTo(x+s-2, y+s-2); ctx.stroke();
      ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(x+s-2, y+s-2, 3, 0, Math.PI*2); ctx.fill();
      break;
    case 'torch':
      ctx.fillStyle = '#5c3d1e'; ctx.fillRect(Math.round(cx-2), Math.round(cy), 4, s/2);
      ctx.fillStyle = '#ff8800'; ctx.beginPath(); ctx.ellipse(cx, cy-2, 5, 8, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.ellipse(cx, cy-4, 3, 5, 0, 0, Math.PI*2); ctx.fill();
      break;
    case 'bed':
      ctx.fillStyle = '#8B6914'; ctx.fillRect(x+2, y+8, s-4, s-10);
      ctx.fillStyle = '#e8e8e0'; ctx.fillRect(x+2, y+6, s-4, 8);
      ctx.fillStyle = '#b8b8b0'; ctx.fillRect(x+2, y+6, 8, 8);
      break;
    case 'wall':
      ctx.fillStyle = '#5c5c44';
      for (let wy2 = 0; wy2 < 3; wy2++) for (let wx2 = 0; wx2 < 3; wx2++) {
        ctx.fillRect(x+2+wx2*9, y+2+wy2*9, 7, 7);
      }
      ctx.fillStyle = '#7a7a5a';
      for (let wy2 = 0; wy2 < 3; wy2++) for (let wx2 = 0; wx2 < 3; wx2++) {
        ctx.fillRect(x+2+wx2*9, y+2+wy2*9, 7, 3);
      }
      break;
    case 'raft':
      ctx.fillStyle = '#7a5c2e';
      for (let i = 0; i < 3; i++) { ctx.fillRect(x+2+i*8, y+6, 6, s-12); }
      ctx.strokeStyle = '#5c3d1e'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x+2, y+10); ctx.lineTo(x+s-2, y+10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+2, y+s-8); ctx.lineTo(x+s-2, y+s-8); ctx.stroke();
      break;
    case 'chiefs_mask':
      // Tribal mask shape
      ctx.fillStyle = '#6a1010'; ctx.fillRect(x+4, y+2, s-8, s-4);
      ctx.fillStyle = '#8a1818'; ctx.fillRect(x+6, y+0, s-12, 6);
      // Eye holes
      ctx.fillStyle = '#000'; ctx.fillRect(x+6, y+8, 6, 5);
      ctx.fillStyle = '#000'; ctx.fillRect(x+s-12, y+8, 6, 5);
      // Mouth slot
      ctx.fillStyle = '#000'; ctx.fillRect(x+8, y+18, s-16, 4);
      // Feather decorations
      ctx.fillStyle = '#e74c3c'; ctx.fillRect(x+2, y+2, 3, 10);
      ctx.fillStyle = '#f39c12'; ctx.fillRect(x+s-5, y+2, 3, 10);
      break;
    case 'vessel':
      ctx.fillStyle = '#7a5c2e'; ctx.fillRect(x+4, y+6, s-8, s-10);
      ctx.fillStyle = '#6a4c1e'; ctx.fillRect(x+2, y+s-8, s-4, 6);
      ctx.fillStyle = '#3dd6d0'; ctx.fillRect(x+6, y+s-8, s-12, 5);
      break;
    default:
      ctx.fillStyle = '#a08040'; ctx.font = `${Math.round(s*0.3)}px Courier New`; ctx.textAlign = 'center';
      ctx.fillText(item.substring(0,3).toUpperCase(), cx, cy+4);
      ctx.textAlign = 'left';
  }
  ctx.restore();
}

// INVENTORY
function renderInvMenu() {
  const grid = document.getElementById('inv-grid');
  if (!grid) return;
  grid.innerHTML = '';
  const p = state.player;
  const allItems = Object.entries(p.inv).filter(([k,v])=>v>0);
  allItems.forEach(([k,v]) => {
    const div = document.createElement('div');
    div.className = 'inv-slot-themed';
    div.style.padding = '2px';

    // Icon canvas
    const ic = document.createElement('canvas');
    ic.width = 28; ic.height = 28;
    ic.style.cssText = 'image-rendering:pixelated;display:block;margin:0 auto 2px';
    const ictx = ic.getContext('2d');
    drawItemIcon(ictx, k, 0, 0, 28);
    div.appendChild(ic);

    // Count
    const countEl = document.createElement('div');
    countEl.className = 'count';
    countEl.style.fontSize = '11px';
    countEl.textContent = v;
    div.appendChild(countEl);

    // Short label
    const labelEl = document.createElement('div');
    labelEl.style.cssText = 'font-size:8px;color:#a08040;line-height:1.1;text-align:center;font-family:"Lato",sans-serif;';
    labelEl.textContent = k.replace(/_/g,' ').toUpperCase().substring(0,8);
    div.appendChild(labelEl);

    div.onclick = () => {
      if (k==='coconut'&&p.inv.coconut>0){p.inv.coconut--;p.water=Math.min(p.maxWater,p.water+35);showMsg('+35 WATER','#3498db');}
      if (k==='fish'&&p.inv.fish>0){p.inv.fish--;if(Math.random()<0.2){p.sick=200;showMsg('SICK FROM RAW FISH!','#e74c3c');}else{p.food=Math.min(p.maxFood,p.food+25);showMsg('+25 FOOD (RAW)','#e67e22');}}
      if (k==='fish_cooked'&&p.inv.fish_cooked>0){p.inv.fish_cooked--;p.food=Math.min(p.maxFood,p.food+50);showMsg('+50 FOOD (COOKED)','#e67e22');}
      if (k==='fruit'&&p.inv.fruit>0){p.inv.fruit--;if(Math.random()<0.2){p.sick=200;showMsg('SICK FROM RAW FRUIT!','#e74c3c');}else{p.food=Math.min(p.maxFood,p.food+20);showMsg('+20 FOOD (RAW)','#e67e22');}}
      if (k==='fruit_cooked'&&p.inv.fruit_cooked>0){p.inv.fruit_cooked--;p.food=Math.min(p.maxFood,p.food+40);showMsg('+40 FOOD (COOKED)','#e67e22');}
      if (k==='hearty_meal'&&p.inv.hearty_meal>0){p.inv.hearty_meal--;p.food=Math.min(p.maxFood,p.food+40);p.hp=Math.min(p.maxHp,p.hp+20);showMsg('+40 FOOD +20 HP (HEARTY MEAL)','#ffcc80');}
      if (k==='healing_potion'&&p.inv.healing_potion>0){p.inv.healing_potion--;p.hp=Math.min(p.maxHp,p.hp+30);showMsg('+30 HP (HEALING POTION)','#40ff88');}
      if (k==='antidote'&&p.inv.antidote>0){p.inv.antidote--;p.poison=0;showMsg('POISON CURED (ANTIDOTE)','#40ff88');}
      renderInvMenu();
    };
    grid.appendChild(div);
  });
}

// ============================================================
// TOOL ICONS (pixel art drawn on canvas HUD)
// ============================================================

function drawToolIcon(ctx, toolId, x, y, size) {
  const s = size || 20;
  ctx.save();
  switch(toolId) {
    case 'axe':
      // Brown handle diagonal, grey blade
      ctx.strokeStyle = '#7a5c2e'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x+3, y+s-3); ctx.lineTo(x+s-5, y+4); ctx.stroke();
      ctx.fillStyle = '#888899';
      ctx.beginPath(); ctx.moveTo(x+s-7, y+2); ctx.lineTo(x+s, y+8); ctx.lineTo(x+s-8, y+14); ctx.closePath(); ctx.fill();
      break;
    case 'fire_axe':
      ctx.strokeStyle = '#7a5c2e'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x+3, y+s-3); ctx.lineTo(x+s-5, y+4); ctx.stroke();
      ctx.fillStyle = '#ff6600';
      ctx.beginPath(); ctx.moveTo(x+s-7, y+2); ctx.lineTo(x+s, y+8); ctx.lineTo(x+s-8, y+14); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffcc00'; ctx.fillRect(x+s-6, y+3, 4, 3);
      break;
    case 'pickaxe':
      ctx.strokeStyle = '#7a5c2e'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x+s-4, y+8); ctx.lineTo(x+4, y+s-4); ctx.stroke();
      ctx.fillStyle = '#888899';
      ctx.beginPath(); ctx.moveTo(x+s-6, y+2); ctx.lineTo(x+s+2, y+10); ctx.lineTo(x+s-10, y+16); ctx.closePath(); ctx.fill();
      break;
    case 'sword':
      ctx.strokeStyle = '#aaaacc'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x+s/2, y+s-2); ctx.lineTo(x+s/2, y+3); ctx.stroke();
      ctx.strokeStyle = '#c8a020'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(x+2, y+s/2+2); ctx.lineTo(x+s-2, y+s/2+2); ctx.stroke();
      ctx.fillStyle = '#c8a060'; ctx.fillRect(Math.round(x+s/2-2), Math.round(y+s/2+3), 5, 5);
      break;
    case 'spear':
      ctx.strokeStyle = '#7a5c2e'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x+3, y+s-3); ctx.lineTo(x+s-4, y+3); ctx.stroke();
      ctx.fillStyle = '#aaaacc';
      ctx.beginPath(); ctx.moveTo(x+s-4, y+3); ctx.lineTo(x+s-10, y+8); ctx.lineTo(x+s-8, y+14); ctx.closePath(); ctx.fill();
      break;
    case 'fire_spear':
      ctx.strokeStyle = '#7a5c2e'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x+3, y+s-3); ctx.lineTo(x+s-4, y+3); ctx.stroke();
      ctx.fillStyle = '#ff8800';
      ctx.beginPath(); ctx.moveTo(x+s-4, y+3); ctx.lineTo(x+s-10, y+8); ctx.lineTo(x+s-8, y+14); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffcc00'; ctx.fillRect(x+s-7, y+3, 3, 4);
      break;
    case 'torch':
      ctx.fillStyle = '#7a5c2e'; ctx.fillRect(Math.round(x+s/2-2), Math.round(y+s/2-2), 4, s/2+2);
      ctx.fillStyle = '#ff8800';
      ctx.beginPath(); ctx.arc(x+s/2, y+s/2-4, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath(); ctx.arc(x+s/2, y+s/2-6, 3, 0, Math.PI*2); ctx.fill();
      break;
    case 'fishing_rod':
      ctx.strokeStyle = '#7a5c2e'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x+3, y+s-3); ctx.quadraticCurveTo(x+s-3, y+s-6, x+s-3, y+3); ctx.stroke();
      ctx.strokeStyle = '#c8c8c8'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x+s-3, y+3); ctx.lineTo(x+s-1, y+s-2); ctx.stroke();
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath(); ctx.arc(x+s-1, y+s-2, 3, 0, Math.PI*2); ctx.fill();
      break;
    case 'coconut':
      ctx.fillStyle = '#5c3d1e';
      ctx.beginPath(); ctx.arc(x+s/2, y+s/2, s*0.38, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#3a2010'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x+s/2-4, y+s/2-4); ctx.lineTo(x+s/2+4, y+s/2+4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+s/2+4, y+s/2-4); ctx.lineTo(x+s/2-4, y+s/2+4); ctx.stroke();
      break;
    case 'stone_knife':
      // Small grey blade shape
      ctx.fillStyle = '#888899';
      ctx.beginPath(); ctx.moveTo(x+4, y+s-4); ctx.lineTo(x+s-4, y+4); ctx.lineTo(x+s-4, y+s-4); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#aaaacc';
      ctx.beginPath(); ctx.moveTo(x+5, y+s-5); ctx.lineTo(x+s-5, y+5); ctx.lineTo(x+s-8, y+s-5); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#7a5c2e'; ctx.fillRect(x+2, y+s-8, 5, 8); // handle
      break;
    case 'bow':
      // Curved bow shape
      ctx.strokeStyle = '#7a5c2e'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(x+s/2, y+s/2, s*0.4, -Math.PI*0.7, Math.PI*0.7); ctx.stroke();
      ctx.strokeStyle = '#c8c8a0'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x+s/2-s*0.28, y+s/2-s*0.32); ctx.lineTo(x+s/2-s*0.28, y+s/2+s*0.32); ctx.stroke();
      break;
    case 'fire_bottle':
      // Orange bottle
      ctx.fillStyle = '#ff8800'; ctx.beginPath(); ctx.ellipse(x+s/2, y+s/2+2, s*0.3, s*0.38, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff4400'; ctx.beginPath(); ctx.ellipse(x+s/2, y+4, 4, 5, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(x+s/2, y+2, 3, 0, Math.PI*2); ctx.fill();
      break;
    default:
      ctx.fillStyle = '#a08040'; ctx.font = `${Math.round(s*0.35)}px Courier New`; ctx.textAlign = 'center';
      ctx.fillText(toolId.substring(0,3).toUpperCase(), x+s/2, y+s/2+4); ctx.textAlign = 'left';
  }
  ctx.restore();
}

function drawHotbarIcons(ctx) {
  const p = state.player;
  // Same tool order as updateUI hotbar
  const toolSlots = [
    {id:'axe'},{id:'fire_axe'},{id:'obsidian_pickaxe'},{id:'pickaxe'},{id:'sword'},
    {id:'spear'},{id:'fire_spear'},{id:'lava_blade'},{id:'depth_spear'},
    {id:'stone_knife'},{id:'bow'},
    {id:'fire_bottle'},{id:'lava_bomb'},{id:'signal_mirror'},{id:'torch'},{id:'coconut'},
  ].filter(t => (p.inv[t.id]||0) > 0).slice(0, 6);

  if (toolSlots.length === 0) return;

  const slotSize = 48, gap = 6;
  const totalW = toolSlots.length * slotSize + (toolSlots.length-1) * gap;
  const startX = (ctx.canvas.width - totalW) / 2;
  const slotY = ctx.canvas.height - 52;

  const durabilityMax = {axe:20, pickaxe:15, sword:25, spear:20, fire_axe:20, fire_spear:15, stone_knife:10, bow:30, lava_blade:30, depth_spear:25};

  for (let i = 0; i < toolSlots.length; i++) {
    const sl = toolSlots[i];
    if (!sl) continue;
    const x = startX + i * (slotSize + gap);
    // Draw pixel icon centered in slot (20x20 icon, centered in 48px slot)
    const iconSize = 20;
    const iconX = x + (slotSize - iconSize) / 2;
    const iconY = slotY + (slotSize - iconSize) / 2 - 2;
    drawToolIcon(ctx, sl.id, iconX, iconY, iconSize);

    // Durability bar
    const maxDur = durabilityMax[sl.id];
    if (maxDur !== undefined && p.toolDurability && p.toolDurability[sl.id] !== undefined) {
      const pct = Math.max(0, Math.min(1, p.toolDurability[sl.id] / maxDur));
      const barW = slotSize - 4;
      const barX = x + 2;
      const barY = slotY + slotSize - 5;
      // Background
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(barX, barY, barW, 3);
      // Fill
      const color = pct > 0.6 ? '#44cc44' : pct > 0.3 ? '#cccc00' : '#cc2222';
      ctx.fillStyle = color;
      ctx.fillRect(barX, barY, Math.round(barW * pct), 3);
    }
  }
}
