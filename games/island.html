function spawnEnemies(n, type) {
  const lagoonCx = 150*TSIZE, lagoonCy = 24*TSIZE;
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = (30 + Math.random() * 24) * TSIZE;
    const cx = 150 * TSIZE, cy = 150 * TSIZE;
    const t = type || (state.isNight ? 'shadow' : 'scout');
    const hp = (t==='shadow'?25:20) + state.day * 3;
    const ex = cx + Math.cos(angle)*r;
    const ey = cy + Math.sin(angle)*r;
    // Don't spawn within 30 tiles of lagoon or 40 tiles of spawn
    if (Math.hypot(ex-lagoonCx, ey-lagoonCy) < 30*TSIZE) continue;
    if (Math.hypot(ex - 125*TSIZE, ey - 175*TSIZE) < 40*TSIZE) continue;
    state.enemies.push({
      x: ex,
      y: ey,
      hp, maxHp: hp,
      spd: (t==='shadow'?0.84:0.49) + state.day*0.014,
      type: t,
      attackTimer: 0,
      walkTimer: 0,
      state: 'patrol',
      patrolTarget: {x: cx + (Math.random()-0.5)*360, y: cy + (Math.random()-0.5)*360}
    });
  }
}

function spawnChief() {
  const cx = 152*TSIZE, cy = 96*TSIZE;
  state.chief = {
    x: cx, y: cy,
    hp: 300, maxHp: 300,
    spd: 0.63, type: 'chief',
    attackTimer: 0, walkTimer: 0,
    phase: 1, phaseTimer: 0,
    axeTimer: 0
  };
  showMsg('THE TRIBAL CHIEF HAS APPEARED!', '#ff4444');
}

function updateEnemies() {
  const p = state.player;
  const inSafeZone = Math.hypot(p.x - 125*TSIZE, p.y - 175*TSIZE) < 35*TSIZE;

  // Zone boundary: enemies from zone 2+ cannot enter zone 0/1 (y > 145 tiles)
  state.enemies.forEach(e => {
    const ety = Math.floor(e.y / TSIZE);
    if (ety > 145 && state.zoneUnlocked < 2) {
      // Push them back north
      e.y = 144 * TSIZE;
    }
  });

  // Ritual timer update
  if (state.ritual && state.ritual.active) {
    state.ritual.timer--;
    if (state.ritual.timer <= 0) {
      state.ritual.active = false;
      state.ritual.phase = 'none';
    }
  }

  // Priest healing logic: heal nearby villageGuard warriors every 10s (600 frames)
  state.enemies.forEach(priest => {
    if (priest.type !== 'priest' || priest.dying) return;
    priest.healTimer = (priest.healTimer || 0) + 1;
    if (priest.healTimer >= 600) {
      priest.healTimer = 0;
      state.enemies.forEach(w => {
        if (w === priest || w.type === 'priest' || w.dying) return;
        if (!w.villageGuard) return;
        const hd = Math.hypot(w.x - priest.x, w.y - priest.y);
        if (hd < 80) {
          w.hp = Math.min(w.maxHp, w.hp + 5);
          spawnParticle(w.x, w.y - 8, 0, -0.8, '#50c878', 30);
        }
      });
    }
  });

  // Bribable warrior: show hint when player is close with 3+ coconuts
  if (!state.peaceAchieved) {
    const bribable = state.enemies.find(e => e.bribable && !e.dying && !e.fleeing);
    if (bribable) {
      const bd = Math.hypot(p.x - bribable.x, p.y - bribable.y);
      if (bd < 60 && p.inv.coconut >= 3) {
        if (state.frameCount % 90 === 0) showMsg("Hold F to offer coconuts to the warrior", '#c8a060');
      }
    }
  }

  const allE = [...state.enemies];
  if (state.chief) allE.push(state.chief);

  // Flank offset update every 3 seconds (180 frames)
  const doFlankUpdate = state.frameCount % 180 === 0;

  allE.forEach((e, idx) => {
    if (!e || e.x === undefined || e.y === undefined) return; // guard against corrupt entries
    if (e.dying) return; // skip AI for dying enemies
    const dx = p.x - e.x, dy = p.y - e.y;
    const dist = Math.sqrt(dx*dx+dy*dy);

    // Priest: no attack AI, just stay near village fire
    if (e.type === 'priest') {
      e.walkTimer++;
      if (e.fleeing) {
        e.fleeTimer--;
        if (e.fleeTimer <= 0) e.fleeing = false;
        if (dist > 0) { e.x -= dx/dist * e.spd * 1.5; e.y -= dy/dist * e.spd * 1.5; }
      } else {
        // Wander slowly near fire
        const firePt = e.patrolTarget;
        const fpd = Math.hypot(firePt.x - e.x, firePt.y - e.y);
        if (fpd > 60) {
          e.x += (firePt.x - e.x) / fpd * e.spd;
          e.y += (firePt.y - e.y) / fpd * e.spd;
        } else if (state.frameCount % 240 === 0) {
          e.patrolTarget = {x: 209*TSIZE + (Math.random()-0.5)*60, y: 114*TSIZE + (Math.random()-0.5)*60};
        }
      }
      // HP flee
      if (e.hp < e.maxHp * 0.3 && !e.fleeing) { e.fleeing = true; e.fleeTimer = 400; }
      return; // no attack logic for priest
    }
    // Burn tick — fire spear burn effect
    if (e.burning > 0) {
      e.burning--;
      if (state.frameCount % 6 === 0) {
        e.hp -= 1;
        spawnParticle(e.x + (Math.random()-0.5)*12, e.y - 4, (Math.random()-0.5)*0.8, -1.2, Math.random()<0.5?'#ff6600':'#ff4400', 20);
      }
    }
    // Skip distant enemies (performance)
    if (dist > 800 && e.type !== 'chief') return;
    e.walkTimer++;
    // Init smart AI fields if missing
    if (e.fleeing === undefined) { e.fleeing = false; e.fleeTimer = 0; e.scatterTimer = 0; e.flankOffset = {x:0,y:0}; }

    // Signal mirror stun
    if (e.stunTimer > 0) { e.stunTimer--; return; }

    const detect = e.type==='shadow' ? 300 : 200;

    // Flee behavior: if HP < 30% and not chief, 40% chance to flee
    if (e.hp < e.maxHp * 0.3 && !e.fleeing && !e.type==='chief' && Math.random() < 0.004) {
      e.fleeing = true;
      e.fleeTimer = 300; // 5 seconds
    }
    if (e.fleeing) {
      e.fleeTimer--;
      if (e.fleeTimer <= 0) e.fleeing = false;
    }

    // Scatter timer countdown
    if (e.scatterTimer > 0) e.scatterTimer--;

    // Flank offset update
    if (doFlankUpdate && Math.random() < 0.3) {
      e.flankOffset = {x:(Math.random()-0.5)*120, y:(Math.random()-0.5)*120};
    }

    // Chief's mask: scouts flee from player
    const hasMask = p.inv.chiefs_mask > 0;
    if (hasMask && (e.type === 'scout' || e.type === 'archer') && dist < 200) {
      e.fleeing = true;
      e.fleeTimer = Math.max(e.fleeTimer||0, 60);
    }

    // Campfire repels shadow warriors
    const campfires = state.objects.filter(o => o.placed && o.type === 'campfire');
    const nearCampfire = campfires.some(cf => Math.hypot(p.x-cf.x, p.y-cf.y) < 80);
    const shadowBlockedByCampfire = e.type === 'shadow' && nearCampfire && dist < 60;

    if ((dist < detect || e.fleeing || e.scatterTimer > 0) && !shadowBlockedByCampfire && !inSafeZone) {
      let moveX, moveY;
      if (e.fleeing || e.scatterTimer > 0) {
        // Run away from player
        const fleeSpd = e.fleeing ? e.spd * 1.5 : e.spd * 1.2;
        if (dist > 0) {
          moveX = e.x - dx/dist * fleeSpd;
          moveY = e.y - dy/dist * fleeSpd;
        } else {
          moveX = e.x + (Math.random()-0.5)*fleeSpd;
          moveY = e.y + (Math.random()-0.5)*fleeSpd;
        }
      } else {
        // Move toward player + flank offset
        const targetX = p.x + (e.flankOffset ? e.flankOffset.x : 0);
        const targetY = p.y + (e.flankOffset ? e.flankOffset.y : 0);
        const tdx = targetX - e.x, tdy = targetY - e.y;
        const td = Math.sqrt(tdx*tdx+tdy*tdy);
        const stormBoost = (state.season === 2 && state.isNight) ? 1.25 : 1;
        const spd = e.spd * (e.type==='shadow' && state.isNight ? 1.3 : 1) * stormBoost;
        moveX = td > 0 ? e.x + tdx/td * spd : e.x;
        moveY = td > 0 ? e.y + tdy/td * spd : e.y;
      }

      // Wall collision check
      const tileAt = state.map[Math.floor(moveY/TSIZE)]?.[Math.floor(moveX/TSIZE)];
      const wallHere = state.objects.find(o => o.type==='wall' && Math.abs(o.x-moveX)<TSIZE && Math.abs(o.y-moveY)<TSIZE);

      if (!wallHere && tileAt !== T.LAVA) {
        e.x = moveX; e.y = moveY;
      } else if (wallHere && !e.fleeing) {
        e.attackTimer++;
        if (e.attackTimer > 60) {
          e.attackTimer = 0;
          wallHere.hp = (wallHere.hp||20) - 5;
          spawnParticles(wallHere.x, wallHere.y, '#888',4);
          if (wallHere.hp <= 0) {
            state.objects = state.objects.filter(o => o !== wallHere);
            showMsg('A WALL WAS DESTROYED!', '#e74c3c');
          }
        }
      }
    } else if (dist < 400) {
      // Patrol — ritual overrides for villageGuard enemies
      if (state.ritual && state.ritual.active && e.villageGuard && !e.fleeing && e.scatterTimer <= 0) {
        // Move toward village fire instead of patrolling outward
        const firePt = {x: 209*TSIZE, y: 114*TSIZE};
        const fpd = Math.hypot(firePt.x - e.x, firePt.y - e.y);
        if (fpd > 30) { e.x += (firePt.x-e.x)/fpd*0.5; e.y += (firePt.y-e.y)/fpd*0.5; }
      } else {
        // Normal patrol
        const pt = e.patrolTarget;
        const pdx = pt.x - e.x, pdy = pt.y - e.y;
        const pd = Math.sqrt(pdx*pdx+pdy*pdy);
        if (pd < 20) e.patrolTarget = {x:e.x+(Math.random()-0.5)*300, y:e.y+(Math.random()-0.5)*300};
        else { e.x += pdx/pd*0.4; e.y += pdy/pd*0.4; }
      }
    }

    // Peace behavior: village guards stop attacking, watch player approach
    if (state.peaceAchieved && e.villageGuard && e.type !== 'chief') {
      if (dist < 80 && dist > 0) {
        // Face toward player but don't attack — gentle slow drift away if too close
        if (dist < 24) { e.x -= dx/dist * 0.5; e.y -= dy/dist * 0.5; }
      }
      // Ritual rather than patrol when peaceful
      if (state.frameCount % 300 === 0) {
        e.patrolTarget = {x: 209*TSIZE + (Math.random()-0.5)*80, y: 114*TSIZE + (Math.random()-0.5)*80};
      }
      return; // skip attack logic
    }

    // Attack player (shadow warriors blocked by campfire, safe zone protection)
    if (!shadowBlockedByCampfire && !inSafeZone) {
      e.attackTimer++;
      const attackR = e.type==='chief' ? 40 : 28;
      if (dist < attackR && e.attackTimer > 80 && !e.fleeing && e.scatterTimer <= 0 && !state.invincible) {
        e.attackTimer = 0;
        let dmg = e.type==='chief' ? 20 : (e.type==='shadow'?12:8);
        if (state._volcanicArmorActive) dmg = Math.round(dmg * 0.7);
        p.hp = Math.max(0, p.hp - dmg);
        p.hitFlash = 8;
        spawnParticles(p.x, p.y, '#e74c3c',4);
        addFloatingText(p.x, p.y - 20, '-'+dmg, '#ff4444');
        SFX.hurt();
        if (navigator.vibrate) navigator.vibrate([50,20,50]);
        state.lastDamageCause = e.type === 'chief' ? 'tribal chief' : 'enemy warrior';
        if (state.runStats) state.runStats.damageTaken += dmg;
      }
    }

    // Chief phases
    if (e.type === 'chief') {
      if (e.hp < 150 && e.phase === 1) {
        e.phase = 2; e.spd = 0.98;
        spawnEnemies(3, 'scout');
        showMsg('THE CHIEF ENRAGES!', '#ff4444');
      }
      if (e.hp < 75 && e.phase === 2) {
        e.phase = 3; e.spd = 1.26;
        spawnEnemies(5, 'scout');
      }
      // Phase 3 throws axes
      if (e.phase === 3) {
        e.axeTimer++;
        if (e.axeTimer > 120) {
          e.axeTimer = 0;
          if (dist > 0) state.projectiles.push({
            x: e.x, y: e.y,
            vx: dx/dist * 4, vy: dy/dist * 4,
            type: 'axe', life: 80, damage: 15
          });
        }
      }
    }

    // Archer shoots
    if (e.type === 'archer' && dist < 300 && !e.fleeing) {
      e.attackTimer++;
      if (e.attackTimer > 150) {
        e.attackTimer = 0;
        if (dist > 0) state.projectiles.push({
          x: e.x, y: e.y,
          vx: dx/dist * 5, vy: dy/dist * 5,
          type: 'arrow', life: 60, damage: 10
        });
      }
    }
  });

  // Remove dead enemies — trigger group scatter on kill, show dying animation
  const prevCount = state.enemies.length;
  state.enemies = state.enemies.filter(e => {
    if (e.hp <= 0 && !e.dying) {
      // Start dying animation
      e.dying = true;
      e.dyingTimer = 8;
      // Scatter nearby enemies
      state.enemies.forEach(other => {
        if (other !== e && Math.hypot(other.x-e.x, other.y-e.y) < 150) {
          other.scatterTimer = 120; // 2 seconds
        }
      });
    }
    if (e.dying) {
      e.dyingTimer--;
      if (e.dyingTimer <= 0 && state.runStats) state.runStats.enemiesKilled++;
      return e.dyingTimer > 0;
    }
    return true;
  });

  if (state.chief && state.chief.hp <= 0) {
    state.chief = null;
    p.chiefDefeated = true;
    p.inv.chiefs_mask = 1;
    showMsg("TRIBAL CHIEF DEFEATED! CHIEF'S MASK ACQUIRED!", '#c8f135');
    spawnParticles(p.x, p.y, '#c8f135',4);
    // Peace ending: if Kona is helping, tribe lowers weapons
    if (state.storyChoices.konaHelping && !state.peaceAchieved) {
      state.peaceAchieved = true;
      state.ritual.active = true;
      state.ritual.phase = 'peace';
      state.ritual.timer = 99999; // permanent
      setTimeout(() => showMsg("The tribe lowers their weapons. You are no longer an enemy.", '#c8f135'), 2000);
    }
    checkSettlement();
  }
}

function updateProjectiles() {
  const p = state.player;
  state.projectiles = state.projectiles.filter(proj => {
    proj.x += proj.vx; proj.y += proj.vy;
    proj.life--;
    // Arrow gravity
    if (proj.type === 'player_arrow') {
      proj.vy += 0.1;
    }

    if (proj.type === 'fire_bottle') {
      // Explode on hitting an enemy or running out of life
      let exploded = false;
      const allTargets = [...state.enemies, ...(state.chief?[state.chief]:[])];
      for (const e of allTargets) {
        if (Math.hypot(proj.x-e.x, proj.y-e.y) < 20) { exploded = true; break; }
      }
      if (exploded || proj.life <= 0) {
        // Explosion
        SFX.fireExplode();
        spawnParticles(proj.x, proj.y, '#ff6600',4);
        spawnParticles(proj.x, proj.y, '#ffcc00',4);
        addFloatingText(proj.x, proj.y - 20, 'BOOM!', '#ff6600');
        // Damage nearby enemies
        for (const e of allTargets) {
          if (Math.hypot(proj.x-e.x, proj.y-e.y) < 60) {
            e.hp -= 20;
            e.burning = 90;
            addFloatingText(e.x, e.y-20, '-20', '#ff6600');
          }
        }
        // Create fire tiles (3x3 grid around impact)
        const ftx = Math.floor(proj.x / TSIZE);
        const fty = Math.floor(proj.y / TSIZE);
        if (!state.fireTiles) state.fireTiles = [];
        for (let fy = -1; fy <= 1; fy++) {
          for (let fx2 = -1; fx2 <= 1; fx2++) {
            state.fireTiles.push({x:(ftx+fx2)*TSIZE+TSIZE/2, y:(fty+fy)*TSIZE+TSIZE/2, timer:300});
          }
        }
        return false;
      }
      return true;
    }

    if (proj.type === 'lava_bomb') {
      // AoE explosion on enemy contact or life end
      let exploded = false;
      const allTargetsLB = [...state.enemies, ...(state.chief?[state.chief]:[])];
      for (const e of allTargetsLB) {
        if (Math.hypot(proj.x-e.x, proj.y-e.y) < 22) { exploded = true; break; }
      }
      if (exploded || proj.life <= 0) {
        SFX.fireExplode ? SFX.fireExplode() : SFX.swing();
        spawnParticles(proj.x, proj.y, '#ff4400', 6);
        spawnParticles(proj.x, proj.y, '#ffaa00', 4);
        addFloatingText(proj.x, proj.y - 20, 'LAVA BLAST!', '#ff4400');
        for (const e of allTargetsLB) {
          if (Math.hypot(proj.x-e.x, proj.y-e.y) < 80) {
            e.hp -= 40;
            e.burning = 120;
            addFloatingText(e.x, e.y-20, '-40', '#ff4400');
          }
        }
        const ftxLB = Math.floor(proj.x / TSIZE);
        const ftyLB = Math.floor(proj.y / TSIZE);
        if (!state.fireTiles) state.fireTiles = [];
        for (let fy = -1; fy <= 1; fy++) {
          for (let fx2 = -1; fx2 <= 1; fx2++) {
            state.fireTiles.push({x:(ftxLB+fx2)*TSIZE+TSIZE/2, y:(ftyLB+fy)*TSIZE+TSIZE/2, timer:360});
          }
        }
        return false;
      }
      return true;
    }

    if (proj.type === 'knife_throw') {
      let hit = false;
      const allTargets2 = [...state.enemies, ...(state.chief?[state.chief]:[]), ...state.creatures.filter(c=>c.type!=='crab')];
      for (const e of allTargets2) {
        if (Math.hypot(proj.x-e.x, proj.y-e.y) < 18) {
          e.hp -= 10;
          e.hitFlash = 4;
          addFloatingText(e.x, e.y-20, '-10', '#aaaacc');
          spawnParticles(e.x, e.y, '#aaaacc',4);
          SFX.hit();
          hit = true;
          break;
        }
      }
      if (hit) return false;
      return proj.life > 0;
    }

    if (proj.type === 'player_arrow') {
      let hit = false;
      const allTargets2 = [...state.enemies, ...(state.chief?[state.chief]:[]), ...state.creatures.filter(c=>c.type!=='crab')];
      for (const e of allTargets2) {
        if (Math.hypot(proj.x-e.x, proj.y-e.y) < 16) {
          e.hp -= 12;
          e.hitFlash = 4;
          addFloatingText(e.x, e.y-20, '-12', '#c8a060');
          spawnParticles(e.x, e.y, '#c8a060',4);
          SFX.hit();
          hit = true;
          break;
        }
      }
      if (hit) return false;
      return proj.life > 0;
    }

    if (proj.type === 'coconut_throw') {
      let hit = false;
      const allTargets = [...state.enemies, ...(state.chief ? [state.chief] : []), ...state.creatures.filter(c=>c.type!=='crab')];
      for (const e of allTargets) {
        if (!e || e.x === undefined) continue;
        if (Math.hypot(proj.x-e.x, proj.y-e.y) < 24) {
          e.hp -= 15; // coconuts hit hard
          if (e.hitFlash !== undefined) e.hitFlash = 4;
          spawnParticles(e.x, e.y, '#8B6914',4);
          SFX.hit();
          hit = true;
          break;
        }
      }
      if (hit) return false;
      return proj.life > 0;
    }

    const dx = p.x - proj.x, dy = p.y - proj.y;
    if (Math.sqrt(dx*dx+dy*dy) < 20) {
      p.hp = Math.max(0, p.hp - proj.damage);
      
      spawnParticles(p.x, p.y, proj.type==='axe'?'#888':'#c8a060',4);
      return false;
    }
    return proj.life > 0;
  });
}

function updateCreatures() {
  const p = state.player;
  const inSafeZone = Math.hypot(p.x - 125*TSIZE, p.y - 175*TSIZE) < 35*TSIZE;
  state.creatures = state.creatures.filter(c => c.hp > 0);

  state.creatures.forEach(c => {
    const dx = p.x - c.x, dy = p.y - c.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    // Skip distant creatures (performance)
    if (dist > 800) return;
    c.walkTimer++;

    if (c.type === 'spider') {
      // Spiders stay in dark jungle only
      const spiderTile = getTile(c.x, c.y);
      if (spiderTile === T.BEACH || spiderTile === T.SHALLOW_WATER) {
        // Push spider back toward jungle
        c.x += (150*TSIZE - c.x) * 0.01;
        c.y += (150*TSIZE - c.y) * 0.01;
        return;
      }
      const detect = 150;
      if (dist < detect && !inSafeZone) {
        const nx = c.x + dx/dist * c.spd;
        const ny = c.y + dy/dist * c.spd;
        const tt = getTile(nx, ny);
        // Only move in dark jungle tiles
        if (tt === T.JUNGLE_DARK || tt === T.JUNGLE_LIGHT) { c.x = nx; c.y = ny; }
      }
      c.attackTimer++;
      if (dist < 20 && c.attackTimer > 90 && !inSafeZone) {
        c.attackTimer = 0;
        p.hp = Math.max(0, p.hp - 8);
        p.poison = 180;
        state.lastDamageCause = 'spider bite';
        if (state.runStats) state.runStats.damageTaken += 8;
        spawnParticles(p.x, p.y, '#22cc44',4);
        showMsg('POISONED BY SPIDER!', '#22cc44');
      }
    }

    if (c.type === 'shark') {
      // Shark: stays in water only, never on beach
      const sharkTile = getTile(c.x, c.y);
      if (sharkTile === T.BEACH || sharkTile === T.JUNGLE_LIGHT || sharkTile === T.JUNGLE_DARK) {
        // Push shark back into water
        c.x += (Math.random()-0.5)*2;
        c.y += (Math.random()-0.5)*2;
        return;
      }
      const playerTile = getTile(p.x, p.y);
      const playerInWater = playerTile === T.SHALLOW_WATER;
      // Keep shark in water tiles
      if (dist < 200 && playerInWater) {
        const burstSpd = dist < 60 ? 2.0 : 0.9;
        const nx = c.x + dx/dist * burstSpd;
        const ny = c.y + dy/dist * burstSpd;
        const tt = getTile(nx, ny);
        if ([T.SHALLOW_WATER, T.DEEP_OCEAN].includes(tt)) { c.x = nx; c.y = ny; }
        c.attackTimer++;
        if (dist < 20 && c.attackTimer > 80) {
          c.attackTimer = 0;
          p.hp = Math.max(0, p.hp - 20);
          state.lastDamageCause = 'shark attack';
          if (state.runStats) state.runStats.damageTaken += 20;
          spawnParticles(p.x, p.y, '#3498db',4);
          showMsg('SHARK ATTACK! GET OUT OF THE WATER!', '#3498db');
        }
      } else {
        // Drift slowly when player not in water
        c.x += (Math.random()-0.5)*0.3;
        c.y += (Math.random()-0.5)*0.3;
      }
    }

    if (c.type === 'bat') {
      if (state.isNight && dist < 250 && !inSafeZone) {
        const nx = c.x + dx/dist * c.spd;
        const ny = c.y + dy/dist * c.spd;
        const tt = getTile(nx, ny);
        if (tt !== T.LAVA && tt !== T.DEEP_OCEAN) { c.x = nx; c.y = ny; }
        c.attackTimer++;
        if (dist < 20 && c.attackTimer > 60) {
          c.attackTimer = 0;
          p.hp = Math.max(0, p.hp - 5);
          
          spawnParticles(p.x, p.y, '#2a1040',4);
        }
      }
    }
  });
}

function drawCreatures(ctx, camX, camY) {
  state.creatures.forEach(c => {
    const sx = c.x - camX, sy = c.y - camY;
    if (sx < -60 || sx > ctx.canvas.width+60 || sy < -60 || sy > ctx.canvas.height+60) return;
    if (c.type === 'spider') {
      drawSpider(ctx, sx, sy);
      px(ctx, '#333', sx-10, sy-18, 20, 3);
      px(ctx, '#22cc44', sx-10, sy-18, Math.round(20*c.hp/c.maxHp), 3);
    } else if (c.type === 'shark') {
      drawShark(ctx, sx, sy);
      px(ctx, '#333', sx-14, sy-18, 28, 3);
      px(ctx, '#2d8a22', sx-14, sy-18, Math.round(28*c.hp/c.maxHp), 3);
    } else if (c.type === 'bat') {
      drawBat(ctx, sx, sy);
      px(ctx, '#333', sx-8, sy-14, 16, 3);
      px(ctx, '#2a1040', sx-8, sy-14, Math.round(16*c.hp/c.maxHp), 3);
    }
    if (false) {
      // hitFlash removed
      ctx.fillStyle = 'rgba(255,255,255,0)';
      ctx.fillRect(sx-10, sy-8, 20, 16);
    }
  });
}

function drawProjectiles(ctx, camX, camY) {
  state.projectiles.forEach(proj => {
    const sx = proj.x - camX, sy = proj.y - camY;
    if (proj.type === 'player_arrow') {
      // Thin 16px line in direction of travel
      const angle = Math.atan2(proj.vy, proj.vx);
      ctx.save();
      ctx.strokeStyle = '#c8a060';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx - Math.cos(angle)*8, sy - Math.sin(angle)*8);
      ctx.lineTo(sx + Math.cos(angle)*8, sy + Math.sin(angle)*8);
      ctx.stroke();
      // Arrowhead
      ctx.fillStyle = '#888899';
      ctx.fillRect(Math.round(sx + Math.cos(angle)*6)-2, Math.round(sy + Math.sin(angle)*6)-2, 4, 4);
      ctx.restore();
    } else if (proj.type === 'knife_throw') {
      // Small grey blade spinning
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(state.frameCount * 0.4);
      ctx.fillStyle = '#aaaacc';
      ctx.fillRect(-5, -2, 10, 4);
      ctx.fillStyle = '#888899';
      ctx.fillRect(-5, -2, 4, 4);
      ctx.restore();
    } else if (proj.type === 'fire_bottle') {
      // Orange/red bottle in flight
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(sx, sy, 6, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.arc(sx-2, sy-2, 3, 0, Math.PI*2);
      ctx.fill();
      // Trail
      spawnParticle(proj.x, proj.y, (Math.random()-0.5)*0.5, 0.3, '#ff8800', 8);
    } else if (proj.type === 'lava_bomb') {
      // Glowing lava orb
      ctx.fillStyle = '#cc2200';
      ctx.beginPath();
      ctx.arc(sx, sy, 8, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(sx-2, sy-2, 5, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(sx-1, sy-3, 2, 0, Math.PI*2);
      ctx.fill();
      spawnParticle(proj.x, proj.y, (Math.random()-0.5)*0.8, 0.5, '#ff4400', 10);
    } else if (proj.type === 'arrow') {
      ctx.fillStyle = '#8B6914';
      ctx.fillRect(sx-6, sy-1, 12, 2);
      ctx.fillStyle = '#666';
      ctx.fillRect(sx+5, sy-2, 4, 4);
    } else if (proj.type === 'coconut_throw') {
      // Bigger, more visible coconut
      ctx.fillStyle = '#5c3d1e';
      ctx.fillRect(sx-7, sy-7, 14, 14);
      ctx.fillStyle = '#7a5c2e';
      ctx.fillRect(sx-5, sy-5, 10, 10);
      ctx.fillStyle = '#3a2010';
      ctx.fillRect(sx-3, sy-3, 6, 6);
      ctx.fillStyle = '#c8a060';
      ctx.fillRect(sx-1, sy-3, 2, 2); // highlight
    } else {
      ctx.fillStyle = '#888';
      ctx.fillRect(sx-4, sy-4, 8, 8);
      ctx.fillStyle = '#555';
      ctx.fillRect(sx-2, sy-6, 4, 4);
    }
  });
}

function checkSettlement() {
  const p = state.player;
  const placed = state.objects.filter(o => o.placed);
  const campfires = placed.filter(o=>o.type==='campfire').length;
  const walls = placed.filter(o=>o.type==='wall').length;
  const beds = placed.filter(o=>o.type==='bed').length;
  const towers = placed.filter(o=>o.type==='watchtower').length;
  const forges = placed.filter(o=>o.type==='forge').length;
  const chests = placed.filter(o=>o.type==='chest').length;

  const prev = p.settlementLevel;
  if (campfires>=1 && walls>=2 && beds>=1) p.settlementLevel = Math.max(1, p.settlementLevel);
  if (walls>=4 && towers>=1 && campfires>=1) p.settlementLevel = Math.max(2, p.settlementLevel);
  if (forges>=1 && chests>=1 && walls>=6) p.settlementLevel = Math.max(3, p.settlementLevel);

  const labels = ['SURVIVOR','SETTLEMENT','FORTIFIED CAMP','VILLAGE'];
  if (p.settlementLevel > prev) showMsg(`STATUS: ${labels[p.settlementLevel]}`, '#c8f135');
}
