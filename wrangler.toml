name = "rupertweb"
main = "worker.js"
compatibility_date = "2024-01-01"

[assets]
directory = "./"
binding = "ASSETS"

# Cloudflare KV namespace for QuestLog persistence
# (Pro state, push subscriptions, wishlist sync, custom URLs)
[[kv_namespaces]]
binding = "QUESTLOG_KV"
id = "62cc592058cd4e0d9e28e662d651791a"

# Cron triggers — invoke worker.js scheduled() handler.
# Hourly: wishlist price-watch sweep (writes alerts:${sid} for QuestLog Pro users).
# Daily 00:00 UTC: also rotates the Achievement-of-the-Day day stamp.
[triggers]
crons = ["0 * * * *", "0 0 * * *"]
