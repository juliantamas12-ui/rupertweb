<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rupert Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-left">
      <span class="site-title">RUPERT WEB</span>
      <span class="header-sep">/</span>
      <span class="user-name">Julian Tamas</span>
    </div>
    <div class="header-right">
      <span class="clock" id="clock"></span>
      <span class="date" id="date"></span>
    </div>
  </header>

  <main class="dashboard">

    <!-- ESSAYS -->
    <section class="panel" id="essays-panel">
      <div class="panel-header">
        <h2 class="panel-title">ESSAYS</h2>
        <span class="panel-sub">Written by Rupert</span>
      </div>
      <div class="card-grid" id="essays-grid"></div>
    </section>

    <!-- SCHOOL -->
    <section class="panel" id="school-panel">
      <div class="panel-header">
        <h2 class="panel-title">SCHOOL</h2>
        <span class="panel-sub">ManageBac — Marymount Rome</span>
      </div>
      <div class="task-list" id="school-list"></div>
    </section>

    <!-- BOTTOM ROW: Steam + Projects + Life Stats -->
    <div class="bottom-row">

      <!-- STEAM -->
      <section class="panel panel-steam" id="steam-panel">
        <div class="panel-header">
          <h2 class="panel-title">STEAM</h2>
          <span class="panel-sub">MrWhale12</span>
        </div>
        <div class="steam-stats" id="steam-stats"></div>
      </section>

      <!-- PROJECTS -->
      <section class="panel panel-projects" id="projects-panel">
        <div class="panel-header">
          <h2 class="panel-title">PROJECTS</h2>
          <span class="panel-sub">Built by Julian</span>
        </div>
        <div class="card-grid card-grid--sm" id="projects-grid"></div>
      </section>

      <!-- LIFE STATS -->
      <section class="panel panel-life" id="life-panel">
        <div class="panel-header">
          <h2 class="panel-title">LIFE STATS</h2>
          <span class="panel-sub">Custom counters</span>
        </div>
        <div class="life-grid" id="life-grid"></div>
      </section>

    </div>

  </main>

  <script src="main.js"></script>
</body>
</html>
